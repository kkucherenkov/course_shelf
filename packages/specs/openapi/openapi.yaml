  /api/v1/libraries:
    post:
      operationId: registerLibrary
      summary: Register a new library (or share an existing path)
      description: |
        Persists a library pointing at an absolute filesystem path.

        **Idempotent on `rootPath`.** When a library with the same path
        already exists, the call returns the existing library and grants
        the calling user READ access to it instead of creating a duplicate
        row. The response body matches what `GET /libraries/{id}` would
        return for that library — the original `name`/`createdAt` are
        preserved (the new `name` you submitted is ignored).

        For brand-new libraries the controller chains an initial
        `runLibraryScan` so courses become visible shortly after the
        response. No initial scan is fired when the path already existed
        (the existing library is presumed already scanned).
      tags: [Catalog]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterLibraryRequest"
            examples:
              conference:
                value:
                  name: Conference Recordings
                  rootPath: /srv/courses/conference
      responses:
        "201":
          description: Library registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryDto"
              examples:
                created:
                  value:
                    id: clxvp1234567890abcdefghij
                    name: Conference Recordings
                    rootPath: /srv/courses/conference
                    createdAt: "2026-04-25T09:00:00Z"
                    updatedAt: "2026-04-25T09:00:00Z"
        "400":
          description: Validation error — missing or malformed fields
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badInput:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "rootPath must be an absolute POSIX or Windows path."
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the Owner-Admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only Owner-Admins may register libraries.
    get:
      operationId: listLibraries
      summary: List all registered libraries
      description: |
        Returns all libraries the requester has READ access to. Admins see
        everything.
      tags: [Catalog]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Library list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryListDto"
              examples:
                list:
                  value:
                    items:
                      - id: clxvp1234567890abcdefghij
                        name: Conference Recordings
                        rootPath: /srv/courses/conference
                        createdAt: "2026-04-25T09:00:00Z"
                        updatedAt: "2026-04-25T09:00:00Z"
                      - id: clxvp0987654321zyxwvutsrq
                        name: Tutorial Screencasts
                        rootPath: /srv/courses/tutorials
                        createdAt: "2026-04-20T14:30:00Z"
                        updatedAt: "2026-04-22T11:00:00Z"
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401

  /api/v1/libraries/{id}:
    get:
      operationId: getLibrary
      summary: Get a library by id
      description: Returns a single library by its server-generated identifier.
