# nginx site config for the production SPA image.
#
# - Serves the static Nuxt output from /usr/share/nginx/html
# - Returns the runtime-config script verbatim (no caching) so a docker
#   restart with new env vars takes effect on next page load
# - SPA history fallback: every unknown path resolves to index.html
# - Cache the hashed _nuxt/ assets aggressively; cache the index.html for
#   1 minute so deploys of new builds get picked up quickly without a
#   force-reload.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Runtime config: never cached so a `docker compose restart web`
    # with new env vars takes effect on the next page load.
    location = /_app-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Hashed bundle assets — content-addressed, cache forever.
    location /_nuxt/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA: every unknown path serves index.html. Short cache so a redeploy
    # is picked up without users force-reloading.
    location / {
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
