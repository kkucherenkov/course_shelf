# nginx site config for the production SPA image.
#
# - Serves the static Nuxt output from /usr/share/nginx/html
# - Returns the runtime-config script verbatim (no caching) so a docker
#   restart with new env vars takes effect on next page load
# - SPA history fallback: every unknown path resolves to index.html
# - Cache the hashed _nuxt/ assets aggressively; cache the index.html for
#   1 minute so deploys of new builds get picked up quickly without a
#   force-reload.

server {
    # Unprivileged nginx image binds 8080 (no privileged port). The
    # proxy in front (docker/nginx/prod.conf) routes upstream to web:8080.
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # `nuxt generate` emits per-route directories (e.g. `/sign-up/index.html`),
    # so nginx sees the dir and auto-redirects `/sign-up` → `/sign-up/`. With
    # absolute redirects on (default), the Location header is
    # `${scheme}://${server_name}:${server_port}${uri}/` — and `$server_port`
    # is the container-internal `8080` we listen on, NOT the host's published
    # `3001`. The browser dutifully follows to `http://${host}:8080/sign-up/`
    # and gets ECONNREFUSED because :8080 isn't published off the web
    # container. Flip to relative-only redirects so the browser keeps the
    # original origin (host:3001 in CI, the reverse-proxy origin in prod).
    absolute_redirect off;

    # Secure headers for the SPA HTML response (E21-F02-S02). The backend
    # carries a parallel set on /api/v1/* via Helmet; both must be present
    # because CSP is per-document and the SPA is the document host.
    #
    # NOTE on nginx `add_header` semantics: directives at the `server` level
    # are NOT inherited into a `location` that defines ANY `add_header` of
    # its own. Each location below has a `Cache-Control` rule and therefore
    # loses the server-level headers entirely. We work around that by
    # `include`-ing this snippet from every location. (The headers-more
    # module would let us avoid the repetition but isn't in the upstream
    # nginx-unprivileged image — keeping vanilla nginx for trivy/security
    # audit cleanliness.)
    #
    # script-src 'self' 'unsafe-inline'
    #   Nuxt 4 SPA emits two inline boot scripts even with `ssr: false`:
    #     1. @nuxtjs/color-mode init — reads localStorage preference before
    #        Vue mounts so there's no light/dark flash on first paint.
    #     2. `window.__NUXT__ = { config: { … } }` — runtime-config bridge
    #        the Vue app reads as soon as it boots.
    #   Both are inline `<script>` without nonces; `script-src 'self'`
    #   alone blocks them, the SPA never mounts, the e2e smoke check sees
    #   `body` with zero children → reports it as `hidden`. SHA-256 hashes
    #   would change per build; nonce injection needs an SSR layer we
    #   don't run. `'unsafe-inline'` is the pragmatic trade-off.
    # style-src 'unsafe-inline'   — Vue scoped styles inject <style> at runtime
    # connect-src 'self' ws: wss: — bearer requests to /api/v1 + Centrifugo WS
    # frame-ancestors 'none'      — clickjacking guard

    # Runtime config: never cached so a `docker compose restart web`
    # with new env vars takes effect on the next page load.
    location = /_app-config.js {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' __CSP_CONNECT_SRC__ ws: wss:; media-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Hashed bundle assets — content-addressed, cache forever.
    location /_nuxt/ {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' __CSP_CONNECT_SRC__ ws: wss:; media-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA: every unknown path serves index.html. Short cache so a redeploy
    # is picked up without users force-reloading.
    location / {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' __CSP_CONNECT_SRC__ ws: wss:; media-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
