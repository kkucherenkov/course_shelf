name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  # ── Checks (consolidated lint · typecheck · test · specs · ui audit) ──────
  # One job sharing one pnpm install + one design:build + one prisma generate.
  # turbo handles parallelism across packages within the job.
  #
  # Per-package pnpm filter commands instead of `turbo run …` to avoid
  # turbo's transitive `^build` → `@app/specs#codegen` chain (codegen
  # needs Java + Flutter; the committed generated clients make it
  # unnecessary at check-time). Coverage matches the pre-consolidation CI
  # exactly: backend + web for lint/typecheck/test, ui for audit; plus the
  # extra quality gates we fix manually today (design:audit, format).
  checks:
    name: Checks (lint · typecheck · test · specs · ui audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @app/backend prisma:generate

      - name: Build design tokens
        run: pnpm design:build

      - name: Validate + bundle specs
        run: pnpm spec:validate && pnpm spec:bundle

      # Backend + web ESLint are independent — run in parallel and `wait` on
      # both. Time becomes max(backend, web) instead of sum (~halves the step
      # at the cost of a slightly noisier log when both fail). `set -e` +
      # explicit `wait $pid` propagate the first non-zero exit.
      - name: Lint (ESLint, backend + web in parallel)
        run: |
          set -e
          pnpm --filter @app/backend run lint &
          BACK_PID=$!
          pnpm --filter @app/web run lint &
          WEB_PID=$!
          wait $BACK_PID
          wait $WEB_PID

      - name: Typecheck
        run: |
          pnpm --filter @app/backend run typecheck
          pnpm --filter @app/web run typecheck

      - name: Test
        run: |
          pnpm --filter @app/backend run test:coverage
          pnpm --filter @app/web run test

      - name: UI components audit
        run: pnpm --filter @app/ui audit:components

      # Reporting mode (no --strict) — catches inventory drift between
      # specs/design/README.md and the @app/ui Vue components without
      # failing CI on a minor mismatch. Flip the script to `--strict`
      # once the inventory stabilises.
      - name: Design inventory audit
        run: pnpm design:audit

      - name: Prettier check
        run: pnpm format:check

  # ── Quality (storybook test-runner + security audit) ──────────────────────
  # One job that does the visual-regression Storybook test-runner AND the
  # dependency/license audits. Runs in slot 2 in parallel with `checks`
  # (slot 1) under the act_runner's concurrency=2 limit.
  #
  # Runs inside mcr.microsoft.com/playwright:v1.59.1-jammy so Chromium and
  # every apt system dep Playwright needs are already in the image — no
  # `playwright install --with-deps` step required. Image tag must match
  # `playwright` version in packages/ui/package.json.
  #
  # Security audits don't strictly need the Playwright image, but folding
  # them into the same job avoids a redundant pnpm install + checkout
  # + Node setup (~60s saved on every run).
  quality:
    name: Quality (storybook · security audit)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build design tokens
        run: pnpm design:build

      - name: Build Storybook static
        env:
          STORYBOOK_A11Y_LEVEL: todo
        run: pnpm --filter @app/ui storybook:build

      - name: Run Storybook test-runner
        run: pnpm --filter @app/ui test:visual:ci

      - name: Dependency vulnerability scan
        run: pnpm audit --audit-level=critical

      # MPL-2.0 is on the allowlist as a forward-compatible defensive
      # entry — no current dep ships under it, but @axe-core/playwright
      # (used the moment we add Storybook a11y gates) is MPL-2.0. It's
      # weak-copyleft (file-level reciprocity only, doesn't affect linked
      # consumers) and standard for accessibility tooling.
      - name: License compliance check
        run: pnpm dlx license-checker --excludePrivatePackages --onlyAllow 'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;Python-2.0;CC-BY-3.0;CC-BY-4.0;MPL-2.0'
