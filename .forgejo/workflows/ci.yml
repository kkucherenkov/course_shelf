name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: code.homelab.local
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  quality:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/catthehacker/ubuntu:act-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack & pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Validate & bundle OpenAPI
        run: pnpm contracts:lint && pnpm contracts:bundle

      - name: Generate clients/DTOs
        run: pnpm gen:all

      - name: Fail if generated artifacts drifted from committed ones
        run: |
          if ! git diff --exit-code; then
            echo "Generated artifacts are out of date. Run pnpm gen:all and commit."
            exit 1
          fi

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:contract

  build-and-push:
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/catthehacker/ubuntu:act-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."code.homelab.local"]
              http = true
              insecure = true

      - name: Login to Forgejo registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/courseshelf-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/courseshelf-api:latest
          labels: |
            org.opencontainers.image.source=http://code.homelab.local/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/courseshelf-web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/courseshelf-web:latest
          labels: |
            org.opencontainers.image.source=http://code.homelab.local/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
