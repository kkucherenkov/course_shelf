# Production reverse proxy.
#
# Folds web (nginx serving the static SPA on port 80) and the API
# (backend:3000) onto a single origin so the browser never sees a
# cross-origin request — no CORS preflights, no CORP issues on
# <video>/<track> when streaming lessons.

upstream cs_backend {
    server backend:3000;
}

upstream cs_web {
    server web:80;
}

server {
    listen 80 default_server;
    server_name _;

    # Allow reasonably large multipart bodies (library imports, etc.).
    client_max_body_size 100m;

    # Streaming endpoints first — disable proxy buffering so HTTP Range
    # and progressive download work without nginx pre-reading the
    # response (a 4 GB lesson video would otherwise stage in memory).
    location ~ ^/api/v1/stream/ {
        proxy_pass http://cs_backend;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
    }

    location /api/ {
        proxy_pass http://cs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA — the production web service is nginx serving static files on
    # port 80; just forward.
    location / {
        proxy_pass http://cs_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
