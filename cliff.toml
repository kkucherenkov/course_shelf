# git-cliff config — Conventional Commits → release notes.
#
# Wired by `.forgejo/workflows/release.yml` and `pnpm release:notes`.
# Groups by Conventional-Commit type (Features, Fixes, …) AND by the
# scopes enforced in commitlint.config.mjs (backend, web, ui, specs, …)
# so the changelog reads as "what changed where".
#
# Tag pattern matches the release workflow trigger: `vMAJOR.MINOR.PATCH-release`.

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.
The format follows Conventional Commits and is generated by `git-cliff`.

"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## Unreleased
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif -%}{{ commit.message | upper_first }}{% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     group = "Tests" },
  { message = "^build",    group = "Build" },
  { message = "^ci",       group = "CI" },
  { message = "^chore",    group = "Chores" },
  { message = "^style",    group = "Style" },
  { message = "^revert",   group = "Reverts" },
  # Anything else gets dropped (filter_unconventional = true).
]
filter_commits = false
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+-release$"
sort_commits = "newest"
