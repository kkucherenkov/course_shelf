# Local-dev reverse proxy.
#
# Folds the SPA (web:3001) and the API (backend:3000) onto a single origin
# (http://localhost:8080) so the browser sees same-origin requests:
#   * no CORS preflights
#   * no Cross-Origin-Resource-Policy gymnastics on <video>/<track>
#   * relative API URLs resolve correctly
#
# Direct access to web:3001 / backend:3000 still works (their host ports stay
# published) for tooling that needs to bypass the proxy.

upstream cs_backend {
    server backend:3000;
}

upstream cs_web {
    server web:3001;
}

# Map `Connection: upgrade` header for websockets (Vite HMR).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    # Allow large multipart bodies (e.g. file uploads, library imports).
    client_max_body_size 100m;

    # ── API: backend ────────────────────────────────────────────────────────
    # Streaming endpoints first — disable proxy buffering so HTTP Range and
    # progressive download work without nginx pre-reading the response.
    location ~ ^/api/v1/stream/ {
        proxy_pass http://cs_backend;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long enough for slow seeks / large mp4s.
        proxy_read_timeout 1h;
    }

    location /api/ {
        proxy_pass http://cs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── SPA: Nuxt dev server ────────────────────────────────────────────────
    # Catch-all. Vite HMR uses websockets — keep the Upgrade headers and a
    # generous read timeout so idle HMR sockets aren't reaped.
    location / {
        proxy_pass http://cs_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1d;
    }
}
