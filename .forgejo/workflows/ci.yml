name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  FLUTTER_VERSION: "3.41.0"

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage enforcement)
        run: pnpm test:coverage

  # ── Web ────────────────────────────────────────────────────────────────────
  web:
    name: Web (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      # design-tokens.generated.{ts,css} are gitignored — generated by
      # `pnpm design:build`. Without them, lint/typecheck see the
      # designTokens import as `error type` and fail with no-unsafe-*.
      - name: Build design tokens
        run: pnpm design:build
        working-directory: .

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # ── Spec validation ────────────────────────────────────────────────────────
  specs:
    name: OpenAPI / AsyncAPI spec validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate specs
        run: pnpm spec:validate

      - name: Bundle specs
        run: pnpm spec:bundle

  # ── UI quality (component audit) ──────────────────────────────────────────
  ui-quality:
    name: UI component audit (story + spec parity)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @app/ui imports tokens.generated.css from packages/ui/src — gitignored
      # output of `pnpm design:build`. Build it before any lint/typecheck/audit.
      - name: Build design tokens
        run: pnpm design:build

      - name: Audit components (story + spec completeness)
        run: pnpm --filter @app/ui audit:components

  # ── Security audit ─────────────────────────────────────────────────────────
  security-audit:
    name: Security audit (deps + secrets + licenses)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability scan
        run: pnpm audit --audit-level=critical

      - name: License compliance check
        run: pnpm dlx license-checker --excludePrivatePackages --onlyAllow 'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;Python-2.0;CC-BY-3.0;CC-BY-4.0'
