openapi: 3.1.0
info:
  title: App API
  version: 0.14.0
  description: |
    Spec-first HTTP API. Paths include the versioned prefix (`/api/v1`) so
    generated clients can be used without additional base-URL rewriting.

    **Authentication endpoints** live under `/api/v1/auth/*` and follow the
    [Better Auth protocol](https://www.better-auth.com/docs). They are
    deliberately not enumerated here: Better Auth owns that wire contract and
    evolves it independently of our OpenAPI surface. The `cookieAuth` and
    `bearerAuth` security schemes documented below describe how the *rest* of
    this API accepts credentials issued by that namespace — session cookies
    (web) and bearer tokens (mobile, via the `bearer` plugin).
  contact:
    name: App Team
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.example.com
    description: Production (placeholder)
tags:
  - name: Access
    description: User → resource access grants. Admins issue and revoke; everyone else only ever reads their own implicit grants from session context.
  - name: Catalog
    description: Course library registration and lookup.
  - name: Learning
    description: Per-user lesson progress, bookmarks, and notes.
  - name: Ops
    description: Operational endpoints for liveness checks and self-tests.
  - name: Streaming
    description: Lesson streaming and signed URLs.
  - name: system
    description: Health and liveness endpoints
  - name: admin
    description: "Administrator-only operations: dashboard, backups, configuration."
  - name: realtime
    description: Centrifugo connection tokens

paths:
  /api/v1/access/grants:
    post:
      operationId: registerGrant
      summary: Grant a user READ access to a library or course
      description: |
        Idempotent on (userId, target). Returns 409 if the same grant already
        exists. Only admins (`session.user.role === 'admin'`) may call this;
        other authenticated users get 403.
      tags: [Access]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterGrantRequest"
            examples:
              libraryGrant:
                summary: Grant READ access to Conference Recordings
                value:
                  userId: clxvusr0000000000000000001
                  target:
                    kind: library
                    libraryId: clxvp1234567890abcdefghij
                  level: READ
      responses:
        "201":
          description: Grant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessGrantDto"
              examples:
                created:
                  value:
                    id: clxvgnt0000000000000000001
                    userId: clxvusr0000000000000000001
                    target:
                      kind: library
                      libraryId: clxvp1234567890abcdefghij
                    level: READ
                    createdAt: "2026-04-25T10:00:00Z"
        "400":
          description: Validation error — missing or malformed fields
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badInput:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "target.kind must be 'library' or 'course'."
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may issue access grants.
        "404":
          description: Target library or course not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No library with that id exists.
        "409":
          description: A grant for this (userId, target) pair already exists
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                conflict:
                  value:
                    type: about:blank
                    title: Conflict
                    status: 409
                    detail: "A READ grant for user clxvusr0000000000000000001 on library clxvp1234567890abcdefghij already exists."

    get:
      operationId: listGrantsByUser
      summary: List a user's access grants
      description: Returns every grant issued to the given user, both library- and course-scoped.
      tags: [Access]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: true
          description: Better Auth user id whose grants should be returned.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Grant list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessGrantListDto"
              examples:
                list:
                  value:
                    items:
                      - id: clxvgnt0000000000000000001
                        userId: clxvusr0000000000000000001
                        target:
                          kind: library
                          libraryId: clxvp1234567890abcdefghij
                        level: READ
                        createdAt: "2026-04-25T10:00:00Z"
                      - id: clxvgnt0000000000000000002
                        userId: clxvusr0000000000000000001
                        target:
                          kind: course
                          courseId: clxvcrs0000000000000000001
                        level: READ
                        createdAt: "2026-04-25T10:05:00Z"
        "400":
          description: userId query parameter is missing or empty
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                missingUserId:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "Query parameter 'userId' is required."
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may list grants for arbitrary users.

  /api/v1/access/grants/{id}:
    delete:
      operationId: revokeGrant
      summary: Revoke an access grant
      description: Permanently removes the grant identified by `id`. The affected user immediately loses the access level the grant provided.
      tags: [Access]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the grant to revoke.
          schema:
            type: string
      responses:
        "204":
          description: Grant revoked — no body
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may revoke access grants.
        "404":
          description: Grant not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No grant with that id exists.

  /api/v1/admin/dashboard:
    get:
      operationId: getAdminDashboard
      summary: Operational snapshot for the admin dashboard
      description: |
        Returns counts of major entities (libraries, users, courses, lessons),
        a summary of the most recent scan (if any), and the count of scan
        errors collected in the last 24 hours. Read-only — no side effects.
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardDto"
              examples:
                populated:
                  summary: A platform with one library, two users, mid-scan
                  value:
                    generatedAt: "2026-04-27T10:30:00Z"
                    counts:
                      libraries: 1
                      users: 2
                      courses: 7
                      lessons: 184
                    latestScan:
                      scanId: clxvscn0000000000000000001
                      libraryId: clxvlib0000000000000000001
                      status: succeeded
                      startedAt: "2026-04-27T09:55:00Z"
                      finishedAt: "2026-04-27T09:58:12Z"
                      filesScanned: 312
                      errorsCount: 2
                    errorsLast24h: 2
                empty:
                  summary: Fresh install — no scans yet
                  value:
                    generatedAt: "2026-04-27T10:30:00Z"
                    counts:
                      libraries: 0
                      users: 1
                      courses: 0
                      lessons: 0
                    latestScan: null
                    errorsLast24h: 0
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller is authenticated but not an administrator
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Administrator role required.

  /api/v1/admin/scans:
    get:
      operationId: listAdminScans
      summary: List recent scans across every library
      description: |
        Ordered by `startedAt` descending (newest first). Used by the admin
        dashboard's "Recent scans" table. Cross-library — admin-only;
        non-admin actors see 403 even if they have READ grants on individual
        libraries. Capped at `limit` (default 20, max 100).
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of scans to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: libraryId
          in: query
          required: false
          description: >-
            When set, only return scans for the given library. Used by the
            admin library-detail page's scan-history table. Unknown library
            ids return an empty list (not 404 — the view is a filter, not
            a fetch).
          schema:
            type: string
      responses:
        "200":
          description: Recent-scans list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminScanListDto"
              examples:
                threeScans:
                  summary: Three scans from two libraries, one still running
                  value:
                    items:
                      - scanId: clxvscn0000000000000000003
                        libraryId: clxvlib0000000000000000001
                        libraryName: Computer Science
                        status: running
                        startedAt: "2026-04-27T10:25:00Z"
                        finishedAt: null
                        filesScanned: 412
                        coursesAdded: 2
                        errorsCount: 0
                      - scanId: clxvscn0000000000000000002
                        libraryId: clxvlib0000000000000000002
                        libraryName: Mathematics
                        status: succeeded
                        startedAt: "2026-04-27T09:55:00Z"
                        finishedAt: "2026-04-27T09:58:12Z"
                        filesScanned: 312
                        coursesAdded: 4
                        errorsCount: 2
                      - scanId: clxvscn0000000000000000001
                        libraryId: clxvlib0000000000000000001
                        libraryName: Computer Science
                        status: failed
                        startedAt: "2026-04-26T18:01:00Z"
                        finishedAt: "2026-04-26T18:01:05Z"
                        filesScanned: 0
                        coursesAdded: 0
                        errorsCount: 1
                empty:
                  summary: No scans have ever run
                  value:
                    items: []
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller is authenticated but not an administrator
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Administrator role required.

  /api/v1/admin/libraries:
    get:
      operationId: listAdminLibraries
      summary: List every library with admin-flavoured counters
      description: |
        Returns every library in the system enriched with the counts and
        last-scan summary the admin libraries page renders per row. Admin-
        only — `listLibraries` is the user-facing endpoint and respects
        per-library grants; this one bypasses grants because admins see
        everything.

        Per row:
          - `coursesCount` / `lessonsCount` are aggregate counts from the
            catalog (`Course.libraryId == library.id`).
          - `lastScan` is the most recent scan on the library (any status),
            or `null` when no scan has ever run.
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin library list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLibraryListDto"
              examples:
                twoLibraries:
                  value:
                    items:
                      - id: clxvlib0000000000000000001
                        name: Computer Science
                        rootPath: /srv/courses/computer-science
                        coursesCount: 14
                        lessonsCount: 312
                        lastScan:
                          status: succeeded
                          startedAt: "2026-04-27T09:55:00Z"
                          finishedAt: "2026-04-27T09:58:12Z"
                          errorsCount: 2
                      - id: clxvlib0000000000000000002
                        name: Mathematics
                        rootPath: /mnt/storage-2/math
                        coursesCount: 4
                        lessonsCount: 89
                        lastScan: null
                empty:
                  value:
                    items: []
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller is authenticated but not an administrator
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Administrator role required.

  /api/v1/admin/users:
    get:
      operationId: listAdminUsers
      summary: List every user in the platform
      description: |
        Admin-only listing for the admin users page. Ordered by `createdAt`
        descending (newest first). The optional `search` filter matches
        email and `name` substrings (case-insensitive). `role` values are
        normalised to lowercase (`admin`, `user`, `guest`) regardless of
        what the auth backend stamps on the row in the database — the SPA
        only cares about the canonical lowercase form.
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          description: Case-insensitive substring filter on `email` or `name`.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of users to return.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListDto"
              examples:
                twoUsers:
                  value:
                    items:
                      - id: 4248ce7d-a377-424b-b946-34cfd43dfffd
                        email: admin@example.com
                        name: Elena Lin
                        displayName: Elena
                        role: admin
                        banned: false
                        createdAt: "2026-04-25T09:00:00Z"
                        updatedAt: "2026-04-26T11:32:00Z"
                      - id: c0ffee00-0000-0000-0000-000000000001
                        email: user@example.com
                        name: Marco Bucci
                        displayName: null
                        role: user
                        banned: false
                        createdAt: "2026-04-26T10:00:00Z"
                        updatedAt: "2026-04-26T10:00:00Z"
                empty:
                  value:
                    items: []
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller is authenticated but not an administrator
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Administrator role required.

  /api/v1/admin/users/{id}:
    get:
      operationId: getAdminUser
      summary: Fetch a single user by id
      description: |
        Admin-only single-user fetch — used by the admin permissions page
        to show whose grants are being edited. Returns the same
        `AdminUserListItem` shape as the listing endpoint.
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User id (uuid).
          schema:
            type: string
      responses:
        "200":
          description: User row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListItem"
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller is authenticated but not an administrator
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Administrator role required.
        "404":
          description: User not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No user with that id exists.
    patch:
      operationId: updateAdminUser
      summary: Patch role and/or banned flag on a user
      description: |
        Inline mutation used by the admin users page's role chip. At least
        one of `role` or `banned` must be present. The auth backend stores
        roles in upper-case; this endpoint translates the lowercase request
        to the persisted format and back.

        Banning is a soft delete from the user's perspective — sessions are
        invalidated and sign-in fails until the flag is cleared. Removing
        the user record outright is a separate, deferred operation.
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User id (uuid).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserRequest"
            examples:
              promoteToAdmin:
                value:
                  role: admin
              banAccount:
                value:
                  banned: true
      responses:
        "200":
          description: Updated user row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListItem"
        "400":
          description: Validation error — empty body or unknown role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                emptyBody:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: At least one of `role` or `banned` must be set.
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller is authenticated but not an administrator
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Administrator role required.
        "404":
          description: User not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No user with that id exists.

  /api/v1/admin/has-users:
    get:
      operationId: getAdminHasUsers
      summary: Indicate whether any users exist in the platform
      description: |
        First-run probe. Returns `{ hasUsers: false }` when the database has
        zero users — the SPA uses this to force `/setup` (admin onboarding).
        Returns `{ hasUsers: true }` once at least one user exists, locking
        `/setup` and routing fresh visitors to `/sign-in`.

        No authentication is required: the very first request from a clean
        browser must succeed without credentials, and the response carries
        no sensitive information beyond a boolean.
      tags: [admin]
      security: []
      responses:
        "200":
          description: Boolean signalling whether at least one user exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HasUsersResponse"
              examples:
                empty:
                  summary: Fresh install — setup wizard required
                  value:
                    hasUsers: false
                populated:
                  summary: At least one user exists — setup is locked
                  value:
                    hasUsers: true

  /api/v1/admin/instance:
    get:
      operationId: getAdminInstance
      summary: Public instance configuration (self-registration, email verification, SSO providers)
      description: |
        Anonymous endpoint that exposes the three runtime toggles the auth
        UI needs to draw the right surface:

        - `selfRegistration` — when `false`, the sign-up entry points are
          hidden and `/sign-up` returns the user to `/sign-in`. Admin opts
          out via `AUTH_SELF_REGISTRATION=false`.
        - `emailVerificationRequired` — when `true`, the sign-up wizard
          renders step 2 (6-digit code). When `false`, sign-up jumps from
          step 1 (account) directly to step 3 (library setup). Mirrors
          Better Auth's `emailVerification` plugin toggle. Admin opts in
          via `AUTH_EMAIL_VERIFICATION=true`.
        - `ssoProviders` — array of OAuth/SSO providers configured for
          this instance. v1 ships `[]`; v2 lands Better Auth's
          `genericOAuth` plugin and the array starts to populate, lighting
          up the SsoBlock without UI changes.

        No authentication is required — the first GET from a clean browser
        decides whether the auth pages can even draw a sign-up CTA, and
        the response carries no sensitive information.
      tags: [admin]
      security: []
      responses:
        "200":
          description: Public instance configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceConfigDto"
              examples:
                defaults:
                  summary: Defaults — self-registration on, no email verification, no SSO
                  value:
                    selfRegistration: true
                    emailVerificationRequired: false
                    ssoProviders: []
                emailVerificationOn:
                  summary: Admin enabled email verification
                  value:
                    selfRegistration: true
                    emailVerificationRequired: true
                    ssoProviders: []
                lockedDown:
                  summary: Closed instance — sign-up disabled
                  value:
                    selfRegistration: false
                    emailVerificationRequired: false
                    ssoProviders: []

  /api/v1/bookmarks/{id}:
    patch:
      operationId: updateBookmark
      summary: Update a bookmark's position or label
      description: |
        Owner-only. At least one of `positionSeconds` / `label` must be present.
        Pass `label: null` to clear an existing label. The server returns 400 on
        empty patches (no fields provided).
      tags: [Learning]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the bookmark to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookmarkRequest"
            examples:
              moveAndRelabel:
                summary: Move position and update label
                value:
                  positionSeconds: 210
                  label: Aggregate boundaries explained
      responses:
        "200":
          description: Bookmark updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkDto"
              examples:
                updated:
                  value:
                    id: clxvbkm0000000000000000001
                    lessonId: clxvles0000000000000000001
                    positionSeconds: 210
                    label: Aggregate boundaries explained
                    createdAt: "2026-04-25T14:00:00Z"
                    updatedAt: "2026-04-25T14:05:00Z"
        "400":
          description: Empty patch — no fields provided
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                emptyPatch:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: At least one of positionSeconds or label must be present.
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
