# Production reverse proxy.
#
# Folds web (nginx serving the static SPA on port 80) and the API
# (backend:3000) onto a single origin so the browser never sees a
# cross-origin request — no CORS preflights, no CORP issues on
# <video>/<track> when streaming lessons.

upstream cs_backend {
    server backend:3000;
}

upstream cs_web {
    # The web container runs nginx-unprivileged, listening on 8080.
    server web:8080;
}

upstream cs_centrifugo {
    server centrifugo:8000;
}

# Map `Connection: upgrade` so WebSocket upgrade reaches Centrifugo.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    # 8080, not 80, because the proxy image is `nginx-unprivileged` and the
    # `nginx` user can't bind to privileged ports. The compose port-map
    # exposes `${PROXY_PORT}:8080` so operators still hit the canonical
    # public port (default 8080) on the host.
    listen 8080 default_server;
    server_name _;

    # Allow reasonably large multipart bodies (library imports, etc.).
    client_max_body_size 100m;

    # Streaming endpoints first — disable proxy buffering so HTTP Range
    # and progressive download work without nginx pre-reading the
    # response (a 4 GB lesson video would otherwise stage in memory).
    location ~ ^/api/v1/stream/ {
        proxy_pass http://cs_backend;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
    }

    location /api/ {
        proxy_pass http://cs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Centrifugo realtime WebSocket. The SPA reads its base URL from
    # /_app-config.js (see apps/web/docker-entrypoint.sh) and connects to
    # `${PUBLIC_BASE_URL}/centrifugo/connection/websocket`. We strip the
    # `/centrifugo` prefix on proxy_pass so Centrifugo sees its native
    # `/connection/websocket` path. Idle WS connections are kept open
    # for 1h — Centrifugo's own pings keep them healthy under that.
    location /centrifugo/ {
        proxy_pass http://cs_centrifugo/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # SPA — the production web service is nginx serving static files on
    # port 80; just forward.
    location / {
        proxy_pass http://cs_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
