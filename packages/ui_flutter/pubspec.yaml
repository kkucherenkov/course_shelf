name: app_ui
description: "Brand UI primitives and compositions for the Flutter app, colocated with a Widgetbook sandbox."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  # Renders the brand icon family from verbatim SVG markup (E17-F01-S01).
  # A regular (not dev) dependency: IconCS lives in lib/ and needs it at runtime.
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  widgetbook: ^3.14.3
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  fonts:
    - family: IBM Plex Sans
      fonts:
        - asset: fonts/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: fonts/IBMPlexSans-Bold.ttf
          weight: 700
    - family: IBM Plex Mono
      fonts:
        - asset: fonts/IBMPlexMono-Regular.ttf
          weight: 400
