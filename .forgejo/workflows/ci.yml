name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  # ── Checks (consolidated lint · typecheck · test · specs · ui audit) ──────
  # One job sharing one pnpm install + one design:build + one prisma generate.
  # turbo handles parallelism across packages within the job.
  #
  # Per-package pnpm filter commands instead of `turbo run …` to avoid
  # turbo's transitive `^build` → `@app/specs#codegen` chain (codegen
  # needs Java + Flutter; the committed generated clients make it
  # unnecessary at check-time). Coverage matches the pre-consolidation CI
  # exactly: backend + web for lint/typecheck/test, ui for audit; plus the
  # extra quality gates we fix manually today (design:audit, format).
  checks:
    name: Checks (lint · typecheck · test · specs · ui audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @app/backend prisma:generate

      - name: Build design tokens
        run: pnpm design:build

      - name: Validate + bundle specs
        run: pnpm spec:validate && pnpm spec:bundle

      # Backend + web ESLint are independent — run in parallel and `wait` on
      # both. Time becomes max(backend, web) instead of sum (~halves the step
      # at the cost of a slightly noisier log when both fail). `set -e` +
      # explicit `wait $pid` propagate the first non-zero exit.
      - name: Lint (ESLint, backend + web in parallel)
        run: |
          set -e
          pnpm --filter @app/backend run lint &
          BACK_PID=$!
          pnpm --filter @app/web run lint &
          WEB_PID=$!
          wait $BACK_PID
          wait $WEB_PID

      - name: Typecheck
        run: |
          pnpm --filter @app/backend run typecheck
          pnpm --filter @app/web run typecheck

      - name: Test
        run: |
          pnpm --filter @app/backend run test:coverage
          pnpm --filter @app/web run test

      - name: UI components audit
        run: pnpm --filter @app/ui audit:components

      # Reporting mode (no --strict) — catches inventory drift between
      # specs/design/README.md and the @app/ui Vue components without
      # failing CI on a minor mismatch. Flip the script to `--strict`
      # once the inventory stabilises.
      - name: Design inventory audit
        run: pnpm design:audit

      - name: Prettier check
        run: pnpm format:check

      # Cheap per-PR security signal — deps are already installed above, so
      # this adds only a couple of seconds. The heavier license-checker (a
      # `pnpm dlx` download) and the Storybook visual-regression run live in
      # the on-demand `quality.yml` workflow to keep PR CI fast on the
      # homelab runner.
      - name: Dependency vulnerability scan (critical only)
        run: pnpm audit --audit-level=critical
