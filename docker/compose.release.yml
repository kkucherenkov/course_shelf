# Release deployment — pulls pre-built images from GitHub Container Registry.
#
# Usage:
#   1. Download the artefacts attached to the GitHub/Forgejo release:
#        compose-release-vX.Y.Z.yml  (this file, with RELEASE_TAG pinned)
#        .env.release.example
#   2. Copy the env example to `.env` and fill the required values.
#   3. Pull + start:
#        docker compose --env-file .env -f compose-release-vX.Y.Z.yml pull
#        docker compose --env-file .env -f compose-release-vX.Y.Z.yml up -d
#
# RELEASE_TAG defaults to `latest` when this file is committed; the release
# workflow renders a per-tag copy where it points at the exact semver
# (e.g. 0.2.0) and uploads that as a release asset.
#
# Layout mirrors compose.prod.yml — only the build sources are swapped for
# pre-built images, and Centrifugo gains a wrapper entrypoint that
# templates its config from env vars instead of mounting a hardcoded JSON.
#
# Course content lives on the host at $COURSES_PATH and is bind-mounted
# read-only into the backend at /data/courses.

name: "courseshelf-release"

networks:
  cs-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:

services:
  postgres:
    image: postgres:18.1-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-courseshelf}"
      POSTGRES_USER: "${POSTGRES_USER:-courseshelf}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-courseshelf} -d ${POSTGRES_DB:-courseshelf}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [cs-net]

  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [cs-net]

  centrifugo:
    image: centrifugo/centrifugo:v6
    restart: unless-stopped
    environment:
      CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: "${PUBLIC_BASE_URL}"
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: "${CENTRIFUGO_TOKEN_HMAC_SECRET:?CENTRIFUGO_TOKEN_HMAC_SECRET is required}"
      CENTRIFUGO_HTTP_API_KEY: "${CENTRIFUGO_API_KEY:?CENTRIFUGO_API_KEY is required}"
      CENTRIFUGO_ADMIN_ENABLED: "false"
      CENTRIFUGO_HEALTH_ENABLED: "true"
      CENTRIFUGO_LOG_LEVEL: "${CENTRIFUGO_LOG_LEVEL:-info}"
      # Application contract: hardcoded namespaces, NOT in operator's .env.
      CENTRIFUGO_CHANNEL_NAMESPACES: '[{"name":"system","presence":true,"history_size":10,"history_ttl":"60s"},{"name":"library","presence":false,"history_size":0},{"name":"notes","presence":false,"history_size":0},{"name":"progress","presence":false,"history_size":0},{"name":"notifications","presence":false,"history_size":0}]'
    ulimits:
      nofile: { soft: 65536, hard: 65536 }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [cs-net]

  backend:
    image: "${REGISTRY:-ghcr.io}/${REGISTRY_NAMESPACE:-kkucherenkov}/courseshelf-backend:${RELEASE_TAG:-latest}"
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      centrifugo: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-courseshelf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-courseshelf}"
      REDIS_URL: "redis://redis:6379/0"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required (openssl rand -hex 32)}"
      BETTER_AUTH_URL: "${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required (e.g. https://courseshelf.example.com)}"
      BETTER_AUTH_BASE_PATH: /api/v1/auth
      AUTH_SELF_REGISTRATION: "${AUTH_SELF_REGISTRATION:-false}"
      AUTH_EMAIL_VERIFICATION: "${AUTH_EMAIL_VERIFICATION:-false}"
      CENTRIFUGO_API_URL: http://centrifugo:8000/api
      CENTRIFUGO_API_KEY: "${CENTRIFUGO_API_KEY}"
      CENTRIFUGO_TOKEN_HMAC_SECRET: "${CENTRIFUGO_TOKEN_HMAC_SECRET}"
      CENTRIFUGO_TOKEN_TTL_SECONDS: "${CENTRIFUGO_TOKEN_TTL_SECONDS:-300}"
      CORS_ORIGINS: "${PUBLIC_BASE_URL}"
    volumes:
      - "${COURSES_PATH:?COURSES_PATH is required (host directory holding your courses)}:/data/courses:ro"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- --server-response http://127.0.0.1:3000/api/v1/health 2>&1 | grep -E 'HTTP/1\.[01] (200|503)'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks: [cs-net]

  web:
    image: "${REGISTRY:-ghcr.io}/${REGISTRY_NAMESPACE:-kkucherenkov}/courseshelf-web:${RELEASE_TAG:-latest}"
    restart: unless-stopped
    depends_on:
      backend: { condition: service_started }
    environment:
      APP_API_BASE_URL: "${PUBLIC_BASE_URL}/api/v1"
      APP_AUTH_BASE_URL: "${PUBLIC_BASE_URL}"
      APP_CENTRIFUGO_URL: "${PUBLIC_BASE_URL}/centrifugo/connection/websocket"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/_app-config.js"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s
    networks: [cs-net]

  proxy:
    image: "${REGISTRY:-ghcr.io}/${REGISTRY_NAMESPACE:-kkucherenkov}/courseshelf-proxy:${RELEASE_TAG:-latest}"
    restart: unless-stopped
    depends_on:
      backend: { condition: service_started }
      web: { condition: service_started }
    ports:
      # Container listens on 8080 (nginx-unprivileged); the host-side
      # PROXY_PORT controls what operators expose externally.
      - "${PROXY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [cs-net]
