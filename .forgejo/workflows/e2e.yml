name: E2E smoke

on:
  workflow_dispatch:
  schedule:
    # Nightly at 03:00 UTC — gives us a daily signal without slowing PRs.
    - cron: "0 3 * * *"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  smoke:
    name: Playwright smoke (web + backend health)
    runs-on: ubuntu-latest
    # No `container:` here — this job runs `docker compose up` against the
    # runner's docker daemon, so it MUST execute on the runner image (which
    # has the docker CLI mounted). Playwright browsers + system deps are
    # installed explicitly below via `playwright install --with-deps chromium`
    # — the previous mcr.microsoft.com/playwright image had Chromium baked
    # in but no docker CLI, which is why `docker compose up` failed with
    # `docker: command not found`.
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium + system deps)
        run: pnpm exec playwright install --with-deps chromium

      - name: Prisma generate
        run: pnpm --filter @app/backend prisma:generate

      # Force-pull only the truly external images (redis, otel-lgtm).
      # postgres + centrifugo are now buildable (compose.ci.yml + base
      # compose.yml respectively); backend + web are built from
      # apps/*/Dockerfile production images via compose.ci.yml. All
      # buildable services pull their FROM bases during `--build` below.
      - name: Pull external images
        run: docker compose -f docker/compose.yml -f docker/compose.ci.yml pull --quiet redis otel-lgtm

      # CI override (docker/compose.ci.yml) replaces dev-mode bind-mount
      # services with production-shaped builds. The base compose.yml is
      # the dev-mode stack; running both files merges them with the
      # override winning on overlapping keys. See compose.ci.yml's
      # header comment for the DinD root-cause writeup.
      #
      # Explicit service list — the base compose.yml also defines `proxy`
      # (bind-mounts nginx/default.conf) and `storybook` (dev image, not
      # needed for e2e). Listing services here skips them so `--wait`
      # doesn't time out on a service we don't care about and don't fix
      # in compose.ci.yml.
      #
      # `--wait` blocks until every listed service with a healthcheck is
      # healthy (or hits its retry budget). `--wait-timeout 600` gives
      # backend up to 10 minutes for `prisma migrate deploy` + Nest
      # bootstrap + first /health probe to flip green on a cold image
      # cache.
      - name: Bring up docker stack
        run: |
          docker compose -f docker/compose.yml -f docker/compose.ci.yml \
            up -d --build --wait --wait-timeout 600 \
            postgres redis centrifugo otel-lgtm backend web

      # Attach the act_runner job container to the compose project's bridge
      # network so Playwright + curl can reach services by container name
      # (`web:8080`, `backend:3000`) over docker DNS. Previously this
      # workflow detected the docker bridge default gateway from
      # /proc/net/route and reached the host's published ports
      # (`${HOST_IP}:3001`) — that worked on coriolis_app's runner but
      # fails intermittently here with ECONNREFUSED while containers
      # report `restarts=0` and healthy. The host-port route relies on
      # docker's iptables DNAT chain holding stable under concurrent
      # job-container traffic; bypassing it entirely by joining the
      # compose network removes that whole class of flake.
      #
      # `hostname` inside the runner returns the runner container's ID,
      # which is also a valid docker target. Project name = `course-shelf`
      # (from compose.yml `name:`), so the full network name is
      # `course-shelf_course-shelf-net`.
      - name: Attach runner to compose network
        run: |
          set -e
          NET="course-shelf_course-shelf-net"
          docker network connect "$NET" "$(hostname)"
          echo "Connected runner ($(hostname)) to $NET"
          docker network inspect "$NET" --format '{{ range .Containers }}{{ .Name }} {{ .IPv4Address }}{{ "\n" }}{{ end }}'

      - name: Verify backend health via compose DNS
        run: |
          curl -fsS "http://backend:3000/api/v1/health"
          echo

      - name: Verify web via compose DNS
        run: |
          curl -fsS "http://web:8080/" > /dev/null
          echo "web reachable on web:8080"

      # Playwright config (tests/e2e/playwright.config.ts) reads
      # E2E_WEB_URL for `use.baseURL`. The smoke specs mock every backend
      # response with `page.route('**/api/v1/...')` so the SPA never
      # actually hits the backend — but Chromium still needs the SPA
      # reachable. With the runner attached to the compose network,
      # Chromium resolves `web` and `backend` via docker's embedded DNS
      # and connects to the container's internal ports directly,
      # bypassing the host-published port DNAT chain.
      - name: Run Playwright smoke
        env:
          E2E_WEB_URL: "http://web:8080"
          E2E_BACKEND_URL: "http://backend:3000"
        run: pnpm e2e

      # Post-run diagnostics — always run, even on failure. Captures
      # container restart counts + final health state to help debug
      # ECONNREFUSED-style flakes where a service was healthy at `--wait`
      # but went down mid-test (OOM kill, segfault, healthcheck flap).
      # `Restarts` > 0 on web/backend confirms container churn during the
      # Playwright run.
      - name: Container state after Playwright
        if: always()
        run: |
          echo "===== docker compose ps ====="
          docker compose -f docker/compose.yml -f docker/compose.ci.yml ps
          echo
          echo "===== restart counts ====="
          for svc in centrifugo postgres redis otel-lgtm backend web; do
            cid="$(docker compose -f docker/compose.yml -f docker/compose.ci.yml ps -q "$svc" 2>/dev/null || true)"
            if [ -n "$cid" ]; then
              restarts="$(docker inspect "$cid" --format '{{.RestartCount}}' 2>/dev/null || echo '?')"
              health="$(docker inspect "$cid" --format '{{.State.Health.Status}}' 2>/dev/null || echo 'none')"
              status="$(docker inspect "$cid" --format '{{.State.Status}}' 2>/dev/null || echo '?')"
              printf '%-12s status=%-10s health=%-10s restarts=%s\n' "$svc" "$status" "$health" "$restarts"
            fi
          done
          echo
          echo "===== docker stats snapshot ====="
          docker stats --no-stream --format 'table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 7

      # Dump every service's logs on failure — not just backend. The first
      # casualty when something goes wrong is often centrifugo / postgres /
      # redis startup, and `dependency failed to start` propagates a useless
      # error to the backend status without explaining which dep died.
      - name: Dump service logs on failure
        if: failure()
        run: |
          for svc in centrifugo postgres redis otel-lgtm backend web; do
            echo "===== $svc ====="
            docker compose -f docker/compose.yml -f docker/compose.ci.yml logs --tail=200 "$svc" 2>&1 || true
            echo
            echo "----- $svc inspect (health, exit code, …) -----"
            cid="$(docker compose -f docker/compose.yml -f docker/compose.ci.yml ps -q "$svc" 2>/dev/null || true)"
            if [ -n "$cid" ]; then
              docker inspect "$cid" --format '{{json .State}}' 2>&1 | head -c 4000 || true
              echo
            fi
            echo
          done

      - name: Tear down
        if: always()
        run: docker compose -f docker/compose.yml -f docker/compose.ci.yml down -v
