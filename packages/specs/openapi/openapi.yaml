    patch:
      operationId: updateLibrary
      summary: Rename a library
      description: |
        Admin-only mutation. Currently only the `name` field is mutable —
        changing `rootPath` would invalidate every scan and break stream
        URLs minted before the change, so it is intentionally not exposed
        here. Re-create the library if the disk path needs to change.
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the library.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLibraryRequest"
            examples:
              rename:
                value:
                  name: Conference Recordings (2026)
      responses:
        "200":
          description: Updated library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryDto"
        "400":
          description: Validation error — empty body or invalid name
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                emptyBody:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: At least one of `name` must be set.
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller is authenticated but not an administrator
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Administrator role required.
        "404":
          description: Library not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No library with that id exists.
    delete:
      operationId: removeLibrary
      summary: Hard-delete a library and every dependent row
      description: |
        Admin-only destructive operation. Cascades through scans, courses
        (with sections/lessons/materials/subtitles), per-user progress,
        bookmarks, notes, and access grants. Files on disk are NOT touched
        — the library only exists in the DB; deletion just unlinks the
        folder from CourseShelf.

        The cascade lives in a single Prisma `$transaction` so partial
        failures roll back. Idempotent: deleting an already-deleted id
        returns 404.
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the library.
          schema:
            type: string
      responses:
        "204":
          description: Library deleted
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller is authenticated but not an administrator
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Administrator role required.
        "404":
          description: Library not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No library with that id exists.

  /api/v1/libraries/{id}/scans:
    post:
      operationId: runLibraryScan
      summary: Trigger a scan of a library
      description: |
        Walks the library tree, recognises Course / Section / Lesson layout,
        and records discoveries on a Scan aggregate. Returns 202 immediately
        with `status: running`; clients poll
        `GET /libraries/{id}/scans/latest`. A second scan with no filesystem
        changes is observably a no-op (`filesAdded` and `filesUpdated` are
        zero).
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the library to scan.
          schema:
            type: string
      responses:
        "202":
          description: Scan accepted and running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanDto"
              examples:
                accepted:
                  value:
                    id: clxvscn0000000000000000001
                    libraryId: clxvp1234567890abcdefghij
                    status: running
                    startedAt: "2026-04-25T10:30:00Z"
                    filesScanned: 0
                    filesAdded: 0
                    filesUpdated: 0
                    coursesDiscovered: 0
                    errors: []
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may trigger library scans.
        "404":
          description: Library not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No library with that id exists.
        "409":
          description: A scan is already running for this library
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                conflict:
                  value:
                    type: about:blank
                    title: Conflict
                    status: 409
                    detail: A scan is already running for library clxvp1234567890abcdefghij.

