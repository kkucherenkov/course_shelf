name: CI

# CI for github.com/kkucherenkov/course_shelf — the sole repo since the
# self-hosted Forgejo was dropped on 2026-07-14. This file is the only CI that
# runs; `.forgejo/workflows/` is dead and pending deletion, so do NOT keep this
# in lockstep with it.
#
# Runners are free for public repos, so everything gates here: the consolidated
# `checks` job, codegen drift with a full Flutter toolchain, the Flutter
# analyze/test/golden job, trufflehog, license check and the vulnerability scan.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  # Must match the version goldens are generated with — golden PNGs are
  # rendering-engine artefacts, so a version skew fails them for reasons that
  # have nothing to do with the code. Bump here, in .claude/CLAUDE.md, and in
  # both pubspec floors together.
  FLUTTER_VERSION: "3.44.4"

jobs:
  # ── Checks (consolidated lint · typecheck · test · specs · ui audit) ──────
  # Kept in lockstep with .forgejo/workflows/ci.yml — one job sharing one
  # pnpm install + one design:build + one prisma generate.
  checks:
    name: Checks (lint · typecheck · test · specs · ui audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @app/backend prisma:generate

      - name: Build design tokens
        run: pnpm design:build

      - name: Validate + bundle specs
        run: pnpm spec:validate && pnpm spec:bundle

      - name: Lint (ESLint, backend + web in parallel)
        run: |
          set -e
          pnpm --filter @app/backend run lint &
          BACK_PID=$!
          pnpm --filter @app/web run lint &
          WEB_PID=$!
          wait $BACK_PID
          wait $WEB_PID

      - name: Typecheck
        run: |
          pnpm --filter @app/backend run typecheck
          pnpm --filter @app/web run typecheck

      # Backend keeps `test:coverage` explicitly — its `test` script omits
      # coverage, and the text reporter is useful in the log (there are no
      # thresholds, so this is reporting, not a gate).
      #
      # Everything else goes through turbo, which discovers every package with
      # a `test` script. The previous version named packages one by one and so
      # never ran @app/ui's 852 tests — they were invisible for as long as they
      # existed, and were in fact broken until #140 bumped vite/nuxt. An
      # inverted filter cannot silently omit a package the way a hand-written
      # list can.
      - name: Test
        run: |
          pnpm --filter @app/backend run test:coverage
          pnpm exec turbo run test --filter='!@app/backend'

      - name: UI components audit
        run: pnpm --filter @app/ui audit:components

      - name: Design inventory audit
        run: pnpm design:audit

      - name: Prettier check
        run: pnpm format:check

  # ── Codegen drift guard ────────────────────────────────────────────────────
  # GitHub-only: needs the full Flutter + Java toolchain (Dart client
  # generation), which the homelab runner deliberately avoids — the
  # committed generated clients make codegen unnecessary at check-time
  # there. Here it's a free second opinion that the committed clients
  # match the spec.
  codegen-drift:
    name: Codegen drift guard
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate clients
        run: pnpm spec:codegen

      - name: Fail if generated clients drifted from committed sources
        run: |
          git diff --exit-code -- packages/api-client-ts packages/api-client-dart \
            || (echo '::error::Generated clients are out of date. Run `pnpm spec:codegen` locally and commit the diff.' && exit 1)

  # ── Flutter (analyze · test · goldens) ─────────────────────────────────────
  # Nothing ran Flutter before this job existed: neither Flutter package has a
  # package.json, so `turbo run test` cannot see them, and the only gate was a
  # checkbox in the PR template. #138 merged 2977 lines of Flutter, 22 tests and
  # 2 goldens with no check exercising any of it.
  #
  # No Node/pnpm needed — tokens.g.dart is committed, so nothing has to run
  # `pnpm design:build` first.
  flutter:
    name: Flutter (analyze · test · goldens)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # ui_flutter first: it is the dependency, and its goldens are where a
      # token/theme regression surfaces.
      - name: ui_flutter — analyze
        working-directory: packages/ui_flutter
        run: flutter pub get && flutter analyze

      - name: ui_flutter — test (incl. goldens)
        working-directory: packages/ui_flutter
        run: flutter test

      - name: mobile — analyze
        working-directory: apps/mobile
        run: flutter pub get && flutter analyze

      - name: mobile — test
        working-directory: apps/mobile
        run: flutter test

      # golden_toolkit writes pixel diffs to test/**/failures/. A golden
      # failure you cannot see only tells you "pixels changed", which is not
      # enough to decide whether to accept or fix.
      - name: Upload golden failure diffs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: golden-failures
          path: |
            packages/ui_flutter/test/**/failures/**
            apps/mobile/test/**/failures/**
          if-no-files-found: ignore
          retention-days: 7

  # ── Security (secrets + licenses + vulnerabilities) ────────────────────────
  security:
    name: Security (secret scan · license audit · vulnerabilities)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scanning
        # Pinned release tag (not @main) — supply-chain hygiene for an
        # action that reads the full git history.
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          path: ./
          # On PR: diff PR base → HEAD. On push: diff previous commit → HEAD.
          # Avoid BASE==HEAD which trufflehog rejects with exit 1.
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

      # Allowlist matches .forgejo/workflows/quality.yml (incl. the
      # defensive MPL-2.0 entry for @axe-core/playwright).
      - name: License compliance check
        run: pnpm dlx license-checker --excludePrivatePackages --onlyAllow 'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;Python-2.0;CC-BY-3.0;CC-BY-4.0;MPL-2.0'

      # Replaces `pnpm audit`, which is permanently broken: npm retired the
      # legacy audit endpoints (410 since 2026-07-15) and pnpm still calls
      # them — reproduced on pnpm 10.33.0, 10.34.5 and 11.13.0, so no upgrade
      # fixes it. See https://github.com/pnpm/pnpm/issues/11265.
      #
      # osv-scanner reads pnpm-lock.yaml directly and queries osv.dev, so it
      # depends on no npm endpoint. Pinned tag, same supply-chain hygiene as
      # trufflehog above.
      #
      # It exits 1 on ANY finding and has no severity threshold flag, so the
      # gate is applied below: fail on CRITICAL or HIGH. That raises the old
      # `--audit-level=critical` bar — the tree is clean at both levels as of
      # #140, which cleared CVE-2024-21534 plus 35 high-severity advisories.
      # MODERATE/LOW are reported in the log but do not fail the build.
      - name: Dependency vulnerability scan (critical + high)
        run: |
          docker run --rm -v "${{ github.workspace }}:/src:ro" \
            ghcr.io/google/osv-scanner:v2.3.8 \
            scan source --lockfile=/src/pnpm-lock.yaml --format=json > osv.json || true

          if [ ! -s osv.json ]; then
            echo '::error::osv-scanner produced no output — treating as a scan failure rather than a pass.'
            exit 1
          fi

          jq -r '
            [ .results[]?.packages[]?
              | .package as $p
              | .vulnerabilities[]?
              | select((.database_specific.severity // "") as $s
                       | $s == "CRITICAL" or $s == "HIGH")
              | "\(.database_specific.severity)\t\($p.name)@\($p.version)\t\(.id)"
            ] | unique | .[]
          ' osv.json > gated.txt

          echo "Advisories by severity:"
          jq -r '[.results[]?.packages[]?.vulnerabilities[]?.database_specific.severity // "UNKNOWN"]
                 | group_by(.) | map("  \(.[0]): \(length)") | .[]' osv.json

          if [ -s gated.txt ]; then
            echo '::error::Critical or high-severity advisories found:'
            cat gated.txt
            exit 1
          fi
          echo 'No critical or high-severity advisories.'
