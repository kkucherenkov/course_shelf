# Production deployment for self-hosted CourseShelf.
#
# Usage:
#   1. Copy `.env.production.example` to `.env.production` at the repo root.
#   2. Fill in secrets (BETTER_AUTH_SECRET, CENTRIFUGO_*, COURSES_PATH).
#   3. From the repo root:
#        docker compose --env-file .env.production -f docker/compose.prod.yml up -d --build
#   4. Browse to http://localhost:${PROXY_PORT:-8080}.
#
# Layout:
#   - postgres / redis / centrifugo: stateful services, named volumes.
#   - backend / web: built from this repo (multi-stage Dockerfiles).
#   - proxy: nginx folding web + backend onto a single origin (PROXY_PORT).
#
# Course content lives on the host at $COURSES_PATH and is bind-mounted
# read-only into the backend at /data/courses. Admins point libraries
# inside that path from the SPA. Re-mount with a different host folder
# to swap content without rebuilding any image.

name: "courseshelf"

networks:
  cs-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:

services:
  postgres:
    image: postgres:18.1-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-courseshelf}"
      POSTGRES_USER: "${POSTGRES_USER:-courseshelf}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-courseshelf} -d ${POSTGRES_DB:-courseshelf}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [cs-net]

  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [cs-net]

  centrifugo:
    image: centrifugo/centrifugo:v6
    restart: unless-stopped
    environment:
      # client.allowed_origins — space-separated list (centrifugo v6 native)
      CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: "${PUBLIC_BASE_URL}"
      # client.token.hmac_secret_key — used to verify connection tokens issued by the backend
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: "${CENTRIFUGO_TOKEN_HMAC_SECRET}"
      # http_api.key — backend → centrifugo publish authorization
      CENTRIFUGO_HTTP_API_KEY: "${CENTRIFUGO_API_KEY}"
      CENTRIFUGO_ADMIN_ENABLED: "false"
      CENTRIFUGO_HEALTH_ENABLED: "true"
      CENTRIFUGO_LOG_LEVEL: "${CENTRIFUGO_LOG_LEVEL:-info}"
      # channel.namespaces — JSON array of objects. Hardcoded here, not in
      # .env: namespaces are part of the application contract (backend
      # publishes to these names), so they live with the compose file, not
      # with operator-facing secrets.
      CENTRIFUGO_CHANNEL_NAMESPACES: '[{"name":"system","presence":true,"history_size":10,"history_ttl":"60s"},{"name":"library","presence":false,"history_size":0},{"name":"notes","presence":false,"history_size":0},{"name":"progress","presence":false,"history_size":0},{"name":"notifications","presence":false,"history_size":0}]'
    ulimits:
      nofile: { soft: 65536, hard: 65536 }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [cs-net]

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      centrifugo: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-courseshelf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-courseshelf}"
      REDIS_URL: "redis://redis:6379/0"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required (openssl rand -hex 32)}"
      BETTER_AUTH_URL: "${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required (e.g. https://courseshelf.example.com)}"
      BETTER_AUTH_BASE_PATH: /api/v1/auth
      AUTH_SELF_REGISTRATION: "${AUTH_SELF_REGISTRATION:-false}"
      AUTH_EMAIL_VERIFICATION: "${AUTH_EMAIL_VERIFICATION:-false}"
      CENTRIFUGO_API_URL: http://centrifugo:8000/api
      CENTRIFUGO_API_KEY: "${CENTRIFUGO_API_KEY:?CENTRIFUGO_API_KEY is required}"
      CENTRIFUGO_TOKEN_HMAC_SECRET: "${CENTRIFUGO_TOKEN_HMAC_SECRET:?CENTRIFUGO_TOKEN_HMAC_SECRET is required}"
      CENTRIFUGO_TOKEN_TTL_SECONDS: "${CENTRIFUGO_TOKEN_TTL_SECONDS:-300}"
      CORS_ORIGINS: "${PUBLIC_BASE_URL}"
    volumes:
      # Course content lives on the host. Mount read-only — the backend
      # only ever reads files from libraries; writes go to the DB.
      - "${COURSES_PATH:?COURSES_PATH is required (host directory holding your courses)}:/data/courses:ro"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- --server-response http://127.0.0.1:3000/api/v1/health 2>&1 | grep -E 'HTTP/1\.[01] (200|503)'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks: [cs-net]

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      backend: { condition: service_started }
    environment:
      # Both URLs share the proxy origin so the browser sees a single
      # origin (no CORS, no CORP).
      APP_API_BASE_URL: "${PUBLIC_BASE_URL}/api/v1"
      APP_AUTH_BASE_URL: "${PUBLIC_BASE_URL}"
      # Centrifugo WebSocket URL for the browser. The proxy folds it onto
      # the same origin (`docker/nginx/prod.conf` routes `/centrifugo/` →
      # `centrifugo:8000`) so no separate hostname is needed.
      APP_CENTRIFUGO_URL: "${PUBLIC_BASE_URL}/centrifugo/connection/websocket"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/_app-config.js"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s
    networks: [cs-net]

  proxy:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      backend: { condition: service_started }
      web: { condition: service_started }
    ports:
      # Container listens on 8080 (nginx-unprivileged); the host-side
      # PROXY_PORT controls what operators expose externally.
      - "${PROXY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [cs-net]
