name: E2E smoke

on:
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate Playwright visual baselines under tests/e2e/*-snapshots/ and commit them back to the branch. Use after the foundations visual regression test fails for legitimate reasons (font/glyph drift, a redesign landed)."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # Nightly at 03:00 UTC — gives us a daily signal without slowing PRs.
    - cron: "0 3 * * *"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # Needed for the regen path below to push the captured baselines back.
  contents: write

env:
  NODE_VERSION: "24"

jobs:
  smoke:
    name: Playwright smoke (web + backend health)
    runs-on: ubuntu-latest
    # No `container:` here — this job runs `docker compose up` against the
    # runner's docker daemon, so it MUST execute on the runner image (which
    # has the docker CLI mounted). Playwright browsers + system deps are
    # installed explicitly below via `playwright install --with-deps chromium`
    # — the previous mcr.microsoft.com/playwright image had Chromium baked
    # in but no docker CLI, which is why `docker compose up` failed with
    # `docker: command not found`.
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          # `fetch-depth: 0` lets the regen path rebase + push without
          # a shallow-clone error. No-op cost on the nightly run.
          fetch-depth: 0
          token: ${{ secrets.GITEA_TOKEN }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium + system deps)
        run: pnpm exec playwright install --with-deps chromium

      - name: Prisma generate
        run: pnpm --filter @app/backend prisma:generate

      # The act_runner runs this workflow inside a job container, whose
      # `localhost` is NOT the same as the host docker daemon's. The
      # compose stack publishes ports on the host; from the job container
      # we reach them via the docker bridge default gateway (which IS the
      # host). E2E_HOST is then propagated into compose (used by
      # compose.ci.yml's APP_* env vars) and into Playwright's baseURL
      # via E2E_WEB_URL / E2E_BACKEND_URL.
      - name: Detect docker bridge gateway (host from inside the job container)
        run: |
          set -e
          # Read /proc/net/route directly — `ip` / `route` / `netstat` are
          # not guaranteed to be in the act_runner job-container image. The
          # default route row has Destination=00000000; Gateway (col 3) is
          # a little-endian hex IPv4. Pluck the hex, reverse byte pairs,
          # and let `printf %d` do the hex→decimal lift (POSIX-portable;
          # no gawk `strtonum` or other extensions required).
          HEX="$(awk '$2 == "00000000" { print $3; exit }' /proc/net/route)"
          if [ -z "$HEX" ] || [ "${#HEX}" -ne 8 ]; then
            echo "could not parse default gateway from /proc/net/route"
            cat /proc/net/route
            exit 1
          fi
          HOST_IP="$(printf '%d.%d.%d.%d' \
            "0x${HEX:6:2}" "0x${HEX:4:2}" "0x${HEX:2:2}" "0x${HEX:0:2}")"
          echo "E2E_HOST=$HOST_IP" >> "$GITHUB_ENV"
          echo "Using E2E_HOST=$HOST_IP"

      # Force-pull only the truly external images (redis, otel-lgtm).
      # postgres + centrifugo are now buildable (compose.ci.yml + base
      # compose.yml respectively); backend + web are built from
      # apps/*/Dockerfile production images via compose.ci.yml. All
      # buildable services pull their FROM bases during `--build` below.
      - name: Pull external images
        run: docker compose -f docker/compose.yml -f docker/compose.ci.yml pull --quiet redis otel-lgtm

      # CI override (docker/compose.ci.yml) replaces dev-mode bind-mount
      # services with production-shaped builds. The base compose.yml is
      # the dev-mode stack; running both files merges them with the
      # override winning on overlapping keys. See compose.ci.yml's
      # header comment for the DinD root-cause writeup.
      #
      # Explicit service list — the base compose.yml also defines `proxy`
      # (bind-mounts nginx/default.conf) and `storybook` (dev image, not
      # needed for e2e). Listing services here skips them so `--wait`
      # doesn't time out on a service we don't care about and don't fix
      # in compose.ci.yml.
      #
      # `--wait` blocks until every listed service with a healthcheck is
      # healthy (or hits its retry budget). `--wait-timeout 600` gives
      # backend up to 10 minutes for `prisma migrate deploy` + Nest
      # bootstrap + first /health probe to flip green on a cold image
      # cache.
      - name: Bring up docker stack
        run: |
          docker compose -f docker/compose.yml -f docker/compose.ci.yml \
            up -d --build --wait --wait-timeout 600 \
            postgres redis centrifugo otel-lgtm backend web

      - name: Verify backend health from host port
        run: |
          curl -fsS "http://${E2E_HOST}:3000/api/v1/health"
          echo

      - name: Verify web from host port
        run: |
          curl -fsS "http://${E2E_HOST}:3001/" > /dev/null
          echo "web reachable on :3001 (via ${E2E_HOST})"

      # Playwright config (tests/e2e/playwright.config.ts) reads E2E_WEB_URL
      # for `use.baseURL`. The smoke specs mock every backend response with
      # `page.route('**/api/v1/...')` so the SPA never actually hits the
      # backend — but we still need the SPA reachable from the browser
      # running inside the job container, hence the gateway IP.
      #
      # Explicitly clear any inherited HTTP proxy env vars — if the
      # act_runner inherits a proxy from the host (common on
      # corp/homelab setups), Chromium will route navigation through it,
      # and the proxy almost certainly can't reach `172.18.0.1:3001`
      # (an internal docker bridge gateway). Curl in the verify steps
      # above doesn't respect HTTPS_PROXY for plain http://, so it can
      # appear that the URL is reachable when Chromium gets refused.
      # Cleared per-step so local dev/release pipelines that DO want a
      # proxy aren't affected.
      #
      - name: Run Playwright smoke
        env:
          E2E_WEB_URL: "http://${{ env.E2E_HOST }}:3001"
          E2E_BACKEND_URL: "http://${{ env.E2E_HOST }}:3000"
          # Explicitly blank every inherited proxy env var — if the
          # host act_runner inherits a proxy and the workflow inherits
          # it transitively, Chromium would route navigation through
          # it (curl ignores most of these for plain http:// to IP
          # literals, hence the diagnostic divergence). No effect when
          # no proxy is set.
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          NO_PROXY: ""
          http_proxy: ""
          https_proxy: ""
          no_proxy: ""
          ALL_PROXY: ""
          all_proxy: ""
        # On the regen path we pass `--update-snapshots` so Playwright
        # rewrites every visual baseline under tests/e2e/*-snapshots/
        # (the foundations visual regression test is the canonical
        # consumer today). The nightly + default workflow_dispatch path
        # leaves snapshots untouched and asserts against the committed
        # baseline.
        run: |
          set -e
          if [ "${{ inputs.update_snapshots }}" = "true" ]; then
            pnpm e2e -- --update-snapshots
          else
            pnpm e2e
          fi

      # Regen-only: commit refreshed baselines back to the branch the
      # workflow was dispatched on. Mirrors snapshots-regen.yml for
      # Storybook. The Linux baseline must come from CI — capturing on
      # darwin produces glyph-metric drift that breaks the nightly.
      - name: Commit regenerated Playwright baselines
        if: inputs.update_snapshots == 'true'
        run: |
          set -euo pipefail

          git config user.email "actions@code.homelab.local"
          git config user.name "Forgejo Actions"

          # Discard Playwright runtime artefacts (report, traces, videos)
          # that aren't baselines.
          rm -rf tests/e2e/playwright-report tests/e2e/test-results || true

          # Stage only the snapshot directories (`*-snapshots/` is the
          # Playwright convention for `toHaveScreenshot` baselines).
          git add 'tests/e2e/*-snapshots/' || true
          if git diff --cached --quiet; then
            echo "No baseline changes — nothing to commit."
            exit 0
          fi

          git commit -m "$(cat <<'EOF'
          chore(e2e): regenerate Playwright visual baselines from CI

          Auto-captured by .forgejo/workflows/e2e.yml (regen path) so the
          committed baselines match the Linux Playwright runtime
          (chromium glyph metrics + native form-control rendering) the
          nightly job runs against.
          EOF
          )"

          # Rebase to absorb any commits that landed mid-run; the only
          # diff in our commit is `*.png` so rebase always applies.
          BRANCH="${GITHUB_REF#refs/heads/}"
          git pull --rebase origin "$BRANCH"
          git push origin "HEAD:$BRANCH"

      # Post-run diagnostics — always run, even on failure. Captures
      # container restart counts + final health state to help debug
      # ECONNREFUSED-style flakes where a service was healthy at `--wait`
      # but went down mid-test (OOM kill, segfault, healthcheck flap).
      # `Restarts` > 0 on web/backend confirms container churn during the
      # Playwright run.
      - name: Container state after Playwright
        if: always()
        run: |
          echo "===== docker compose ps ====="
          docker compose -f docker/compose.yml -f docker/compose.ci.yml ps
          echo
          echo "===== restart counts ====="
          for svc in centrifugo postgres redis otel-lgtm backend web; do
            cid="$(docker compose -f docker/compose.yml -f docker/compose.ci.yml ps -q "$svc" 2>/dev/null || true)"
            if [ -n "$cid" ]; then
              restarts="$(docker inspect "$cid" --format '{{.RestartCount}}' 2>/dev/null || echo '?')"
              health="$(docker inspect "$cid" --format '{{.State.Health.Status}}' 2>/dev/null || echo 'none')"
              status="$(docker inspect "$cid" --format '{{.State.Status}}' 2>/dev/null || echo '?')"
              printf '%-12s status=%-10s health=%-10s restarts=%s\n' "$svc" "$status" "$health" "$restarts"
            fi
          done
          echo
          echo "===== docker stats snapshot ====="
          docker stats --no-stream --format 'table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 7

      # Dump every service's logs on failure — not just backend. The first
      # casualty when something goes wrong is often centrifugo / postgres /
      # redis startup, and `dependency failed to start` propagates a useless
      # error to the backend status without explaining which dep died.
      - name: Dump service logs on failure
        if: failure()
        run: |
          for svc in centrifugo postgres redis otel-lgtm backend web; do
            echo "===== $svc ====="
            docker compose -f docker/compose.yml -f docker/compose.ci.yml logs --tail=200 "$svc" 2>&1 || true
            echo
            echo "----- $svc inspect (health, exit code, …) -----"
            cid="$(docker compose -f docker/compose.yml -f docker/compose.ci.yml ps -q "$svc" 2>/dev/null || true)"
            if [ -n "$cid" ]; then
              docker inspect "$cid" --format '{{json .State}}' 2>&1 | head -c 4000 || true
              echo
            fi
            echo
          done

      - name: Tear down
        if: always()
        run: docker compose -f docker/compose.yml -f docker/compose.ci.yml down -v
