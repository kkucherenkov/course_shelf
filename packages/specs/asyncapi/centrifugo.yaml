asyncapi: 3.1.0
info:
  title: App Realtime API
  version: 0.3.0
  description: |
    Real-time channels delivered via Centrifugo. Clients connect with a
    short-lived JWT issued by the backend (`POST /api/v1/realtime/token`)
    and subscribe to allowed channels.

    ## JWT subscription scoping

    The connection JWT carries a `channels` claim that restricts which
    channels a token may subscribe to.

    Tokens have a 5-minute TTL; clients must refresh before expiry using
    `POST /api/v1/realtime/token`.
defaultContentType: application/json
servers:
  centrifugo:
    host: localhost:8000
    pathname: /connection/websocket
    protocol: ws
    description: Local Centrifugo instance
    security:
      - $ref: "#/components/securitySchemes/connectionJwt"
channels:
  systemHealth:
    address: system:health
    messages:
      healthUpdate:
        $ref: "#/components/messages/HealthUpdate"
    description: Broadcast of service health transitions (ok <-> degraded <-> down).

  libraryScan:
    address: "library:scan:{libraryId}"
    parameters:
      libraryId:
        description: Library cuid being scanned.
    messages:
      scanEvent:
        $ref: "#/components/messages/ScanEvent"
    description: |
      Live scan-progress feed for a single library. Authorised receivers see
      progress events as the scanner walks the filesystem, lesson-discovered
      notifications, and a final finished event with rollup counts.

  notesLesson:
    address: "notes:lesson:{lessonId}"
    parameters:
      lessonId:
        description: Lesson cuid.
    messages:
      noteUpdated:
        $ref: "#/components/messages/NoteUpdated"
    description: |
      Cross-device note synchronisation for a single lesson. Subscribers
      receive the full updated body whenever the note's owner saves an edit
      from any device. Subscribers should reconcile on `updatedAt` (last
      write wins).

  progressUser:
    address: "progress:user:{userId}"
    parameters:
      userId:
        description: Better Auth user id (UUID v4).
    messages:
      progressUpdated:
        $ref: "#/components/messages/ProgressUpdated"
    description: |
      Per-user lesson progress fan-out. The owning user's other connected
      devices receive each progress write so their UI reflects the latest
      position without polling.

  scansUser:
    address: "scans:user:{userId}"
    parameters:
      userId:
        description: Better Auth user id (UUID v4).
    messages:
      scanLifecycle:
        $ref: "#/components/messages/ScanLifecycleEvent"
    description: |
      Per-user scan lifecycle fan-out. The user who triggered a library
      scan receives `started`, throttled `progress`, and a final
      `finished` event so the SPA's floating notifier can render live
      counters without polling. Pre-authorised in the connection token
      (no per-channel subscribe-time auth needed) — only the user's own
      scans are fanned out here.

  maintenanceBackfill:
    address: "maintenance:backfill:{jobId}"
    parameters:
      jobId:
        description: Unique cuid identifying the backfill job, returned by `POST /api/v1/admin/maintenance/backfill-metadata`.
    messages:
      backfillStarted:
        $ref: "#/components/messages/BackfillStarted"
      backfillProgress:
        $ref: "#/components/messages/BackfillProgress"
      backfillFinished:
        $ref: "#/components/messages/BackfillFinished"
    description: |
      Per-job backfill progress feed. Emitted by the
      `backfill-course-metadata` handler as it processes courses.
      Subscribe immediately after receiving the `jobId` from the HTTP
      endpoint. The channel is closed after `BackfillFinished` is published.
      Admin-only — the connection token must include this channel in its
      `channels` claim.

operations:
  receiveHealthUpdate:
    action: receive
    channel:
      $ref: "#/channels/systemHealth"
    summary: Listen for backend-pushed health status changes
    messages:
      - $ref: "#/channels/systemHealth/messages/healthUpdate"

  receiveScanEvent:
    action: receive
    channel:
      $ref: "#/channels/libraryScan"
    summary: Listen for scan progress on a specific library
    messages:
      - $ref: "#/channels/libraryScan/messages/scanEvent"

  receiveNoteUpdated:
    action: receive
    channel:
      $ref: "#/channels/notesLesson"
    summary: Listen for note edits on a specific lesson
    messages:
      - $ref: "#/channels/notesLesson/messages/noteUpdated"

  receiveProgressUpdated:
    action: receive
    channel:
      $ref: "#/channels/progressUser"
    summary: Listen for own progress updates across devices
    messages:
      - $ref: "#/channels/progressUser/messages/progressUpdated"

  receiveScanLifecycleEvent:
    action: receive
    channel:
      $ref: "#/channels/scansUser"
    summary: Listen for own library-scan lifecycle events
    messages:
      - $ref: "#/channels/scansUser/messages/scanLifecycle"

  receiveBackfillStarted:
    action: receive
    channel:
      $ref: "#/channels/maintenanceBackfill"
    summary: Listen for backfill job start
    messages:
      - $ref: "#/channels/maintenanceBackfill/messages/backfillStarted"

  receiveBackfillProgress:
    action: receive
    channel:
      $ref: "#/channels/maintenanceBackfill"
    summary: Listen for per-course backfill progress
    messages:
      - $ref: "#/channels/maintenanceBackfill/messages/backfillProgress"

  receiveBackfillFinished:
    action: receive
    channel:
      $ref: "#/channels/maintenanceBackfill"
    summary: Listen for backfill job completion
    messages:
      - $ref: "#/channels/maintenanceBackfill/messages/backfillFinished"

components:
  messages:
    HealthUpdate:
      name: HealthUpdate
      contentType: application/json
      payload:
        $ref: "#/components/schemas/HealthUpdate"

    ScanEvent:
      name: ScanEvent
      contentType: application/json
      payload:
        $ref: "#/components/schemas/ScanEvent"

    NoteUpdated:
      name: NoteUpdated
      contentType: application/json
      payload:
        $ref: "#/components/schemas/NoteUpdated"

    ProgressUpdated:
      name: ProgressUpdated
      contentType: application/json
      payload:
        $ref: "#/components/schemas/ProgressUpdated"

    ScanLifecycleEvent:
      name: ScanLifecycleEvent
      contentType: application/json
      payload:
        $ref: "#/components/schemas/ScanLifecycleEvent"

    BackfillStarted:
      name: BackfillStarted
      contentType: application/json
      payload:
        $ref: "#/components/schemas/BackfillStarted"

    BackfillProgress:
      name: BackfillProgress
      contentType: application/json
      payload:
        $ref: "#/components/schemas/BackfillProgress"

    BackfillFinished:
      name: BackfillFinished
      contentType: application/json
      payload:
        $ref: "#/components/schemas/BackfillFinished"

  schemas:
    HealthUpdate:
      type: object
      required: [status, changedAt]
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        changedAt:
          type: string
          format: date-time
        reason:
          type: string

    ScanEvent:
      description: |
        Discriminated union of scan events. The `kind` field identifies the
        concrete type: `progress`, `lesson-discovered`, or `finished`.
      oneOf:
        - $ref: "#/components/schemas/ScanEventProgress"
        - $ref: "#/components/schemas/ScanEventLessonDiscovered"
        - $ref: "#/components/schemas/ScanEventFinished"

    ScanEventProgress:
      type: object
      required: [kind, scanId, libraryId, at, currentPath, lessonsSoFar]
      properties:
        kind:
          type: string
          enum: [progress]
        scanId:
          type: string
          description: cuid
        libraryId:
          type: string
          description: cuid
        at:
          type: string
          format: date-time
        currentPath:
          type: string
          description: Relative path of the file being processed right now.
        lessonsSoFar:
          type: integer
          minimum: 0
          description: Lessons discovered so far in this scan.

    ScanEventLessonDiscovered:
      type: object
      required: [kind, scanId, libraryId, at, lessonRelativePath, sectionTitle]
      properties:
        kind:
          type: string
          enum: [lesson-discovered]
        scanId:
          type: string
        libraryId:
          type: string
        at:
          type: string
          format: date-time
        lessonRelativePath:
          type: string
        sectionTitle:
          type: string

    ScanEventFinished:
      type: object
      required: [kind, scanId, libraryId, at, status, lessonsTotal, errorsTotal]
      properties:
        kind:
          type: string
          enum: [finished]
        scanId:
          type: string
        libraryId:
          type: string
        at:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ScanStatus"
        lessonsTotal:
          type: integer
          minimum: 0
        errorsTotal:
          type: integer
          minimum: 0

    ScanStatus:
      type: string
      enum: [succeeded, failed, partial]
      description: Terminal status of a library scan.

    ScanLifecycleEvent:
      description: |
        Discriminated union of per-user scan lifecycle events delivered on
        `scans:user:{userId}`. The `kind` field identifies the concrete
        type: `started`, `progress` (throttled to no more than ~1 per
        second per scan), or `finished`.
      oneOf:
        - $ref: "#/components/schemas/ScanLifecycleStarted"
        - $ref: "#/components/schemas/ScanLifecycleProgress"
        - $ref: "#/components/schemas/ScanLifecycleFinished"

    ScanLifecycleStarted:
      type: object
      required: [kind, scanId, libraryId, libraryName, at]
      properties:
        kind:
          type: string
          enum: [started]
        scanId:
          type: string
        libraryId:
          type: string
        libraryName:
          type: string
        at:
          type: string
          format: date-time

    ScanLifecycleProgress:
      type: object
      required:
        - kind
        - scanId
        - libraryId
        - libraryName
        - at
        - filesScanned
        - filesAdded
        - coursesDiscovered
        - errorsCount
      properties:
        kind:
          type: string
          enum: [progress]
        scanId:
          type: string
        libraryId:
          type: string
        libraryName:
          type: string
        at:
          type: string
          format: date-time
        filesScanned:
          type: integer
          minimum: 0
        filesAdded:
          type: integer
          minimum: 0
        coursesDiscovered:
          type: integer
          minimum: 0
        errorsCount:
          type: integer
          minimum: 0

    ScanLifecycleFinished:
      type: object
      required:
        - kind
        - scanId
        - libraryId
        - libraryName
        - at
        - status
        - filesScanned
        - filesAdded
        - coursesDiscovered
        - errorsCount
      properties:
        kind:
          type: string
          enum: [finished]
        scanId:
          type: string
        libraryId:
          type: string
        libraryName:
          type: string
        at:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ScanStatus"
        filesScanned:
          type: integer
          minimum: 0
        filesAdded:
          type: integer
          minimum: 0
        coursesDiscovered:
          type: integer
          minimum: 0
        errorsCount:
          type: integer
          minimum: 0

    NoteUpdated:
      type: object
      required: [lessonId, userId, updatedAt, body]
      properties:
        lessonId:
          type: string
          description: cuid
        userId:
          type: string
          description: Better Auth user id (UUID v4)
        updatedAt:
          type: string
          format: date-time
        body:
          type: string
          description: |
            Full Markdown body after the edit. Sent in full (not as a diff)
            because notes are short and the network overhead is dwarfed by
            the simplicity of last-write-wins reconciliation.

    ProgressUpdated:
      type: object
      required: [userId, lessonId, positionSeconds, durationSeconds, percent, completed, lastSeenAt]
      properties:
        userId:
          type: string
        lessonId:
          type: string
        positionSeconds:
          type: integer
          minimum: 0
        durationSeconds:
          type: integer
          minimum: 0
        percent:
          type: integer
          minimum: 0
          maximum: 100
        completed:
          type: boolean
        lastSeenAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          description: Set when `completed` is true (>= 90% threshold crossed).

    BackfillCurrentAction:
      type: string
      enum: [parsing, linking, persisting, skipped]
      description: >-
        The processing phase for the current course being backfilled.
        `parsing` = reading course.json; `linking` = upserting instructor/studio/tag;
        `persisting` = writing course relations; `skipped` = no course.json found.

    BackfillStarted:
      type: object
      required: [jobId, startedAt, librariesScanned]
      description: Emitted once when the backfill job begins.
      properties:
        jobId:
          type: string
          description: Unique cuid identifying the backfill job.
        startedAt:
          type: string
          format: date-time
          description: ISO-8601 instant when the job started.
        librariesScanned:
          type: integer
          minimum: 0
          description: Number of libraries included in this backfill run.

    BackfillProgress:
      type: object
      required: [jobId, courseSlug, coursesProcessed, coursesTotal, currentAction]
      description: >-
        Emitted once per course as the backfill handler processes it.
        Clients should throttle rendering to avoid UI jank on large libraries.
      properties:
        jobId:
          type: string
          description: Unique cuid identifying the backfill job.
        courseSlug:
          type: string
          description: Slug of the course currently being processed.
        coursesProcessed:
          type: integer
          minimum: 0
          description: Number of courses processed so far (including the current one).
        coursesTotal:
          type: integer
          minimum: 0
          description: Total number of courses in the backfill scope.
        currentAction:
          $ref: "#/components/schemas/BackfillCurrentAction"

    BackfillFinished:
      type: object
      required: [jobId, finishedAt, coursesProcessed, coursesUpdated, coursesSkipped, errors]
      description: Emitted once when the backfill job completes (success or partial failure).
      properties:
        jobId:
          type: string
          description: Unique cuid identifying the backfill job.
        finishedAt:
          type: string
          format: date-time
          description: ISO-8601 instant when the job finished.
        coursesProcessed:
          type: integer
          minimum: 0
          description: Total number of courses inspected.
        coursesUpdated:
          type: integer
          minimum: 0
          description: Number of courses whose metadata was actually changed.
        coursesSkipped:
          type: integer
          minimum: 0
          description: Number of courses skipped (no course.json or no changes needed).
        errors:
          type: array
          items:
            type: object
            required: [courseId, message]
            properties:
              courseId:
                type: string
                description: cuid of the course that failed.
              message:
                type: string
                description: Human-readable description of what went wrong.
          description: Per-course errors. Empty array when all courses succeeded.

  securitySchemes:
    connectionJwt:
      type: httpApiKey
      in: query
      name: cf_token
      description: Short-lived JWT signed by backend with Centrifugo HMAC secret.
