openapi: 3.1.0
info:
  title: App API
  version: 0.11.0
  description: |
    Spec-first HTTP API. Paths include the versioned prefix (`/api/v1`) so
    generated clients can be used without additional base-URL rewriting.

    **Authentication endpoints** live under `/api/v1/auth/*` and follow the
    [Better Auth protocol](https://www.better-auth.com/docs). They are
    deliberately not enumerated here: Better Auth owns that wire contract and
    evolves it independently of our OpenAPI surface. The `cookieAuth` and
    `bearerAuth` security schemes documented below describe how the *rest* of
    this API accepts credentials issued by that namespace — session cookies
    (web) and bearer tokens (mobile, via the `bearer` plugin).
  contact:
    name: App Team
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.example.com
    description: Production (placeholder)
tags:
  - name: Access
    description: User → resource access grants. Admins issue and revoke; everyone else only ever reads their own implicit grants from session context.
  - name: Catalog
    description: Course library registration and lookup.
  - name: Learning
    description: Per-user lesson progress, bookmarks, and notes.
  - name: Streaming
    description: Lesson streaming and signed URLs.
  - name: system
    description: Health and liveness endpoints
  - name: realtime
    description: Centrifugo connection tokens

paths:
  /api/v1/access/grants:
    post:
      operationId: registerGrant
      summary: Grant a user READ access to a library or course
      description: |
        Idempotent on (userId, target). Returns 409 if the same grant already
        exists. Only admins (`session.user.role === 'admin'`) may call this;
        other authenticated users get 403.
      tags: [Access]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterGrantRequest"
            examples:
              libraryGrant:
                summary: Grant READ access to Conference Recordings
                value:
                  userId: clxvusr0000000000000000001
                  target:
                    kind: library
                    libraryId: clxvp1234567890abcdefghij
                  level: READ
      responses:
        "201":
          description: Grant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessGrantDto"
              examples:
                created:
                  value:
                    id: clxvgnt0000000000000000001
                    userId: clxvusr0000000000000000001
                    target:
                      kind: library
                      libraryId: clxvp1234567890abcdefghij
                    level: READ
                    createdAt: "2026-04-25T10:00:00Z"
        "400":
          description: Validation error — missing or malformed fields
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badInput:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "target.kind must be 'library' or 'course'."
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may issue access grants.
        "404":
          description: Target library or course not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No library with that id exists.
        "409":
          description: A grant for this (userId, target) pair already exists
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                conflict:
                  value:
                    type: about:blank
                    title: Conflict
                    status: 409
                    detail: "A READ grant for user clxvusr0000000000000000001 on library clxvp1234567890abcdefghij already exists."

    get:
      operationId: listGrantsByUser
      summary: List a user's access grants
      description: Returns every grant issued to the given user, both library- and course-scoped.
      tags: [Access]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: true
          description: Better Auth user id whose grants should be returned.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Grant list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessGrantListDto"
              examples:
                list:
                  value:
                    items:
                      - id: clxvgnt0000000000000000001
                        userId: clxvusr0000000000000000001
                        target:
                          kind: library
                          libraryId: clxvp1234567890abcdefghij
                        level: READ
                        createdAt: "2026-04-25T10:00:00Z"
                      - id: clxvgnt0000000000000000002
                        userId: clxvusr0000000000000000001
                        target:
                          kind: course
                          courseId: clxvcrs0000000000000000001
                        level: READ
                        createdAt: "2026-04-25T10:05:00Z"
        "400":
          description: userId query parameter is missing or empty
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                missingUserId:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "Query parameter 'userId' is required."
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may list grants for arbitrary users.

  /api/v1/access/grants/{id}:
    delete:
      operationId: revokeGrant
      summary: Revoke an access grant
      description: Permanently removes the grant identified by `id`. The affected user immediately loses the access level the grant provided.
      tags: [Access]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the grant to revoke.
          schema:
            type: string
      responses:
        "204":
          description: Grant revoked — no body
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may revoke access grants.
        "404":
          description: Grant not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No grant with that id exists.

  /api/v1/bookmarks/{id}:
    patch:
      operationId: updateBookmark
      summary: Update a bookmark's position or label
      description: |
        Owner-only. At least one of `positionSeconds` / `label` must be present.
        Pass `label: null` to clear an existing label. The server returns 400 on
        empty patches (no fields provided).
      tags: [Learning]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the bookmark to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookmarkRequest"
            examples:
              moveAndRelabel:
                summary: Move position and update label
                value:
                  positionSeconds: 210
                  label: Aggregate boundaries explained
      responses:
        "200":
          description: Bookmark updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkDto"
              examples:
                updated:
                  value:
                    id: clxvbkm0000000000000000001
                    lessonId: clxvles0000000000000000001
                    positionSeconds: 210
                    label: Aggregate boundaries explained
                    createdAt: "2026-04-25T14:00:00Z"
                    updatedAt: "2026-04-25T14:05:00Z"
        "400":
          description: Empty patch — no fields provided
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                emptyPatch:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: At least one of positionSeconds or label must be present.
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller is not the bookmark owner
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: You do not own this bookmark.
        "404":
          description: Bookmark not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No bookmark with that id exists.

    delete:
      operationId: deleteBookmark
      summary: Delete a bookmark
      description: Owner-only. Admins may delete any bookmark for moderation.
      tags: [Learning]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the bookmark to delete.
          schema:
            type: string
      responses:
        "204":
          description: Bookmark deleted — no body
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller is not the bookmark owner (and not an admin)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: You do not own this bookmark.
        "404":
          description: Bookmark not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No bookmark with that id exists.

  /api/v1/courses:
    get:
      operationId: listCourses
      summary: List courses (optionally filtered by library)
      description: |
        Returns courses the requester can see. Non-admins see only courses inside
        libraries they have a READ AccessGrant for; admins see all.
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: libraryId
          in: query
          required: false
          description: Filter to a single library; omit for everything visible.
          schema:
            type: string
      responses:
        "200":
          description: Course list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseListDto"
              examples:
                list:
                  value:
                    items:
                      - id: clxvcrs0000000000000000001
                        libraryId: clxvp1234567890abcdefghij
                        slug: pragmatic-clean-architecture
                        title: Pragmatic Clean Architecture
                        description: Milan Jovanović's deep-dive into Clean Architecture with .NET.
                        sections:
                          - id: clxvsec0000000000000000001
                            position: 1
                            title: Introduction
                          - id: clxvsec0000000000000000002
                            position: 2
                            title: Domain Layer
                        progress:
                          percent: 0
                          lessonsCompleted: 0
                          lessonsTotal: 24
                        createdAt: "2026-04-25T09:00:00Z"
                        updatedAt: "2026-04-25T09:00:00Z"
                      - id: clxvcrs0000000000000000002
                        libraryId: clxvp1234567890abcdefghij
                        slug: ddd-by-eric-evans
                        title: Domain-Driven Design by Eric Evans
                        sections:
                          - id: clxvsec0000000000000000003
                            position: 1
                            title: Putting the Domain Model to Work
                          - id: clxvsec0000000000000000004
                            position: 2
                            title: Building Blocks of a Model-Driven Design
                        progress:
                          percent: 0
                          lessonsCompleted: 0
                          lessonsTotal: 18
                        createdAt: "2026-04-25T09:05:00Z"
                        updatedAt: "2026-04-25T09:05:00Z"
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401

  /api/v1/courses/{id}:
    get:
      operationId: getCourse
      summary: Get a single course
      description: Returns the full CourseDto for one course by its server-generated cuid. Non-admins must hold a READ AccessGrant on the course's library.
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the course.
          schema:
            type: string
      responses:
        "200":
          description: Course found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDto"
              examples:
                found:
                  value:
                    id: clxvcrs0000000000000000001
                    libraryId: clxvp1234567890abcdefghij
                    slug: pragmatic-clean-architecture
                    title: Pragmatic Clean Architecture
                    description: Milan Jovanović's deep-dive into Clean Architecture with .NET.
                    sections:
                      - id: clxvsec0000000000000000001
                        position: 1
                        title: Introduction
                      - id: clxvsec0000000000000000002
                        position: 2
                        title: Domain Layer
                    progress:
                      percent: 0
                      lessonsCompleted: 0
                      lessonsTotal: 24
                    createdAt: "2026-04-25T09:00:00Z"
                    updatedAt: "2026-04-25T09:00:00Z"
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have a READ grant for the course's library
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: You do not have access to this course.
        "404":
          description: Course not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No course with that id exists.

    patch:
      operationId: updateCourse
      summary: Update course metadata
      description: |
        Admin-only. Updates any combination of title / description / slug.
        Slug must be unique within the same library.
        At least one of `title`, `description`, or `slug` must be present
        (server-side validation rule — OpenAPI cannot express "at-least-one" natively).
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the course to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
            examples:
              renameAndReslug:
                summary: Rename title and update slug
                value:
                  title: Pragmatic Clean Architecture (2nd ed.)
                  slug: pragmatic-clean-architecture-2nd-ed
      responses:
        "200":
          description: Course updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDto"
              examples:
                updated:
                  value:
                    id: clxvcrs0000000000000000001
                    libraryId: clxvp1234567890abcdefghij
                    slug: pragmatic-clean-architecture-2nd-ed
                    title: Pragmatic Clean Architecture (2nd ed.)
                    description: Milan Jovanović's deep-dive into Clean Architecture with .NET.
                    sections:
                      - id: clxvsec0000000000000000001
                        position: 1
                        title: Introduction
                      - id: clxvsec0000000000000000002
                        position: 2
                        title: Domain Layer
                    progress:
                      percent: 0
                      lessonsCompleted: 0
                      lessonsTotal: 24
                    createdAt: "2026-04-25T09:00:00Z"
                    updatedAt: "2026-04-25T10:15:00Z"
        "400":
          description: Validation error — malformed fields or no fields provided
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badInput:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: At least one of title, description, or slug must be present.
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may update course metadata.
        "404":
          description: Course not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No course with that id exists.
        "409":
          description: A course with the same slug already exists in this library
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                conflict:
                  value:
                    type: about:blank
                    title: Conflict
                    status: 409
                    detail: A course with slug 'pragmatic-clean-architecture-2nd-ed' already exists in this library.

  /api/v1/home/continue-watching:
    get:
      operationId: getContinueWatching
      summary: List courses the requester is in the middle of
      description: |
        Returns the requester's courses ordered by recency (most-recently-watched
        first), capped by `limit`. Reads from a denormalised
        `CourseProgressReadModel` projection that's updated by `LessonCompleted`
        and `LessonProgressRecorded` events. Empty array for new users.
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          description: How many items the home row needs.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Continue-watching list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContinueWatchingDto"
              examples:
                twoInProgress:
                  summary: Two courses in progress
                  value:
                    items:
                      - courseId: clxvcrs0000000000000000001
                        courseTitle: Pragmatic Clean Architecture
                        librarySlug: conference-recordings
                        percent: 15.79
                        lessonsCompleted: 12
                        lessonsTotal: 76
                        lastSeenAt: "2026-04-25T14:32:00Z"
                        lastSeenLessonId: clxvles0000000000000000042
                      - courseId: clxvcrs0000000000000000002
                        courseTitle: Domain-Driven Design by Eric Evans
                        percent: 33.33
                        lessonsCompleted: 6
                        lessonsTotal: 18
                        lastSeenAt: "2026-04-24T10:10:00Z"
                        lastSeenLessonId: clxvles0000000000000000007
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401

  /api/v1/lessons/{id}:
    get:
      operationId: getLesson
      summary: Get a lesson with its materials and subtitles
      description: |
        Returns lesson metadata, sidecar materials (PDF / Markdown / text / image),
        and available subtitle tracks. Raw filesystem paths are intentionally absent
        from the response (NFR-S-01); the player obtains a signed stream token for
        the lesson video and the material/subtitle blobs separately.
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the lesson.
          schema:
            type: string
      responses:
        "200":
          description: Lesson found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonDto"
              examples:
                found:
                  value:
                    id: clxvles0000000000000000001
                    courseId: clxvcrs0000000000000000001
                    sectionId: clxvsec0000000000000000002
                    position: 3
                    title: Aggregates
                    durationSeconds: 2847
                    materials:
                      - id: clxvmat0000000000000000001
                        kind: doc
                        label: 03 - Aggregates slides
                        sizeBytes: 204800
                    subtitles:
                      - id: clxvsub0000000000000000001
                        language: en
                        label: English
                    progress:
                      percent: 0
                      completed: false
                      lastSeenAtSeconds: 0
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Requester has no READ grant covering the parent library or course
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: You do not have access to this lesson.
        "404":
          description: Lesson not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No lesson with that id exists.

  /api/v1/lessons/{id}/stream-url:
    get:
      operationId: issueStreamUrl
      summary: Mint a short-lived signed URL for a lesson video
      description: |
        Returns a URL pointing at `/api/v1/stream/lessons/{id}` with a signed
        query-param token bound to `(userId, lessonId, expiresAt)`. The token
        is HMAC-signed; the streaming endpoint verifies it without a database
        lookup. Default TTL is 15 minutes (configurable server-side). Clients
        must request a fresh URL when the previous one expires — refresh policy
        is up to the player.
      tags: [Streaming]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the lesson.
          schema:
            type: string
      responses:
        "200":
          description: Signed stream URL issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamUrlDto"
              examples:
                issued:
                  value:
                    url: "http://localhost:3000/api/v1/stream/lessons/clxvles0000000000000000001?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJjbHh2dXNyMDAwMDAwMDAwMDAwMDAwMDAxIiwibGVzc29uSWQiOiJjbHh2bGVzMDAwMDAwMDAwMDAwMDAwMDAxIiwiZXhwIjoxNzQ1NTc0NDAwfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
                    token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJjbHh2dXNyMDAwMDAwMDAwMDAwMDAwMDAxIiwibGVzc29uSWQiOiJjbHh2bGVzMDAwMDAwMDAwMDAwMDAwMDAxIiwiZXhwIjoxNzQ1NTc0NDAwfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
                    expiresAt: "2026-04-25T10:15:00Z"
        "401":
          description: Missing or invalid bearer token
          content:
