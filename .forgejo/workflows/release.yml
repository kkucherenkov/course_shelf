name: Release

# Triggered by pushing a release tag.
#
# Tag pattern (literal): vMAJOR.MINOR.PATCH-release   e.g. v0.2.0-release
#
# What it does:
#   1. Parse the tag → semver triple.
#   2. Build the two release images:
#        courseshelf-backend, courseshelf-web
#      with `--build-arg APP_VERSION=<semver>`. The proxy and centrifugo
#      services in compose.release.yml run upstream images directly
#      (nginxinc/nginx-unprivileged and centrifugo/centrifugo:v6) and
#      need no per-release rebuilds.
#   3. Push to the homelab Forgejo container registry under four tags each:
#        :MAJOR.MINOR.PATCH, :MAJOR.MINOR, :MAJOR, :latest
#   4. Generate release notes from Conventional Commits via git-cliff.
#   5. Render `compose-release-v<semver>.yml` with RELEASE_TAG pinned.
#   6. Bundle the release artefacts into a tarball.
#   7. Create a Forgejo Release (draft=false, prerelease=false) with the
#      changelog as body and the tarball + standalone compose file as assets.
#
# Why the local Forgejo registry (not ghcr.io):
#   The homelab is fully self-hosted — images should never leave the LAN.
#   The act_runner's dind daemon is already started with
#   `--insecure-registry=code.homelab.local` and resolves the host via
#   extra_hosts, so pushing over plain HTTP works without any systemd
#   restart. The host docker daemon that runs Dockge needs the same trust
#   (insecure-registries in daemon.json, or TLS via Caddy) to pull —
#   documented in docs/deploy/dockge.md.
#
# Auth:
#   GITEA_TOKEN is auto-provided by the runner. It authenticates BOTH the
#   package push (this is the same Forgejo instance that hosts the registry)
#   and the Forgejo Release API call. If your instance scopes packages
#   separately, set a FORGEJO_PKG_TOKEN secret (PAT with `write:package`)
#   and swap it into the login step below.
#
# Notes:
#   - amd64 only for v1; multi-arch can be added later via `setup-buildx`.
#   - Re-pushing the same tag will fail at `docker push` (the registry
#     should reject overwriting an immutable tag); to re-cut a release,
#     bump the patch and push a new tag.

on:
  push:
    tags:
      - "v*.*.*-release"

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: "24"
  REGISTRY: code.homelab.local
  REGISTRY_NAMESPACE: kkucherenkov

jobs:
  release:
    name: Build, push, and create Forgejo release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for git-cliff

      # ─── Tag → semver ────────────────────────────────────────────────────
      - name: Parse release tag
        id: version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+-release$'; then
            echo "tag '$TAG' does not match vMAJOR.MINOR.PATCH-release" >&2
            exit 1
          fi
          SEMVER="${TAG#v}"
          SEMVER="${SEMVER%-release}"
          MAJOR="${SEMVER%%.*}"
          MINOR="${SEMVER#*.}"; MINOR="${MINOR%%.*}"
          PATCH="${SEMVER##*.}"
          {
            echo "tag=$TAG"
            echo "semver=$SEMVER"
            echo "major=$MAJOR"
            echo "minor=$MINOR"
            echo "patch=$PATCH"
          } >> "$GITHUB_OUTPUT"

      # ─── Toolchain ───────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Spec validate
        # Fast YAML-shape sanity check; no codegen runs at the workflow
        # level. The backend + web Dockerfiles bundle their own copy of
        # the spec and (re-)build the TS client internally; the Dart
        # client (the only generator that requires Java via
        # openapi-generator-cli) is never loaded into a release image,
        # so we deliberately don't install JDK on the release runner.
        run: pnpm spec:validate

      - name: Build design tokens
        # Tokens are gitignored — both `apps/web/Dockerfile` and the
        # `@app/ui` consumers would otherwise fail to resolve
        # `tokens.generated.css`/`design-tokens.generated.ts` during
        # the docker build's `nuxt generate` step. Building on the host
        # before `docker build` lands the generated files in the build
        # context via `COPY . .`.
        run: pnpm design:build

      # ─── Registry login ──────────────────────────────────────────────────
      # The registry lives on the same Forgejo instance the runner belongs
      # to, so GITEA_TOKEN (auto-provided) authenticates the package push.
      # Override with a dedicated FORGEJO_PKG_TOKEN if packages are scoped
      # separately on your instance.
      - name: Log in to the Forgejo container registry
        env:
          REGISTRY_TOKEN: ${{ secrets.FORGEJO_PKG_TOKEN || secrets.GITEA_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${REGISTRY_TOKEN:-}" ]]; then
            echo "::error::no registry token available" >&2
            echo "GITEA_TOKEN should be auto-provided; otherwise set a" >&2
            echo "FORGEJO_PKG_TOKEN secret (PAT with write:package)." >&2
            exit 1
          fi
          echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" \
            --username "$REGISTRY_NAMESPACE" \
            --password-stdin

      # ─── Build + push images ─────────────────────────────────────────────
      # Helper inlined as a shell function: build once, tag four times,
      # push four times. Saves duplicating the logic per-image.
      - name: Build and push release images
        env:
          SEMVER: ${{ steps.version.outputs.semver }}
          MAJOR: ${{ steps.version.outputs.major }}
          MINOR: ${{ steps.version.outputs.minor }}
        run: |
          set -euo pipefail

          # Registry namespace = the Forgejo owner that holds the packages.
          NS="$REGISTRY_NAMESPACE"

          publish() {
            local name="$1"
            local dockerfile="$2"
            local image="$REGISTRY/$NS/$name"

            echo "::group::build $name"
            docker build \
              --build-arg "APP_VERSION=$SEMVER" \
              --label "org.opencontainers.image.source=http://${REGISTRY}/${NS}/course_shelf" \
              --label "org.opencontainers.image.version=$SEMVER" \
              --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
              -f "$dockerfile" \
              -t "$image:$SEMVER" \
              -t "$image:$MAJOR.$MINOR" \
              -t "$image:$MAJOR" \
              -t "$image:latest" \
              .
            echo "::endgroup::"

            echo "::group::push $name"
            docker push "$image:$SEMVER"
            docker push "$image:$MAJOR.$MINOR"
            docker push "$image:$MAJOR"
            docker push "$image:latest"
            echo "::endgroup::"
          }

          publish courseshelf-backend     apps/backend/Dockerfile
          publish courseshelf-web         apps/web/Dockerfile

      # ─── Changelog (git-cliff) ───────────────────────────────────────────
      - name: Install git-cliff
        run: |
          set -euo pipefail
          VERSION="2.6.1"
          curl -sSfL \
            "https://github.com/orhun/git-cliff/releases/download/v${VERSION}/git-cliff-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            -o /tmp/git-cliff.tgz
          tar -xzf /tmp/git-cliff.tgz -C /tmp
          install -m 0755 "/tmp/git-cliff-${VERSION}/git-cliff" /usr/local/bin/git-cliff
          git-cliff --version

      - name: Generate release notes
        run: |
          set -euo pipefail
          # `--current` collects commits belonging to the tag at HEAD —
          # that's the v*.*.*-release tag we just pushed. `--unreleased`
          # would be empty because the tag already exists in the
          # checkout (release workflow reads the tag's commit, so all
          # history is "released" from git-cliff's POV).
          git-cliff \
            --config cliff.toml \
            --current \
            --strip header \
            > release-notes.md
          cat release-notes.md

      # ─── Stage release bundle (render + validate + assemble) ────────────
      # All bundle inputs land in STAGE/ before validation. Validating
      # from inside STAGE ensures relative paths in compose.yml — like
      # ./nginx-prod.conf — resolve at workflow time, not at operator
      # deploy time.
      - name: Stage release bundle
        env:
          SEMVER: ${{ steps.version.outputs.semver }}
        run: |
          set -euo pipefail
          STAGE="courseshelf-release-v${SEMVER}"
          NS="$REGISTRY_NAMESPACE"
          mkdir -p "$STAGE"

          # Render compose with RELEASE_TAG / REGISTRY / REGISTRY_NAMESPACE pinned.
          sed \
            -e "s|\${RELEASE_TAG:-latest}|${SEMVER}|g" \
            -e "s|\${REGISTRY:-code.homelab.local}|${REGISTRY}|g" \
            -e "s|\${REGISTRY_NAMESPACE:-kkucherenkov}|${NS}|g" \
            docker/compose.release.yml > "$STAGE/compose.yml"

          # nginx-prod.conf is bind-mounted by the proxy service. Stage it
          # next to compose.yml so the relative path ./nginx-prod.conf
          # resolves both during validation and at operator deploy time.
          cp docker/nginx/prod.conf "$STAGE/nginx-prod.conf"

          # Operator-facing artefacts.
          cp .env.release.example "$STAGE/.env.example"
          cp release-notes.md "$STAGE/CHANGELOG.md"
          cat > "$STAGE/README.md" <<EOF
          # CourseShelf $SEMVER — release bundle

          1. Copy \`.env.example\` to \`.env\` and fill in the secrets.
          2. \`docker compose --env-file .env -f compose.yml pull\`
          3. \`docker compose --env-file .env -f compose.yml up -d\`
          4. Browse to http://<your-host>:\${PROXY_PORT:-8080}

          See CHANGELOG.md for what changed in this release.
          EOF

          # Validate the rendered compose from inside STAGE so relative
          # paths (./nginx-prod.conf) resolve. compose interpolates ALL
          # \`\${VAR:?...}\` placeholders during validation, so we feed
          # dummy values — this only checks YAML/syntax + that referenced
          # files exist, not that any secret is real.
          ( cd "$STAGE" && \
            PUBLIC_BASE_URL=http://placeholder.local \
            POSTGRES_PASSWORD=placeholder \
            BETTER_AUTH_SECRET=placeholder \
            CENTRIFUGO_API_KEY=placeholder \
            CENTRIFUGO_TOKEN_HMAC_SECRET=placeholder \
            COURSES_PATH=/tmp \
              docker compose -f compose.yml config --quiet )

          # Standalone compose file uploaded as a release asset (also
          # available inside the tarball as compose.yml).
          cp "$STAGE/compose.yml" "compose-release-v${SEMVER}.yml"

          # Bundle the staged tree.
          tar czf "${STAGE}.tar.gz" "$STAGE"
          ls -la "${STAGE}.tar.gz" "compose-release-v${SEMVER}.yml"

      # ─── Forgejo release ─────────────────────────────────────────────────
      # The release page lives on Forgejo (where the source repo is); the
      # IMAGES live on GHCR. Use GITEA_TOKEN for the API call.
      - name: Create Forgejo release with assets
        env:
          TAG: ${{ steps.version.outputs.tag }}
          SEMVER: ${{ steps.version.outputs.semver }}
          FORGEJO_TOKEN: ${{ secrets.GITEA_TOKEN }}
          FORGEJO_HOST: code.homelab.local
        run: |
          set -euo pipefail

          OWNER="kkucherenkov"
          REPO="course_shelf"
          BASE="http://${FORGEJO_HOST}/api/v1/repos/${OWNER}/${REPO}"

          BODY="$(jq -Rs . < release-notes.md)"
          PAYLOAD="$(jq -n \
            --arg tag "$TAG" \
            --arg name "CourseShelf $SEMVER" \
            --argjson body "$BODY" \
            '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:false}')"

          RELEASE_JSON="$(curl -sSfL -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${BASE}/releases")"

          RELEASE_ID="$(echo "$RELEASE_JSON" | jq -r .id)"
          echo "Created release id=$RELEASE_ID"

          upload_asset() {
            local f="$1"
            curl -sSfL -X POST \
              -H "Authorization: token ${FORGEJO_TOKEN}" \
              -F "attachment=@${f}" \
              "${BASE}/releases/${RELEASE_ID}/assets?name=$(basename "$f")"
          }

          upload_asset "courseshelf-release-v${SEMVER}.tar.gz"
          upload_asset "compose-release-v${SEMVER}.yml"
          upload_asset .env.release.example
          upload_asset release-notes.md
