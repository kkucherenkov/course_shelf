        Returns the authenticated user's note for the given lesson. 403 is
        returned both when the requester has no READ grant covering the lesson
        and when the lesson does not exist — preventing existence leakage.
        404 is returned only when the lesson exists but no note has been written yet.
      tags: [Learning]
      security:
        - bearerAuth: []
      parameters:
        - name: lessonId
          in: path
          required: true
          description: Server-generated cuid identifying the lesson.
          schema:
            type: string
      responses:
        "200":
          description: Note returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteDto"
              examples:
                found:
                  value:
                    id: clxvnot0000000000000000001
                    lessonId: clxvles0000000000000000001
                    body: "## Aggregates\n\nKey insight: aggregates enforce invariants across their boundary."
                    createdAt: "2026-04-25T15:00:00Z"
                    updatedAt: "2026-04-25T15:05:00Z"
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: >-
            No READ grant on the parent library or course — also covers
            "lesson missing + no grant" to avoid leaking existence.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: You do not have access to this lesson.
        "404":
          description: Lesson exists but the requester has not yet created a note
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                noNote:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No note found for this lesson.

    delete:
      operationId: deleteNote
      summary: "Clear the requester's note for a lesson"
      description: |
        Idempotent: returns 204 even when no note exists. Owner-only — there is
        no concept of admin moderation for notes (notes are personal).
      tags: [Learning]
      security:
        - bearerAuth: []
      parameters:
        - name: lessonId
          in: path
          required: true
          description: Server-generated cuid identifying the lesson.
          schema:
            type: string
      responses:
        "204":
          description: Note deleted — no body
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Requester has no READ grant on the parent library or course
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: You do not have access to this lesson.
        "404":
          description: Lesson not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No lesson with that id exists.

  /api/v1/health:
    get:
      operationId: getHealth
      summary: Service health probe
      description: |
        Reports combined health status of the service and its runtime
        dependencies (database, cache, realtime bus).
      tags: [system]
      responses:
        "200":
          description: Service and all dependencies are operational
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                ok:
                  value:
                    status: ok
                    version: 0.1.0
                    uptimeSeconds: 42
                    dependencies:
                      db: ok
                      redis: ok
                      centrifugo: ok
        "503":
          description: One or more dependencies are degraded or down
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                degraded:
                  value:
                    status: degraded
                    version: 0.1.0
                    uptimeSeconds: 42
                    dependencies:
                      db: ok
                      redis: degraded
                      centrifugo: ok

  /api/v1/ping:
    get:
      operationId: ping
      summary: Verify the bearer token resolves a session
      description: |
        Smoke-test endpoint for the authentication chain. Returns the
        requesting user's identity if the bearer token is valid; returns
        `401 Unauthorized` otherwise. Useful for clients that want to
        confirm their stored token is still good without making a real
        domain call.
      tags: [Ops]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated identity echoed back
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
              examples:
                authenticated:
                  value:
                    id: 0193a1b2-c3d4-7e5f-8a90-1234567890ab
                    role: USER
                    displayName: Sam Reader
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401

  /api/v1/progress:
    post:
      operationId: recordLessonProgress
      summary: Record (upsert) the requester's progress on a lesson
      description: |
        Last-write-wins on `clientUpdatedAt`: out-of-order writes (older
        timestamp than the current state) are silently accepted with the prior
        state echoed back. The first write that crosses 90 % completion sets
        `completed: true` and stamps `completedAt`; subsequent writes do not
        re-emit completion. Always returns the post-merge state — clients can
        use it to detect whether their write was the one that bumped the counter.
      tags: [Learning]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordProgressRequest"
            examples:
              watchingLesson:
                summary: User watched 18 min of a 30-min lesson
                value:
                  lessonId: clxvles0000000000000000001
                  positionSeconds: 1080
                  durationSeconds: 1800
                  clientUpdatedAt: "2026-04-25T14:32:00Z"
      responses:
        "200":
          description: Post-merge progress state returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonProgressDto"
              examples:
                merged:
                  value:
                    lessonId: clxvles0000000000000000001
                    positionSeconds: 1080
                    durationSeconds: 1800
                    percent: 60
                    completed: false
                    lastSeenAt: "2026-04-25T14:32:00Z"
        "400":
          description: Validation error — missing or malformed fields
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badInput:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "positionSeconds must be >= 0."
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Requester has no READ grant covering the parent library or course
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: You do not have access to this lesson.
        "404":
          description: Lesson not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No lesson with that id exists.

  /api/v1/progress/{lessonId}:
    get:
      operationId: getLessonProgress
      summary: Get the requester's progress on a lesson
      description: |
        Returns the current progress record for the requesting user on the
        given lesson. 403 is returned both when the requester has no READ grant
        covering the lesson **and** when the lesson does not exist — preventing
        existence leakage. 404 is returned only when the lesson exists but the
        requester has not yet recorded any progress.
      tags: [Learning]
      security:
        - bearerAuth: []
      parameters:
        - name: lessonId
          in: path
          required: true
          description: Server-generated cuid identifying the lesson.
          schema:
            type: string
      responses:
        "200":
          description: Progress record returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonProgressDto"
              examples:
                inProgress:
                  value:
                    lessonId: clxvles0000000000000000001
                    positionSeconds: 1080
                    durationSeconds: 1800
                    percent: 60
                    completed: false
                    lastSeenAt: "2026-04-25T14:32:00Z"
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: No READ grant — also covers "lesson missing + no grant" to avoid leaking existence
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: You do not have access to this lesson.
        "404":
          description: Lesson exists but the requester has not yet recorded any progress
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                noProgress:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No progress record found for this lesson.

  /api/v1/progress/batch:
    post:
      operationId: recordLessonProgressBatch
      summary: Record up to 200 progress updates in a single call
      description: |
        Sync endpoint for offline-first clients. Per-item failures do **not**
        abort the batch — every item gets its own status in the same order
        as the input. Conflict detection: if the server's `lastSeenAt` for a
        lesson is newer than the client's `clientUpdatedAt`, the item's
        status is `stale` and `state` carries the server's view so the
        client can overwrite local cache. Otherwise the status is `accepted`.
        `forbidden` covers both "no READ grant" and "lesson does not exist"
        (no-oracle rule, consistent with `POST /progress`).
      tags: [Learning]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchProgressRequest"
            examples:
              mixedBatch:
                summary: Three writes — one fresh, one already-newer-on-server, one no-grant
                value:
                  items:
                    - lessonId: clxvles0000000000000000001
                      positionSeconds: 600
                      durationSeconds: 1800
                      clientUpdatedAt: "2026-04-25T14:00:00Z"
                    - lessonId: clxvles0000000000000000002
                      positionSeconds: 30
                      durationSeconds: 1200
                      clientUpdatedAt: "2026-04-20T08:00:00Z"
                    - lessonId: clxvles0000000000000000099
                      positionSeconds: 0
                      durationSeconds: 600
                      clientUpdatedAt: "2026-04-25T14:05:00Z"
      responses:
        "200":
          description: Per-item results, same order and length as input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchProgressResponse"
              examples:
                mixedBatch:
                  value:
                    results:
                      - status: accepted
                        state:
                          lessonId: clxvles0000000000000000001
                          positionSeconds: 600
                          durationSeconds: 1800
                          percent: 33
                          completed: false
                          lastSeenAt: "2026-04-25T14:00:00Z"
                      - status: stale
                        state:
                          lessonId: clxvles0000000000000000002
                          positionSeconds: 900
                          durationSeconds: 1200
                          percent: 75
                          completed: false
                          lastSeenAt: "2026-04-22T10:00:00Z"
                      - status: forbidden
                        lessonId: clxvles0000000000000000099
        "400":
          description: Request body is empty (`items.length === 0`) or too large (>200)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                tooMany:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: items must contain between 1 and 200 entries.
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401

  /api/v1/me:
    patch:
      operationId: updateMe
      summary: Patch the calling user's own profile
      description: |
        Currently only `displayName` is mutable through this endpoint. Email
        change and avatar upload are handled separately (and are not yet
        wired). At least one field must be present in the body.
      tags: [Account]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
            examples:
              renameDisplay:
                value:
                  displayName: Elena
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeDto"
        "400":
          description: Validation error — empty body or invalid field
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                emptyBody:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: At least one of `displayName` must be set.
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401

  /api/v1/me/sign-out-others:
    post:
      operationId: signOutOtherSessions
      summary: Sign out from every device EXCEPT the current session
      description: |
        Revokes every session row for the calling user other than the one
        attached to the request. Useful from the settings page's "Sign out
        from all devices" affordance — the user stays signed in on the
        device they just clicked from. Returns 204.
      tags: [Account]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Other sessions revoked
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401

  /api/v1/search:
    get:
      operationId: searchCatalogue
      summary: Search the catalogue (courses + lessons)
      description: |
        Case-insensitive substring search across course titles, section
        titles (matched into their courses), and lesson titles. Returns
        two result lists: courses and lessons. Each list is capped at
        `limit` (default 20, max 100). Results are sorted by best match
        (exact-prefix > word-prefix > substring) within each list.

        Authorisation mirrors the listing endpoints — non-admin actors
        only see courses / lessons they have a READ grant on (via the
        course's library); admins see everything.

        Empty `q` returns empty lists (no expensive full-table scan).
        Trimmed length must be ≥ 2 to avoid pathologically broad
        substring matches; shorter queries return empty lists too.
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Substring to match. Trimmed; case-insensitive.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of results PER kind (courses + lessons).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Search hits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResultDto"
              examples:
                hits:
                  value:
                    query: archi
                    courses:
                      - id: clxvcrs0000000000000000001
                        libraryId: clxvlib0000000000000000001
                        title: Pragmatic Clean Architecture
                        slug: pragmatic-clean-architecture
                        lessonsTotal: 18
                    lessons:
                      - id: clxvles0000000000000000001
                        courseId: clxvcrs0000000000000000001
                        courseTitle: Pragmatic Clean Architecture
                        sectionTitle: Domain Layer
                        title: Architectural drivers
                        position: 3
                empty:
                  value:
                    query: zzz
                    courses: []
                    lessons: []
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401

  /api/v1/realtime/token:
    post:
      operationId: issueRealtimeToken
      summary: Issue a short-lived Centrifugo connection token
      description: |
        Mints a short-lived HMAC-signed JWT that the client can use to connect
        to Centrifugo. Requires an active Better Auth session (cookie on web,
        bearer token on mobile).
      tags: [realtime]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeToken"
              examples:
                ok:
                  value:
                    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    expiresAt: "2026-04-18T12:05:00Z"
        "401":
          description: No active session
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Better Auth bearer token
  schemas:
    AccessGrantDto:
      type: object
      required: [id, userId, target, level, createdAt]
      description: A single access grant issued by an admin.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this grant.
        userId:
          type: string
          description: Better Auth user id of the grantee.
        target:
          $ref: "#/components/schemas/GrantTarget"
        level:
          $ref: "#/components/schemas/GrantLevel"
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 instant when the grant was created.
      examples:
        - id: clxvgnt0000000000000000001
          userId: clxvusr0000000000000000001
          target:
            kind: library
            libraryId: clxvp1234567890abcdefghij
          level: READ
          createdAt: "2026-04-25T10:00:00Z"
        - id: clxvgnt0000000000000000002
          userId: clxvusr0000000000000000001
          target:
            kind: course
            courseId: clxvcrs0000000000000000001
          level: READ
          createdAt: "2026-04-25T10:05:00Z"

    AccessGrantListDto:
      type: object
      required: [items]
      description: Paginated list of access grants for a given user.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AccessGrantDto"
      example:
        items:
          - id: clxvgnt0000000000000000001
            userId: clxvusr0000000000000000001
            target:
              kind: library
              libraryId: clxvp1234567890abcdefghij
            level: READ
            createdAt: "2026-04-25T10:00:00Z"
          - id: clxvgnt0000000000000000002
            userId: clxvusr0000000000000000001
            target:
              kind: course
              courseId: clxvcrs0000000000000000001
            level: READ
            createdAt: "2026-04-25T10:05:00Z"

    AdminDashboardDto:
      type: object
      required: [generatedAt, counts, latestScan, errorsLast24h]
      additionalProperties: false
      properties:
        generatedAt:
          type: string
          format: date-time
          description: ISO-8601 instant when the snapshot was assembled (server clock).
        counts:
          type: object
          required: [libraries, users, courses, lessons]
          additionalProperties: false
          properties:
            libraries:
              type: integer
              minimum: 0
            users:
              type: integer
              minimum: 0
            courses:
              type: integer
              minimum: 0
            lessons:
              type: integer
              minimum: 0
        latestScan:
          oneOf:
            - $ref: "#/components/schemas/AdminDashboardLatestScan"
            - type: "null"
          description: |
            Most recent scan across all libraries (highest `startedAt`), or
            `null` when no scan has ever run.
        errorsLast24h:
          type: integer
          minimum: 0
          description: |
            Count of `ScanErrorRecord` rows whose parent scan started within
            the last 24 hours (rolling window from `generatedAt`). Uses the
            parent scan's `startedAt` because the error record itself has no
            timestamp; works because no scan is expected to outlive a single
            24-hour window.

    AdminDashboardLatestScan:
      type: object
      required: [scanId, libraryId, status, startedAt, finishedAt, filesScanned, errorsCount]
      additionalProperties: false
      properties:
        scanId:
          type: string
          description: cuid identifying the scan.
        libraryId:
          type: string
          description: cuid of the library this scan ran against.
        status:
          $ref: "#/components/schemas/ScanStatus"
        startedAt:
          type: string
          format: date-time
        finishedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
          description: null while still `running`.
        filesScanned:
          type: integer
          minimum: 0
        errorsCount:
          type: integer
          minimum: 0
          description: Number of error records attached to this scan.

    AdminLibraryListDto:
      type: object
      required: [items]
      additionalProperties: false
      description: >-
        Admin-only listing of every library with the counters and last-scan
        summary the admin libraries page renders per row.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminLibraryListItem"

    AdminLibraryListItem:
      type: object
      required: [id, name, rootPath, coursesCount, lessonsCount, lastScan]
      additionalProperties: false
      description: >-
        One row in the admin libraries list. Same backbone as `LibraryDto`
        plus computed `coursesCount`, `lessonsCount` and an embedded
        `lastScan` summary (or `null` when no scan has ever run).
      properties:
        id:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 200
        rootPath:
          type: string
          minLength: 1
        coursesCount:
          type: integer
          minimum: 0
        lessonsCount:
          type: integer
          minimum: 0
        lastScan:
          oneOf:
            - $ref: "#/components/schemas/AdminLibraryListItemScan"
            - type: "null"
          description: Most recent scan summary, or `null` when no scan has ever run.

    AdminLibraryListItemScan:
      type: object
      required: [status, startedAt, finishedAt, errorsCount]
      additionalProperties: false
      description: >-
        Compact scan summary embedded in `AdminLibraryListItem`. Excludes
        scanId / filesScanned / coursesAdded — the libraries-list row only
        renders status + age + errors. The detail page fetches the full
        scan history via `listAdminScans?libraryId=…`.
      properties:
        status:
          $ref: "#/components/schemas/ScanStatus"
        startedAt:
          type: string
          format: date-time
        finishedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
          description: null while still `running`.
        errorsCount:
          type: integer
          minimum: 0

    AdminUserListDto:
      type: object
      required: [items]
      additionalProperties: false
      description: >-
        Admin-only listing of every user in the platform. The admin users
        page renders one `AdminUserListItem` per row.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserListItem"

    AdminUserListItem:
      type: object
      required: [id, email, name, displayName, role, banned, createdAt, updatedAt]
      additionalProperties: false
      description: One row in the admin users list.
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        displayName:
          oneOf:
            - type: string
              minLength: 1
            - type: "null"
          description: Optional user-facing handle separate from the auth name.
        role:
          $ref: "#/components/schemas/AdminUserRole"
        banned:
          type: boolean
          description: >-
            Soft-delete flag. When `true`, sign-in fails and existing sessions
            are invalidated by Better Auth's admin plugin.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AdminUserRole:
      type: string
      enum: [admin, user, guest]
      description: >-
        Canonical lowercase role used by the SPA. The auth backend stamps
        upper-case values (`'ADMIN'`, `'USER'`) in the database; this DTO
        normalises to lowercase at the boundary.

    AdminUpdateUserRequest:
      type: object
      additionalProperties: false
      description: >-
        Patch body for `PATCH /admin/users/{id}`. At least one field must
        be set — the handler returns 400 on an empty body.
      properties:
        role:
          $ref: "#/components/schemas/AdminUserRole"
        banned:
          type: boolean

    AdminScanListDto:
      type: object
      required: [items]
      additionalProperties: false
      description: >-
        Page of recent scans across every library, ordered by `startedAt`
        descending. The dashboard's "Recent scans" table consumes this.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminScanListItem"

    AdminScanListItem:
      type: object
      required:
        - scanId
        - libraryId
        - libraryName
        - status
        - startedAt
        - finishedAt
        - filesScanned
        - coursesAdded
        - errorsCount
      additionalProperties: false
      description: >-
        One row in the dashboard's recent-scans table. Same backbone as
        `AdminDashboardLatestScan` plus `libraryName` (so the table can
        render the library label without a second round-trip) and
        `coursesAdded` (highlighted as a "+N" badge in the design).
      properties:
        scanId:
          type: string
        libraryId:
          type: string
        libraryName:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/ScanStatus"
        startedAt:
          type: string
          format: date-time
        finishedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
          description: null while still `running`.
        filesScanned:
          type: integer
          minimum: 0
        coursesAdded:
          type: integer
          minimum: 0
          description: Net new course rows persisted by this scan.
        errorsCount:
          type: integer
          minimum: 0

    BookmarkDto:
      type: object
      required: [id, lessonId, positionSeconds, createdAt, updatedAt]
      description: A single user-owned bookmark pinned to a position within a lesson.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this bookmark.
        lessonId:
          type: string
          description: cuid of the lesson this bookmark belongs to.
        positionSeconds:
          type: integer
          minimum: 0
          description: Playback position in seconds where the bookmark is pinned.
        label:
          type: string
          minLength: 1
          maxLength: 200
          description: >-
            Free-form label. Trimmed server-side; absent means the bookmark has
            no label.
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 instant when the bookmark was created.
        updatedAt:
          type: string
          format: date-time
          description: ISO-8601 instant when the bookmark was last updated.
      example:
        id: clxvbkm0000000000000000001
        lessonId: clxvles0000000000000000001
        positionSeconds: 187
        label: Aggregates intro
        createdAt: "2026-04-25T14:00:00Z"
        updatedAt: "2026-04-25T14:00:00Z"

    BookmarkListDto:
      type: object
      required: [items]
      description: >-
        The requesting user's bookmarks for a single lesson, sorted ascending by
        `positionSeconds`.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BookmarkDto"
      example:
        items:
          - id: clxvbkm0000000000000000001
            lessonId: clxvles0000000000000000001
            positionSeconds: 187
            label: Aggregates intro
            createdAt: "2026-04-25T14:00:00Z"
            updatedAt: "2026-04-25T14:00:00Z"
          - id: clxvbkm0000000000000000002
            lessonId: clxvles0000000000000000001
            positionSeconds: 742
            label: Invariants section
            createdAt: "2026-04-25T14:12:00Z"
            updatedAt: "2026-04-25T14:12:00Z"

    CreateBookmarkRequest:
      type: object
      required: [positionSeconds]
      description: Payload for creating a new bookmark on a lesson.
      properties:
        positionSeconds:
          type: integer
          minimum: 0
          description: Playback position in seconds to pin the bookmark at.
        label:
          type: string
          minLength: 1
          maxLength: 200
          description: Optional free-form label. Trimmed server-side.
      example:
        positionSeconds: 187
        label: Aggregates intro

    ContinueWatchingDto:
      type: object
      required: [items]
      description: >-
        Ordered list of courses the requester is in the middle of, most-recently-
        watched first. Empty array for new users.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ContinueWatchingItem"
      example:
        items:
          - courseId: clxvcrs0000000000000000001
            courseTitle: Pragmatic Clean Architecture
            librarySlug: conference-recordings
            percent: 15.79
            lessonsCompleted: 12
            lessonsTotal: 76
            lastSeenAt: "2026-04-25T14:32:00Z"
            lastSeenLessonId: clxvles0000000000000000042
          - courseId: clxvcrs0000000000000000002
            courseTitle: Domain-Driven Design by Eric Evans
            percent: 33.33
            lessonsCompleted: 6
            lessonsTotal: 18
            lastSeenAt: "2026-04-24T10:10:00Z"
            lastSeenLessonId: clxvles0000000000000000007

    ContinueWatchingItem:
      type: object
      required:
        - courseId
        - courseTitle
        - percent
        - lessonsCompleted
        - lessonsTotal
        - lastSeenAt
        - lastSeenLessonId
      description: >-
        A single entry in the continue-watching row, sourced from the
        `CourseProgressReadModel` projection.
      properties:
        courseId:
          type: string
          description: Server-generated cuid identifying the course.
        courseTitle:
          type: string
          minLength: 1
          maxLength: 200
          description: Display title of the course.
        librarySlug:
          type: string
          description: >-
            Slug of the parent library, included for the URL builder.
            Optional because not every layout exposes a per-library slug yet.
        percent:
          type: number
          minimum: 0
          maximum: 100
          description: "Course completion = `lessonsCompleted / lessonsTotal * 100`."
        lessonsCompleted:
          type: integer
          minimum: 0
          description: Number of lessons the user has completed in this course.
        lessonsTotal:
          type: integer
          minimum: 0
          description: Total number of lessons in the course.
        lastSeenAt:
          type: string
          format: date-time
          description: >-
            Most recent moment any lesson in this course was watched
            (completed or not).
        lastSeenLessonId:
          type: string
          description: >-
            The lesson the player last reported a position on, used to wire
            the 'Resume' CTA.
      example:
        courseId: clxvcrs0000000000000000001
        courseTitle: Pragmatic Clean Architecture
        librarySlug: conference-recordings
        percent: 15.79
        lessonsCompleted: 12
        lessonsTotal: 76
        lastSeenAt: "2026-04-25T14:32:00Z"
        lastSeenLessonId: clxvles0000000000000000042

    RecentlyAddedDto:
      type: object
      required: [items]
      description: >-
        Courses added to the requester's libraries, most recent first.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RecentlyAddedItem"
      example:
        items:
          - courseId: clxvcrs0000000000000000010
            courseTitle: Implementing Domain-Driven Design
            librarySlug: conference-recordings
            lessonCount: 24
            totalDurationSeconds: 14400
            createdAt: "2026-04-26T08:14:00Z"

    RecentlyAddedItem:
      type: object
      required:
        - courseId
        - courseTitle
        - lessonCount
        - totalDurationSeconds
        - createdAt
      description: A course freshly added to one of the requester's libraries.
      properties:
        courseId:
          type: string
          description: Server-generated cuid identifying the course.
        courseTitle:
          type: string
          minLength: 1
          maxLength: 200
          description: Display title of the course.
        librarySlug:
          type: string
          description: >-
            Slug of the parent library, included for the URL builder.
            Optional because not every layout exposes a per-library slug yet.
        lessonCount:
          type: integer
          minimum: 0
          description: Number of lessons in the course at intake time.
        totalDurationSeconds:
          type: integer
          minimum: 0
          description: Sum of `Lesson.duration` across the course, in whole seconds.
        createdAt:
          type: string
          format: date-time
          description: Moment the course was added to its library.
      example:
        courseId: clxvcrs0000000000000000010
        courseTitle: Implementing Domain-Driven Design
        librarySlug: conference-recordings
        lessonCount: 24
        totalDurationSeconds: 14400
        createdAt: "2026-04-26T08:14:00Z"

    RecentlyCompletedDto:
      type: object
      required: [items]
      description: >-
        Courses the requester finished most recently, most-recent first.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RecentlyCompletedItem"
      example:
        items:
          - courseId: clxvcrs0000000000000000020
            courseTitle: Distributed Systems Foundations
            librarySlug: conference-recordings
            lessonsTotal: 18
            completedAt: "2026-04-23T20:45:00Z"

    RecentlyCompletedItem:
      type: object
      required:
        - courseId
        - courseTitle
        - lessonsTotal
        - completedAt
      description: >-
        A course where the requester completed every lesson. Sourced from
        the `CourseProgressReadModel` projection (`lessonsCompleted ==
        lessonsTotal`).
      properties:
        courseId:
          type: string
          description: Server-generated cuid identifying the course.
        courseTitle:
          type: string
          minLength: 1
          maxLength: 200
          description: Display title of the course.
        librarySlug:
          type: string
          description: Slug of the parent library, included for the URL builder.
        lessonsTotal:
          type: integer
          minimum: 0
          description: Total lessons in the course (== lessons completed for this row).
        completedAt:
          type: string
          format: date-time
          description: >-
            Time the requester finished the last lesson —
            `CourseProgressReadModel.lastSeenAt` at the moment percent hit 100.
      example:
        courseId: clxvcrs0000000000000000020
        courseTitle: Distributed Systems Foundations
        librarySlug: conference-recordings
        lessonsTotal: 18
        completedAt: "2026-04-23T20:45:00Z"

    YourWeekDto:
      type: object
      required: [minutesWatched, lessonsCompleted, range]
      description: >-
        Roll-up of the requester's activity over the trailing seven days.
      properties:
        minutesWatched:
          type: integer
          minimum: 0
          description: >-
            Total whole minutes watched by the requester in the window.
            Computed by summing duration across `LessonProgress` rows whose
            `updatedAt` falls inside `range`.
        lessonsCompleted:
          type: integer
          minimum: 0
          description: >-
            Number of lessons the requester completed during the window.
            Counted from `LessonProgress.completedAt`.
        range:
          $ref: "#/components/schemas/DateRange"
      example:
        minutesWatched: 312
        lessonsCompleted: 8
        range:
          from: "2026-04-20T22:00:00Z"
          to: "2026-04-27T22:00:00Z"

    DateRange:
      type: object
      required: [from, to]
      description: Half-open interval `[from, to)`, both ISO-8601 with offset.
      properties:
        from:
          type: string
          format: date-time
          description: Inclusive lower bound.
        to:
          type: string
          format: date-time
          description: Exclusive upper bound.

    CourseDto:
      type: object
      required: [id, libraryId, slug, title, sections, progress, createdAt, updatedAt]
      description: Full representation of a Course aggregate.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this course.
        libraryId:
          type: string
          description: cuid of the library this course belongs to.
        slug:
          $ref: "#/components/schemas/CourseSlug"
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 4000
        sections:
          type: array
          items:
            $ref: "#/components/schemas/SectionDto"
          description: Sections sorted ascending by position.
        progress:
          $ref: "#/components/schemas/CourseProgress"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        id: clxvcrs0000000000000000001
        libraryId: clxvp1234567890abcdefghij
        slug: pragmatic-clean-architecture
        title: Pragmatic Clean Architecture
        description: Milan Jovanović's deep-dive into Clean Architecture with .NET.
        sections:
          - id: clxvsec0000000000000000001
            position: 1
            title: Introduction
          - id: clxvsec0000000000000000002
            position: 2
            title: Domain Layer
        progress:
          percent: 0
          lessonsCompleted: 0
          lessonsTotal: 24
        createdAt: "2026-04-25T09:00:00Z"
        updatedAt: "2026-04-25T09:00:00Z"

    CourseListDto:
      type: object
      required: [items]
      description: List of courses visible to the requester.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CourseDto"
      example:
        items:
          - id: clxvcrs0000000000000000001
            libraryId: clxvp1234567890abcdefghij
            slug: pragmatic-clean-architecture
            title: Pragmatic Clean Architecture
            description: Milan Jovanović's deep-dive into Clean Architecture with .NET.
            sections:
              - id: clxvsec0000000000000000001
                position: 1
                title: Introduction
              - id: clxvsec0000000000000000002
                position: 2
                title: Domain Layer
            progress:
              percent: 0
              lessonsCompleted: 0
              lessonsTotal: 24
            createdAt: "2026-04-25T09:00:00Z"
            updatedAt: "2026-04-25T09:00:00Z"
          - id: clxvcrs0000000000000000002
            libraryId: clxvp1234567890abcdefghij
            slug: ddd-by-eric-evans
            title: Domain-Driven Design by Eric Evans
            sections:
              - id: clxvsec0000000000000000003
                position: 1
                title: Putting the Domain Model to Work
              - id: clxvsec0000000000000000004
                position: 2
                title: Building Blocks of a Model-Driven Design
            progress:
              percent: 0
              lessonsCompleted: 0
              lessonsTotal: 18
            createdAt: "2026-04-25T09:05:00Z"
            updatedAt: "2026-04-25T09:05:00Z"

    CourseOutlineDto:
      type: object
      required: [course, sections, materials]
      description: >-
        Page-shaped projection of a course — enough data to render the Course
        detail screen in one round-trip. Aggregates sections, lessons (lite),
        and course-level materials with the requester's progress applied.
      properties:
        course:
          $ref: "#/components/schemas/CourseOutlineSummary"
        sections:
          type: array
          description: Sections sorted by position.
          items:
            $ref: "#/components/schemas/SectionOutline"
        materials:
          type: array
          description: >-
            Course-level materials, deduplicated and aggregated across every
            lesson in the course. Empty array when no lesson carries
            materials.
          items:
            $ref: "#/components/schemas/CourseMaterialItem"

    CourseOutlineSummary:
      type: object
      required: [id, title, lessonsTotal, totalDurationSeconds, progress, createdAt, updatedAt]
      description: Course-level fields surfaced in the page hero.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying the course.
        title:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
        description:
          type: ["string", "null"]
          description: Long-form description rendered under the title.
        instructor:
          type: ["string", "null"]
          description: >-
            Visible "by …" label. Optional — may be null until the catalog
            DTO grows the field.
        librarySlug:
          type: string
          description: >-
            Slug of the parent library, included for breadcrumbs. Optional
            because Library has no slug field yet (same caveat as
            ContinueWatchingItem).
        lessonsTotal:
          type: integer
          minimum: 0
        totalDurationSeconds:
          type: integer
          minimum: 0
          description: Sum of `Lesson.duration` across the course (whole seconds).
        progress:
          $ref: "#/components/schemas/CourseProgress"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SectionOutline:
      type: object
      required: [id, position, title, totalDurationSeconds, lessons]
      description: One section in the outline, with its lesson list inline.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this section.
        position:
          type: integer
          minimum: 1
          description: 1-based position within the course.
        title:
          type: string
          minLength: 1
          maxLength: 200
        totalDurationSeconds:
          type: integer
          minimum: 0
          description: Sum of `Lesson.duration` across this section's lessons.
        lessons:
          type: array
          description: Lessons sorted by position.
          items:
            $ref: "#/components/schemas/LessonOutlineItem"

    LessonOutlineItem:
      type: object
      required:
        - id
        - position
        - title
        - durationSeconds
        - hasMaterials
        - state
        - progressPercent
      description: >-
        Lightweight per-lesson row for the Course detail outline. Maps 1:1 to
        the AppLessonRow component's props.
      properties:
        id:
          type: string
        position:
          type: integer
          minimum: 1
        title:
          type: string
          minLength: 1
          maxLength: 200
        durationSeconds:
          type: integer
          minimum: 0
        hasMaterials:
          type: boolean
          description: Whether the lesson has at least one sidecar material.
        state:
          type: string
          enum: [not-started, in-progress, completed, locked]
          description: >-
            Per-user lesson state. Derived: `completed` when the
            `LessonProgress` row has `completed: true`; `in-progress` when
            it has progress but is not complete; `locked` when the
            requester does not hold a READ grant on the course's library
            (defensive — usually the whole course 403s before this);
            `not-started` otherwise.
        progressPercent:
          type: integer
          minimum: 0
          maximum: 100
          description: 0..100 — only meaningful when `state === 'in-progress'`.

    CourseMaterialItem:
      type: object
      required: [id, lessonId, kind, label, sizeBytes]
      description: One sidecar material aggregated at the course level.
      properties:
        id:
          type: string
        lessonId:
          type: string
          description: Owning lesson id. Used by the right-rail to link to the lesson.
        kind:
          type: string
          enum: [doc, note, image, slide]
        label:
          type: string
        sizeBytes:
          type: integer
          minimum: 0

    CourseProgress:
      type: object
      required: [percent, lessonsCompleted, lessonsTotal]
      description: Progress summary for a course from the requester's perspective.
      properties:
        percent:
          type: number
          minimum: 0
          maximum: 100
          description: >-
            Completion percent. v1 always returns 0 — populated once the
            LessonProgress projector lands (E10-F01-S01).
        lessonsCompleted:
          type: integer
          minimum: 0
        lessonsTotal:
          type: integer
          minimum: 0
      example:
        percent: 0
        lessonsCompleted: 0
        lessonsTotal: 24

    CourseSlug:
      type: string
      pattern: "^[a-z0-9](?:[a-z0-9-]{0,98}[a-z0-9])?$"
      description: >-
        URL-safe slug. 1–100 chars, lowercase ASCII letters, digits, and hyphens;
        cannot start or end with a hyphen. Unique within a library.
      example: pragmatic-clean-architecture

    DependencyStatus:
      type: ["string", "null"]
      enum: [ok, degraded, down]

    GrantLevel:
      type: string
      enum: [READ]
      description: >-
        Access level. v1 only issues READ; the enum is open for future levels
        (e.g. ADMIN, NONE for explicit denials).

    GrantTarget:
      description: The resource to which access is granted. Discriminated by `kind`.
      oneOf:
        - title: LibraryTarget
          type: object
          required: [kind, libraryId]
          properties:
            kind:
              type: string
              enum: [library]
              description: Discriminator value indicating a library-scoped grant.
            libraryId:
              type: string
              description: Server-generated cuid of the target library.
          additionalProperties: false
          example:
            kind: library
            libraryId: clxvp1234567890abcdefghij
        - title: CourseTarget
          type: object
          required: [kind, courseId]
          properties:
            kind:
              type: string
              enum: [course]
              description: Discriminator value indicating a course-scoped grant. Accepted in v1 even though the Course aggregate (E06-F03-S01) has not landed yet — keeps the contract stable for E14-F04-S01.
            courseId:
              type: string
              description: Server-generated cuid of the target course (e.g. "DDD by Eric Evans").
          additionalProperties: false
          example:
            kind: course
            courseId: clxvcrs0000000000000000001
      discriminator:
        propertyName: kind
        mapping:
          library: "#/components/schemas/GrantTarget/oneOf/0"
          course: "#/components/schemas/GrantTarget/oneOf/1"

    HasUsersResponse:
      type: object
      required: [hasUsers]
      additionalProperties: false
      properties:
        hasUsers:
          type: boolean
          description: |
            True iff `users` table count > 0. The web SPA caches this for the
            session lifetime and re-checks only when the user explicitly
            signs out + back in.

    InstanceConfigDto:
      type: object
      required: [selfRegistration, emailVerificationRequired, ssoProviders]
      additionalProperties: false
      description: >-
        Public runtime configuration. Read once at app boot; cache for the
        session.
      properties:
        selfRegistration:
          type: boolean
          description: When false, sign-up CTAs are hidden and /sign-up redirects to /sign-in.
        emailVerificationRequired:
          type: boolean
          description: >-
            When true, sign-up wizard renders the 6-digit-code step between
            account creation and library setup.
        ssoProviders:
          type: array
          description: >-
            Configured OAuth / SSO providers. Empty array in v1 — Better
            Auth's `genericOAuth` plugin lands in v2.
          items:
            $ref: "#/components/schemas/SsoProviderConfig"

    SsoProviderConfig:
      type: object
      required: [id, label, iconName]
      additionalProperties: false
      description: One configured SSO / OAuth provider, rendered as an SsoBlock button.
      properties:
        id:
          type: string
          minLength: 1
          description: Stable identifier (e.g. `google`, `github`, `okta-foo`). Emitted on click.
        label:
          type: string
          minLength: 1
          maxLength: 80
          description: Human-readable label (e.g. `Continue with Google`).
        iconName:
          type: string
          minLength: 1
          description: IconCS glyph name (e.g. `mail`, `github`, `key`).

    HealthStatus:
      type: object
      required: [status, version, uptimeSeconds, dependencies]
      properties:
        status:
          $ref: "#/components/schemas/DependencyStatus"
        version:
          type: ["string", "null"]
          description: Semantic version of the running backend build
        uptimeSeconds:
          type: integer
          minimum: 0
          description: Seconds since the backend process started
        dependencies:
          type: object
          required: [db, redis, centrifugo]
          properties:
            db:
              $ref: "#/components/schemas/DependencyStatus"
            redis:
              $ref: "#/components/schemas/DependencyStatus"
            centrifugo:
              $ref: "#/components/schemas/DependencyStatus"

    LibraryDto:
      type: object
      required: [id, name, rootPath, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: Server-generated identifier.
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable label.
        rootPath:
          type: string
          minLength: 1
          description: >-
            Absolute filesystem path to the library root. Must start with `/`
            (POSIX) or `[A-Za-z]:\` (Windows).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        id: clxvp1234567890abcdefghij
        name: Conference Recordings
        rootPath: /srv/courses/conference
        createdAt: "2026-04-25T09:00:00Z"
        updatedAt: "2026-04-25T09:00:00Z"

    MeDto:
      type: object
      required: [id, email, name, displayName, role]
      additionalProperties: false
      description: >-
        The calling user's own profile. Returned by `GET /me` (not yet
        implemented — for now read from `GET /auth/get-session`) and by
        `PATCH /me`.
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        displayName:
          oneOf:
            - type: string
              minLength: 1
            - type: "null"
        role:
          $ref: "#/components/schemas/AdminUserRole"

    UpdateMeRequest:
      type: object
      additionalProperties: false
      description: >-
        Patch body for `PATCH /me`. At least one field must be set; the
        handler returns 400 on an empty body. Currently only
        `displayName` is exposed for self-edit.
      properties:
        displayName:
          oneOf:
            - type: string
              minLength: 1
              maxLength: 64
            - type: "null"
          description: >-
            Optional user-facing name separate from the Better Auth `name`
            field. Pass `null` to clear it (the topbar avatar then falls
            back to `name`).

    UpdateLibraryRequest:
      type: object
      additionalProperties: false
      description: >-
        Patch body for `PATCH /libraries/{id}`. Currently only `name` is
        mutable; changing `rootPath` is intentionally unsupported.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200

    SearchResultDto:
      type: object
      required: [query, courses, lessons]
      additionalProperties: false
      description: >-
        Two result lists for a single search query — one of course hits
        and one of lesson hits. The shape is intentionally not unified
        because each kind needs different context fields (lesson hits
        carry their parent course/section so the SPA can show breadcrumb-
        style context).
      properties:
        query:
          type: string
          description: The trimmed query string the server matched against.
        courses:
          type: array
          items:
            $ref: "#/components/schemas/SearchCourseHit"
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/SearchLessonHit"

    SearchCourseHit:
      type: object
      required: [id, libraryId, title, slug, lessonsTotal]
      additionalProperties: false
      properties:
        id:
          type: string
        libraryId:
          type: string
        title:
          type: string
        slug:
          type: string
        lessonsTotal:
          type: integer
          minimum: 0

    SearchLessonHit:
      type: object
      required: [id, courseId, courseTitle, sectionTitle, title, position]
      additionalProperties: false
      properties:
        id:
          type: string
        courseId:
          type: string
        courseTitle:
          type: string
          description: Title of the parent course — included so the SPA can show breadcrumb context.
        sectionTitle:
          type: string
          description: Title of the parent section.
        title:
          type: string
        position:
          type: integer
          minimum: 1

    LibraryListDto:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LibraryDto"
      example:
        items:
          - id: clxvp1234567890abcdefghij
            name: Conference Recordings
            rootPath: /srv/courses/conference
            createdAt: "2026-04-25T09:00:00Z"
            updatedAt: "2026-04-25T09:00:00Z"
          - id: clxvp0987654321zyxwvutsrq
            name: Tutorial Screencasts
            rootPath: /srv/courses/tutorials
            createdAt: "2026-04-20T14:30:00Z"
            updatedAt: "2026-04-22T11:00:00Z"

    LessonDto:
      type: object
      required: [id, courseId, sectionId, position, title, materials, subtitles, progress]
      description: Full representation of a Lesson aggregate, including sidecar materials and subtitle tracks.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this lesson.
        courseId:
          type: string
          description: cuid of the course this lesson belongs to.
        sectionId:
          type: string
          description: cuid of the section this lesson belongs to.
        position:
          type: integer
          minimum: 1
          description: 1-based position within the section.
        title:
          type: string
          minLength: 1
          maxLength: 200
        durationSeconds:
          type: integer
          minimum: 0
          description: >-
            Video duration in seconds. Populated by E06-F02-S02 (ffprobe).
            `undefined` until then.
        materials:
          type: array
          items:
            $ref: "#/components/schemas/MaterialDto"
          description: Sidecar materials (PDF / Markdown / text / image). Empty array when none.
        subtitles:
          type: array
          items:
            $ref: "#/components/schemas/SubtitleDto"
          description: Available subtitle tracks. Empty array when none.
        progress:
          $ref: "#/components/schemas/LessonProgress"
      example:
        id: clxvles0000000000000000001
        courseId: clxvcrs0000000000000000001
        sectionId: clxvsec0000000000000000002
        position: 3
        title: Aggregates
        durationSeconds: 2847
        materials:
          - id: clxvmat0000000000000000001
            kind: doc
            label: 03 - Aggregates slides
            sizeBytes: 204800
        subtitles:
          - id: clxvsub0000000000000000001
            language: en
            label: English
        progress:
          percent: 0
          completed: false
          lastSeenAtSeconds: 0

    LessonProgress:
      type: object
      required: [percent, completed, lastSeenAtSeconds]
      description: Per-lesson playback progress for the requesting user.
      properties:
        percent:
          type: number
          minimum: 0
          maximum: 100
          description: >-
            Completion percent. v1 always returns 0 — populated once the
            LessonProgress projector lands (E10-F01-S01).
        completed:
          type: boolean
          description: Whether the lesson is marked as completed.
        lastSeenAtSeconds:
          type: integer
          minimum: 0
          description: >-
            Last reported watched position in seconds. v1 always returns 0 —
            populated by the LessonProgress projector (E10-F01-S01).
      example:
        percent: 0
        completed: false
        lastSeenAtSeconds: 0

    LessonProgressDto:
      type: object
      required: [lessonId, positionSeconds, durationSeconds, percent, completed, lastSeenAt]
      description: Per-user progress state for a single lesson, as persisted after a merge.
      properties:
        lessonId:
          type: string
          description: Server-generated cuid identifying the lesson.
        positionSeconds:
          type: integer
          minimum: 0
          description: Last recorded watch position in seconds.
        durationSeconds:
          type: integer
          minimum: 1
          description: Lesson video duration in seconds.
        percent:
          type: number
          minimum: 0
          maximum: 100
          description: >-
            Computed as `positionSeconds / durationSeconds * 100`.
            Clamped to 100 when position >= duration.
        completed:
          type: boolean
          description: >-
            True once the user crosses the 90 % threshold; never flips back
            to false.
        lastSeenAt:
          type: string
          format: date-time
          description: ISO-8601 instant of the last accepted progress write.
        completedAt:
          type: string
          format: date-time
          description: >-
            Set the first time `completed` flips to true. Stable across
            subsequent writes. Absent when `completed` is false.
      example:
        lessonId: clxvles0000000000000000001
        positionSeconds: 1080
        durationSeconds: 1800
        percent: 60
        completed: false
        lastSeenAt: "2026-04-25T14:32:00Z"

    MaterialDto:
      type: object
      required: [id, kind, label, sizeBytes]
      description: A sidecar material attached to a lesson.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this material.
        kind:
          $ref: "#/components/schemas/MaterialKind"
        label:
          type: string
          minLength: 1
          description: >-
            Human-readable name derived from the original filename (extension
            stripped, ordinal prefix preserved if present).
        sizeBytes:
          type: integer
          minimum: 0
          description: File size in bytes.
      example:
        id: clxvmat0000000000000000001
        kind: doc
        label: 03 - Aggregates slides
        sizeBytes: 204800

    MaterialKind:
      type: string
      enum: [doc, note, image, slide]
      description: >-
        Coarse classification of a sidecar material. `doc` is `.pdf`,
        `note` is `.md` / `.txt`, `image` is `.png` / `.jpg`,
        `slide` is reserved for future use.
      example: doc

    NoteDto:
      type: object
      required: [id, lessonId, body, createdAt, updatedAt]
      description: A user-owned Markdown note attached to a single lesson.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this note.
        lessonId:
          type: string
          description: cuid of the lesson this note belongs to.
        body:
          type: string
          minLength: 1
          maxLength: 16384
          description: Plain Markdown stored verbatim. Server does not render.
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 instant when the note was first created.
        updatedAt:
          type: string
          format: date-time
          description: ISO-8601 instant when the note body was last replaced.
      example:
        id: clxvnot0000000000000000001
        lessonId: clxvles0000000000000000001
        body: "## Aggregates\n\nKey insight: aggregates enforce invariants across their boundary."
        createdAt: "2026-04-25T15:00:00Z"
        updatedAt: "2026-04-25T15:05:00Z"

    PingResponse:
      type: object
      required: [id, role]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
          description: User id (UUID v4) — Better Auth's internal identifier.
        role:
          type: string
          description: |
            Role string from Better Auth's `additionalFields.role`. Default
            `USER` for fresh sign-ups; admin tooling may assign others.
        displayName:
          type: string
          description: Optional friendly label set by the user in their profile.

    Problem:
      type: object
      description: RFC 9457 problem details
      required: [type, title, status]
      properties:
        type:
          type: ["string", "null"]
          format: uri
          default: about:blank
        title:
          type: ["string", "null"]
        status:
          type: integer
          format: int32
        detail:
          type: ["string", "null"]
        instance:
          type: ["string", "null"]
        code:
          type: ["string", "null"]

    RealtimeToken:
      type: object
      required: [token, expiresAt]
      properties:
        token:
          type: ["string", "null"]
          description: Short-lived HMAC-signed JWT for Centrifugo
        expiresAt:
          type: ["string", "null"]
          format: date-time
          description: ISO-8601 instant when the token expires

    RecordProgressRequest:
      type: object
      required: [lessonId, positionSeconds, durationSeconds, clientUpdatedAt]
      description: Payload for upserting the requester's progress on a lesson.
      properties:
        lessonId:
          type: string
          description: Server-generated cuid identifying the lesson.
        positionSeconds:
          type: integer
          minimum: 0
          description: >-
            Last reported watch position in seconds. Clamped server-side to
            `[0, durationSeconds]`.
        durationSeconds:
          type: integer
          minimum: 1
          description: >-
            Lesson video duration in seconds. Clients pass the player's
            `duration` from the `loadedmetadata` event; it must match the
            server-side value once E06-F02-S02 (ffprobe) lands. v1 trusts
            the client value.
        clientUpdatedAt:
          type: string
          format: date-time
          description: >-
            ISO-8601 timestamp the client recorded the position. Out-of-order
            writes (older than the current `lastSeenAt`) are silently accepted
            and the response echoes the unchanged state.
      example:
        lessonId: clxvles0000000000000000001
        positionSeconds: 1080
        durationSeconds: 1800
        clientUpdatedAt: "2026-04-25T14:32:00Z"

    BatchProgressRequest:
      type: object
      required: [items]
      additionalProperties: false
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: "#/components/schemas/RecordProgressRequest"
          description: |
            Up to 200 progress writes. Cap exists to bound server-side work
            and to keep request bodies under the 1 MiB JSON ceiling.

    BatchProgressResponse:
      type: object
      required: [results]
      additionalProperties: false
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/BatchProgressItemResult"
          description: |
            Same length and order as the input `items` array. Index N in the
            response maps 1:1 to index N in the request.

    BatchProgressItemResult:
      oneOf:
        - $ref: "#/components/schemas/BatchProgressItemAccepted"
        - $ref: "#/components/schemas/BatchProgressItemStale"
        - $ref: "#/components/schemas/BatchProgressItemForbidden"
      discriminator:
        propertyName: status
        mapping:
          accepted: "#/components/schemas/BatchProgressItemAccepted"
          stale: "#/components/schemas/BatchProgressItemStale"
          forbidden: "#/components/schemas/BatchProgressItemForbidden"

    BatchProgressItemAccepted:
      type: object
      required: [status, state]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [accepted]
          description: |
            The client write was applied (or absorbed by last-write-wins
            with no resulting state change). `state` reflects the post-merge
            server state.
        state:
          $ref: "#/components/schemas/LessonProgressDto"

    BatchProgressItemStale:
      type: object
      required: [status, state]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [stale]
          description: |
            The client's `clientUpdatedAt` was older than the server's
            `lastSeenAt` for this lesson. The write was absorbed but the
            server already had newer state — the client should overwrite
            its local cache from `state`.
        state:
          $ref: "#/components/schemas/LessonProgressDto"

    BatchProgressItemForbidden:
      type: object
      required: [status, lessonId]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [forbidden]
          description: |
            Actor has no READ grant covering this lesson, OR the lesson does
            not exist. The two cases are collapsed deliberately to avoid
            existence leakage (no-oracle rule).
        lessonId:
          type: string
          description: Echoes the input `lessonId` for client correlation.

    RegisterGrantRequest:
      type: object
      required: [userId, target, level]
      description: Payload for issuing a new access grant.
      properties:
        userId:
          type: string
          description: Better Auth user id of the grantee.
        target:
          $ref: "#/components/schemas/GrantTarget"
        level:
          $ref: "#/components/schemas/GrantLevel"
      example:
        userId: clxvusr0000000000000000001
        target:
          kind: library
          libraryId: clxvp1234567890abcdefghij
        level: READ

    RegisterLibraryRequest:
      type: object
      required: [name, rootPath]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable label.
        rootPath:
          type: string
          minLength: 1
          pattern: '^(?:/[^\0]*|[A-Za-z]:\\[^\0]*)$'
          description: >-
            Absolute filesystem path to the library root. Accepts POSIX paths
            starting with `/` or Windows drive paths starting with `[A-Za-z]:\`.
            Trailing slashes are allowed.
      example:
        name: Conference Recordings
        rootPath: /srv/courses/conference

    ScanDto:
      type: object
      required:
        - id
        - libraryId
        - status
        - startedAt
        - filesScanned
        - filesAdded
        - filesUpdated
        - coursesDiscovered
        - errors
      description: A scan record for a library, produced by the Scan aggregate.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this scan.
        libraryId:
          type: string
          description: cuid of the library that was scanned.
        status:
          $ref: "#/components/schemas/ScanStatus"
        startedAt:
          type: string
          format: date-time
          description: ISO-8601 instant when the scan was started.
        finishedAt:
          type: string
          format: date-time
          description: >-
            Set on terminal status (`succeeded` / `failed` / `cancelled`).
            Absent while `status: running`.
        filesScanned:
          type: integer
          minimum: 0
          description: Total number of filesystem entries inspected.
        filesAdded:
          type: integer
          minimum: 0
          description: Files that did not exist in the catalog before this scan.
        filesUpdated:
          type: integer
          minimum: 0
          description: Files whose metadata changed since the last scan.
        coursesDiscovered:
          type: integer
          minimum: 0
          description: Course roots detected during this scan.
        errors:
          type: array
          minItems: 0
          items:
            $ref: "#/components/schemas/ScanError"
          description: Non-fatal per-file errors encountered during the scan.
      example:
        id: clxvscn0000000000000000001
        libraryId: clxvp1234567890abcdefghij
        status: succeeded
        startedAt: "2026-04-25T10:30:00Z"
        finishedAt: "2026-04-25T10:31:42Z"
        filesScanned: 314
        filesAdded: 12
        filesUpdated: 3
        coursesDiscovered: 7
        errors:
          - path: "02 - Patterns/05 - Repositories.mp4"
            message: "File is not readable — permission denied."
            code: unreadable-file
          - path: "04 - Bounded Contexts/course.json"
            message: "JSON schema validation failed: missing required field 'title'."
            code: course-json-invalid

    ScanError:
      type: object
      required: [path, message]
      description: A non-fatal error encountered while processing a single file during a scan.
      properties:
        path:
          type: string
          description: >-
            Filesystem path relative to the library root,
            e.g. `01 - Intro to DDD/03 - Aggregates.mp4`.
        message:
          type: string
          description: Human-readable description of what went wrong.
        code:
          type: string
          description: >-
            Machine-readable error key
            (e.g. `course-json-invalid`, `unreadable-file`,
            `unsupported-extension`).
      example:
        path: "02 - Patterns/05 - Repositories.mp4"
        message: "File is not readable — permission denied."
        code: unreadable-file

    ScanStatus:
      type: string
      enum: [running, succeeded, failed, cancelled]
      description: >-
        Scan lifecycle. `cancelled` is reserved for v2 admin-cancel; v1 scans
        only ever transition `running → {succeeded, failed}`.

    StreamUrlDto:
      type: object
      required: [url, token, expiresAt]
      description: Short-lived signed URL for streaming a lesson video.
      properties:
        url:
          type: string
          format: uri-reference
          description: >-
            URL the player should request. Same-origin relative path (e.g.
            `/api/v1/stream/lessons/<id>?token=…`) — the browser resolves
            it against the SPA's API origin so the backend doesn't need to
            know its public hostname. Carries the signed token as the
            `token` query parameter so existing video-element
            implementations work without an Authorization header.
        token:
          type: string
          minLength: 1
          description: >-
            Opaque signed token. Format is internal to the backend (currently a
            JWT-like compact form `header.payload.signature`); clients must
            round-trip it untouched.
        expiresAt:
          type: string
          format: date-time
          description: >-
            ISO-8601 timestamp at which the token + URL stop being accepted.
            Clients should request a fresh URL before this moment.
      example:
        url: "/api/v1/stream/lessons/clxvles0000000000000000001?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJjbHh2dXNyMDAwMDAwMDAwMDAwMDAwMDAxIiwibGVzc29uSWQiOiJjbHh2bGVzMDAwMDAwMDAwMDAwMDAwMDAxIiwiZXhwIjoxNzQ1NTc0NDAwfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
        token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJjbHh2dXNyMDAwMDAwMDAwMDAwMDAwMDAxIiwibGVzc29uSWQiOiJjbHh2bGVzMDAwMDAwMDAwMDAwMDAwMDAxIiwiZXhwIjoxNzQ1NTc0NDAwfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
        expiresAt: "2026-04-25T10:15:00Z"

    MaterialDownloadUrlDto:
      type: object
      required: [url, token, expiresAt]
      description: >-
        Short-lived signed URL for downloading a lesson material (PDF, MD,
        image). Same shape as `StreamUrlDto` — the only difference is the
        token's internal scope claim. Issued by `issueMaterialDownloadUrl`
        and consumed by the browser via a transient `<a href download>`.
      properties:
        url:
          type: string
          format: uri-reference
          description: >-
            URL the browser should fetch. Same-origin relative path (e.g.
            `/api/v1/stream/materials/<id>?token=…`). Carries the signed
            token as the `token` query parameter so a direct
            `<a href download>` works without an Authorization header.
        token:
          type: string
          minLength: 1
          description: >-
            Opaque signed token. Internal format is the same compact
            `header.payload.signature` shape as the video stream token, but
            the payload's scope claim differs so a video token can never be
            re-used to fetch a material (and vice versa). Round-trip
            untouched.
        expiresAt:
          type: string
          format: date-time
          description: >-
            ISO-8601 timestamp at which the token + URL stop being accepted.
            Default TTL is 5 minutes — clicking a download link should
            resolve immediately, so a long TTL is unnecessary.
      example:
        url: "/api/v1/stream/materials/clxvmat0000000000000000001?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IlNUSyIsInYiOjF9.eyJzdWIiOiJjbHh2dXNyMDAwMDAwMDAwMDAwMDAwMDAxIiwibWlkIjoiY2x4dm1hdDAwMDAwMDAwMDAwMDAwMDAwMSIsInNjcCI6Im1hdGVyaWFsIiwiZXhwIjoxNzQ1NTc0NDAwLCJpYXQiOjE3NDU1NzQxMDB9.k9sQfxCq8wL2pT4N3LKzr8B5jM0hVzG4Yf9X2N1tQp8"
        token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IlNUSyIsInYiOjF9.eyJzdWIiOiJjbHh2dXNyMDAwMDAwMDAwMDAwMDAwMDAxIiwibWlkIjoiY2x4dm1hdDAwMDAwMDAwMDAwMDAwMDAwMSIsInNjcCI6Im1hdGVyaWFsIiwiZXhwIjoxNzQ1NTc0NDAwLCJpYXQiOjE3NDU1NzQxMDB9.k9sQfxCq8wL2pT4N3LKzr8B5jM0hVzG4Yf9X2N1tQp8"
        expiresAt: "2026-04-25T10:05:00Z"

    SubtitleDto:
      type: object
      required: [id, language, label]
      description: A subtitle track available for a lesson.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this subtitle track.
        language:
          type: string
          pattern: "^[a-z]{2,3}$|^und$"
          description: >-
            BCP-47-ish language code parsed from the filename suffix
            (`Lesson.en.srt` → `en`). `und` when no suffix is present.
        label:
          type: string
          minLength: 1
          description: Human-readable label for the subtitle track (e.g. "English").
      example:
        id: clxvsub0000000000000000001
        language: en
        label: English

    SectionDto:
      type: object
      required: [id, position, title]
      description: A section within a course.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this section.
        position:
          type: integer
          minimum: 1
          description: 1-based position within the course. Sections are returned sorted by position.
        title:
          type: string
          minLength: 1
          maxLength: 200
      example:
        id: clxvsec0000000000000000001
        position: 1
        title: Introduction

    UpdateBookmarkRequest:
      type: object
      description: |
        Payload for updating a bookmark. All fields are optional, but at least
        one of `positionSeconds` or `label` must be present — the server returns
        400 on empty patches.
      properties:
        positionSeconds:
          type: integer
          minimum: 0
          description: New playback position in seconds.
        label:
          type: ["string", "null"]
          maxLength: 200
          description: >-
            Pass an explicit `null` to clear the label; omit to leave it
            untouched.
      example:
        positionSeconds: 210
        label: Aggregate boundaries explained

    UpdateCourseRequest:
      type: object
      description: |
        Payload for updating course metadata. All fields are optional, but at
        least one of `title`, `description`, or `slug` must be present
        (server-side validation rule — OpenAPI does not have a native
        "at-least-one" constraint).
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 4000
        slug:
          $ref: "#/components/schemas/CourseSlug"
      example:
        title: Pragmatic Clean Architecture (2nd ed.)
        slug: pragmatic-clean-architecture-2nd-ed

    UpsertNoteRequest:
      type: object
      required: [lessonId, body]
      description: Payload for creating or replacing the requester's note on a lesson.
      properties:
        lessonId:
          type: string
          description: Server-generated cuid identifying the lesson.
        body:
          type: string
          minLength: 1
          maxLength: 16384
          description: >-
            Plain Markdown. Trimmed server-side; an empty post-trim body is
            rejected as 400.
      example:
        lessonId: clxvles0000000000000000001
        body: "## Aggregates\n\nKey insight: aggregates enforce invariants across their boundary."
