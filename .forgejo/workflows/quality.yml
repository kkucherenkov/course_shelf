name: Quality (on-demand)

# Heavy visual-regression + license checks, kept OFF the per-PR path so CI
# stays fast on the homelab runner. Run it:
#   - manually (Actions → Quality (on-demand) → Run workflow) before a
#     release or after touching @app/ui components, and
#   - nightly, for a daily drift signal (mirrors e2e.yml's cadence).
#
# The cheap dependency vulnerability scan still runs per-PR inside ci.yml;
# only the browser-based Storybook test-runner and the license-checker
# download moved here.

on:
  workflow_dispatch:
  schedule:
    # Nightly at 03:30 UTC — after the e2e nightly (03:00), same rationale:
    # a daily signal that never slows a PR.
    - cron: "30 3 * * *"

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  quality:
    name: Storybook visual · license audit
    runs-on: ubuntu-latest
    # Runs inside mcr.microsoft.com/playwright:v1.59.1-jammy so Chromium and
    # every apt system dep the Storybook test-runner needs are already in
    # the image. Image tag must match `playwright` in packages/ui/package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build design tokens
        run: pnpm design:build

      - name: Build Storybook static
        env:
          STORYBOOK_A11Y_LEVEL: todo
        run: pnpm --filter @app/ui storybook:build

      - name: Run Storybook test-runner
        run: pnpm --filter @app/ui test:visual:ci

      # MPL-2.0 is on the allowlist as a forward-compatible defensive
      # entry — no current dep ships under it, but @axe-core/playwright
      # (used the moment we add Storybook a11y gates) is MPL-2.0. It's
      # weak-copyleft (file-level reciprocity only, doesn't affect linked
      # consumers) and standard for accessibility tooling.
      - name: License compliance check
        run: pnpm dlx license-checker --excludePrivatePackages --onlyAllow 'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;Python-2.0;CC-BY-3.0;CC-BY-4.0;MPL-2.0'
