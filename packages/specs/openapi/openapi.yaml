openapi: 3.1.0
info:
  title: App API
  version: 0.6.0
  description: |
    Spec-first HTTP API. Paths include the versioned prefix (`/api/v1`) so
    generated clients can be used without additional base-URL rewriting.

    **Authentication endpoints** live under `/api/v1/auth/*` and follow the
    [Better Auth protocol](https://www.better-auth.com/docs). They are
    deliberately not enumerated here: Better Auth owns that wire contract and
    evolves it independently of our OpenAPI surface. The `cookieAuth` and
    `bearerAuth` security schemes documented below describe how the *rest* of
    this API accepts credentials issued by that namespace — session cookies
    (web) and bearer tokens (mobile, via the `bearer` plugin).
  contact:
    name: App Team
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.example.com
    description: Production (placeholder)
tags:
  - name: Access
    description: User → resource access grants. Admins issue and revoke; everyone else only ever reads their own implicit grants from session context.
  - name: Catalog
    description: Course library registration and lookup.
  - name: system
    description: Health and liveness endpoints
  - name: realtime
    description: Centrifugo connection tokens

paths:
  /api/v1/access/grants:
    post:
      operationId: registerGrant
      summary: Grant a user READ access to a library or course
      description: |
        Idempotent on (userId, target). Returns 409 if the same grant already
        exists. Only admins (`session.user.role === 'admin'`) may call this;
        other authenticated users get 403.
      tags: [Access]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterGrantRequest"
            examples:
              libraryGrant:
                summary: Grant READ access to Conference Recordings
                value:
                  userId: clxvusr0000000000000000001
                  target:
                    kind: library
                    libraryId: clxvp1234567890abcdefghij
                  level: READ
      responses:
        "201":
          description: Grant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessGrantDto"
              examples:
                created:
                  value:
                    id: clxvgnt0000000000000000001
                    userId: clxvusr0000000000000000001
                    target:
                      kind: library
                      libraryId: clxvp1234567890abcdefghij
                    level: READ
                    createdAt: "2026-04-25T10:00:00Z"
        "400":
          description: Validation error — missing or malformed fields
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badInput:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "target.kind must be 'library' or 'course'."
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may issue access grants.
        "404":
          description: Target library or course not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No library with that id exists.
        "409":
          description: A grant for this (userId, target) pair already exists
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                conflict:
                  value:
                    type: about:blank
                    title: Conflict
                    status: 409
                    detail: "A READ grant for user clxvusr0000000000000000001 on library clxvp1234567890abcdefghij already exists."

    get:
      operationId: listGrantsByUser
      summary: List a user's access grants
      description: Returns every grant issued to the given user, both library- and course-scoped.
      tags: [Access]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: true
          description: Better Auth user id whose grants should be returned.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Grant list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessGrantListDto"
              examples:
                list:
                  value:
                    items:
                      - id: clxvgnt0000000000000000001
                        userId: clxvusr0000000000000000001
                        target:
                          kind: library
                          libraryId: clxvp1234567890abcdefghij
                        level: READ
                        createdAt: "2026-04-25T10:00:00Z"
                      - id: clxvgnt0000000000000000002
                        userId: clxvusr0000000000000000001
                        target:
                          kind: course
                          courseId: clxvcrs0000000000000000001
                        level: READ
                        createdAt: "2026-04-25T10:05:00Z"
        "400":
          description: userId query parameter is missing or empty
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                missingUserId:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "Query parameter 'userId' is required."
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may list grants for arbitrary users.

  /api/v1/access/grants/{id}:
    delete:
      operationId: revokeGrant
      summary: Revoke an access grant
      description: Permanently removes the grant identified by `id`. The affected user immediately loses the access level the grant provided.
      tags: [Access]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the grant to revoke.
          schema:
            type: string
      responses:
        "204":
          description: Grant revoked — no body
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may revoke access grants.
        "404":
          description: Grant not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No grant with that id exists.

  /api/v1/courses:
    get:
      operationId: listCourses
      summary: List courses (optionally filtered by library)
      description: |
        Returns courses the requester can see. Non-admins see only courses inside
        libraries they have a READ AccessGrant for; admins see all.
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: libraryId
          in: query
          required: false
          description: Filter to a single library; omit for everything visible.
          schema:
            type: string
      responses:
        "200":
          description: Course list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseListDto"
              examples:
                list:
                  value:
                    items:
                      - id: clxvcrs0000000000000000001
                        libraryId: clxvp1234567890abcdefghij
                        slug: pragmatic-clean-architecture
                        title: Pragmatic Clean Architecture
                        description: Milan Jovanović's deep-dive into Clean Architecture with .NET.
                        sections:
                          - id: clxvsec0000000000000000001
                            position: 1
                            title: Introduction
                          - id: clxvsec0000000000000000002
                            position: 2
                            title: Domain Layer
                        progress:
                          percent: 0
                          lessonsCompleted: 0
                          lessonsTotal: 24
                        createdAt: "2026-04-25T09:00:00Z"
                        updatedAt: "2026-04-25T09:00:00Z"
                      - id: clxvcrs0000000000000000002
                        libraryId: clxvp1234567890abcdefghij
                        slug: ddd-by-eric-evans
                        title: Domain-Driven Design by Eric Evans
                        sections:
                          - id: clxvsec0000000000000000003
                            position: 1
                            title: Putting the Domain Model to Work
                          - id: clxvsec0000000000000000004
                            position: 2
                            title: Building Blocks of a Model-Driven Design
                        progress:
                          percent: 0
                          lessonsCompleted: 0
                          lessonsTotal: 18
                        createdAt: "2026-04-25T09:05:00Z"
                        updatedAt: "2026-04-25T09:05:00Z"
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401

  /api/v1/courses/{id}:
    get:
      operationId: getCourse
      summary: Get a single course
      description: Returns the full CourseDto for one course by its server-generated cuid. Non-admins must hold a READ AccessGrant on the course's library.
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the course.
          schema:
            type: string
      responses:
        "200":
          description: Course found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDto"
              examples:
                found:
                  value:
                    id: clxvcrs0000000000000000001
                    libraryId: clxvp1234567890abcdefghij
                    slug: pragmatic-clean-architecture
                    title: Pragmatic Clean Architecture
                    description: Milan Jovanović's deep-dive into Clean Architecture with .NET.
                    sections:
                      - id: clxvsec0000000000000000001
                        position: 1
                        title: Introduction
                      - id: clxvsec0000000000000000002
                        position: 2
                        title: Domain Layer
                    progress:
                      percent: 0
                      lessonsCompleted: 0
                      lessonsTotal: 24
                    createdAt: "2026-04-25T09:00:00Z"
                    updatedAt: "2026-04-25T09:00:00Z"
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have a READ grant for the course's library
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: You do not have access to this course.
        "404":
          description: Course not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No course with that id exists.

    patch:
      operationId: updateCourse
      summary: Update course metadata
      description: |
        Admin-only. Updates any combination of title / description / slug.
        Slug must be unique within the same library.
        At least one of `title`, `description`, or `slug` must be present
        (server-side validation rule — OpenAPI cannot express "at-least-one" natively).
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the course to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
            examples:
              renameAndReslug:
                summary: Rename title and update slug
                value:
                  title: Pragmatic Clean Architecture (2nd ed.)
                  slug: pragmatic-clean-architecture-2nd-ed
      responses:
        "200":
          description: Course updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDto"
              examples:
                updated:
                  value:
                    id: clxvcrs0000000000000000001
                    libraryId: clxvp1234567890abcdefghij
                    slug: pragmatic-clean-architecture-2nd-ed
                    title: Pragmatic Clean Architecture (2nd ed.)
                    description: Milan Jovanović's deep-dive into Clean Architecture with .NET.
                    sections:
                      - id: clxvsec0000000000000000001
                        position: 1
                        title: Introduction
                      - id: clxvsec0000000000000000002
                        position: 2
                        title: Domain Layer
                    progress:
                      percent: 0
                      lessonsCompleted: 0
                      lessonsTotal: 24
                    createdAt: "2026-04-25T09:00:00Z"
                    updatedAt: "2026-04-25T10:15:00Z"
        "400":
          description: Validation error — malformed fields or no fields provided
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badInput:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: At least one of title, description, or slug must be present.
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may update course metadata.
        "404":
          description: Course not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No course with that id exists.
        "409":
          description: A course with the same slug already exists in this library
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                conflict:
                  value:
                    type: about:blank
                    title: Conflict
                    status: 409
                    detail: A course with slug 'pragmatic-clean-architecture-2nd-ed' already exists in this library.

  /api/v1/lessons/{id}:
    get:
      operationId: getLesson
      summary: Get a lesson with its materials and subtitles
      description: |
        Returns lesson metadata, sidecar materials (PDF / Markdown / text / image),
        and available subtitle tracks. Raw filesystem paths are intentionally absent
        from the response (NFR-S-01); the player obtains a signed stream token for
        the lesson video and the material/subtitle blobs separately.
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the lesson.
          schema:
            type: string
      responses:
        "200":
          description: Lesson found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonDto"
              examples:
                found:
                  value:
                    id: clxvles0000000000000000001
                    courseId: clxvcrs0000000000000000001
                    sectionId: clxvsec0000000000000000002
                    position: 3
                    title: Aggregates
                    durationSeconds: 2847
                    materials:
                      - id: clxvmat0000000000000000001
                        kind: doc
                        label: 03 - Aggregates slides
                        sizeBytes: 204800
                    subtitles:
                      - id: clxvsub0000000000000000001
                        language: en
                        label: English
                    progress:
                      percent: 0
                      completed: false
                      lastSeenAtSeconds: 0
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Requester has no READ grant covering the parent library or course
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: You do not have access to this lesson.
        "404":
          description: Lesson not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No lesson with that id exists.

  /api/v1/libraries:
    post:
      operationId: registerLibrary
      summary: Register a new library
      description: |
        Persists a new library pointing at an absolute filesystem path.
        Idempotent on rootPath: a 409 is returned if a library with the same
        rootPath already exists.
      tags: [Catalog]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterLibraryRequest"
            examples:
              conference:
                value:
                  name: Conference Recordings
                  rootPath: /srv/courses/conference
      responses:
        "201":
          description: Library registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryDto"
              examples:
                created:
                  value:
                    id: clxvp1234567890abcdefghij
                    name: Conference Recordings
                    rootPath: /srv/courses/conference
                    createdAt: "2026-04-25T09:00:00Z"
                    updatedAt: "2026-04-25T09:00:00Z"
        "400":
          description: Validation error — missing or malformed fields
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                badInput:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: "rootPath must be an absolute POSIX or Windows path."
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the Owner-Admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only Owner-Admins may register libraries.
        "409":
          description: A library with the same rootPath already exists
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                conflict:
                  value:
                    type: about:blank
                    title: Conflict
                    status: 409
                    detail: "A library at /srv/courses/conference is already registered."

    get:
      operationId: listLibraries
      summary: List all registered libraries
      description: |
        Returns all libraries the requester has READ access to. Admins see
        everything.
      tags: [Catalog]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Library list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryListDto"
              examples:
                list:
                  value:
                    items:
                      - id: clxvp1234567890abcdefghij
                        name: Conference Recordings
                        rootPath: /srv/courses/conference
                        createdAt: "2026-04-25T09:00:00Z"
                        updatedAt: "2026-04-25T09:00:00Z"
                      - id: clxvp0987654321zyxwvutsrq
                        name: Tutorial Screencasts
                        rootPath: /srv/courses/tutorials
                        createdAt: "2026-04-20T14:30:00Z"
                        updatedAt: "2026-04-22T11:00:00Z"
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401

  /api/v1/libraries/{id}:
    get:
      operationId: getLibrary
      summary: Get a library by id
      description: Returns a single library by its server-generated identifier.
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the library.
          schema:
            type: string
      responses:
        "200":
          description: Library found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryDto"
              examples:
                found:
                  value:
                    id: clxvp1234567890abcdefghij
                    name: Conference Recordings
                    rootPath: /srv/courses/conference
                    createdAt: "2026-04-25T09:00:00Z"
                    updatedAt: "2026-04-25T09:00:00Z"
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have access to this library
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: You do not have access to this library.
        "404":
          description: Library not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No library with that id exists.

  /api/v1/libraries/{id}/scans:
    post:
      operationId: runLibraryScan
      summary: Trigger a scan of a library
      description: |
        Walks the library tree, recognises Course / Section / Lesson layout,
        and records discoveries on a Scan aggregate. Returns 202 immediately
        with `status: running`; clients poll
        `GET /libraries/{id}/scans/latest`. A second scan with no filesystem
        changes is observably a no-op (`filesAdded` and `filesUpdated` are
        zero).
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the library to scan.
          schema:
            type: string
      responses:
        "202":
          description: Scan accepted and running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanDto"
              examples:
                accepted:
                  value:
                    id: clxvscn0000000000000000001
                    libraryId: clxvp1234567890abcdefghij
                    status: running
                    startedAt: "2026-04-25T10:30:00Z"
                    filesScanned: 0
                    filesAdded: 0
                    filesUpdated: 0
                    coursesDiscovered: 0
                    errors: []
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may trigger library scans.
        "404":
          description: Library not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No library with that id exists.
        "409":
          description: A scan is already running for this library
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                conflict:
                  value:
                    type: about:blank
                    title: Conflict
                    status: 409
                    detail: A scan is already running for library clxvp1234567890abcdefghij.

  /api/v1/libraries/{id}/scans/latest:
    get:
      operationId: getLatestLibraryScan
      summary: Get the most recent scan for a library
      description: >-
        Returns the latest scan record regardless of status
        (running, succeeded, failed, cancelled).
      tags: [Catalog]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Server-generated cuid identifying the library.
          schema:
            type: string
      responses:
        "200":
          description: Latest scan returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanDto"
              examples:
                succeeded:
                  value:
                    id: clxvscn0000000000000000001
                    libraryId: clxvp1234567890abcdefghij
                    status: succeeded
                    startedAt: "2026-04-25T10:30:00Z"
                    finishedAt: "2026-04-25T10:31:42Z"
                    filesScanned: 314
                    filesAdded: 12
                    filesUpdated: 3
                    coursesDiscovered: 7
                    errors:
                      - path: "02 - Patterns/05 - Repositories.mp4"
                        message: "File is not readable — permission denied."
                        code: unreadable-file
                      - path: "04 - Bounded Contexts/course.json"
                        message: "JSON schema validation failed: missing required field 'title'."
                        code: course-json-invalid
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unauthorized:
                  value:
                    type: about:blank
                    title: Unauthorized
                    status: 401
        "403":
          description: Caller does not have the admin role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                forbidden:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: Only admins may view scan records.
        "404":
          description: Library not found or no scan has been run yet
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: about:blank
                    title: Not Found
                    status: 404
                    detail: No scan record found for this library.

  /api/v1/health:
    get:
      operationId: getHealth
      summary: Service health probe
      description: |
        Reports combined health status of the service and its runtime
        dependencies (database, cache, realtime bus).
      tags: [system]
      responses:
        "200":
          description: Service and all dependencies are operational
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                ok:
                  value:
                    status: ok
                    version: 0.1.0
                    uptimeSeconds: 42
                    dependencies:
                      db: ok
                      redis: ok
                      centrifugo: ok
        "503":
          description: One or more dependencies are degraded or down
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                degraded:
                  value:
                    status: degraded
                    version: 0.1.0
                    uptimeSeconds: 42
                    dependencies:
                      db: ok
                      redis: degraded
                      centrifugo: ok

  /api/v1/realtime/token:
    post:
      operationId: issueRealtimeToken
      summary: Issue a short-lived Centrifugo connection token
      description: |
        Mints a short-lived HMAC-signed JWT that the client can use to connect
        to Centrifugo. Requires an active Better Auth session (cookie on web,
        bearer token on mobile).
      tags: [realtime]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeToken"
              examples:
                ok:
                  value:
                    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    expiresAt: "2026-04-18T12:05:00Z"
        "401":
          description: No active session
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Better Auth bearer token
  schemas:
    AccessGrantDto:
      type: object
      required: [id, userId, target, level, createdAt]
      description: A single access grant issued by an admin.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this grant.
        userId:
          type: string
          description: Better Auth user id of the grantee.
        target:
          $ref: "#/components/schemas/GrantTarget"
        level:
          $ref: "#/components/schemas/GrantLevel"
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 instant when the grant was created.
      examples:
        - id: clxvgnt0000000000000000001
          userId: clxvusr0000000000000000001
          target:
            kind: library
            libraryId: clxvp1234567890abcdefghij
          level: READ
          createdAt: "2026-04-25T10:00:00Z"
        - id: clxvgnt0000000000000000002
          userId: clxvusr0000000000000000001
          target:
            kind: course
            courseId: clxvcrs0000000000000000001
          level: READ
          createdAt: "2026-04-25T10:05:00Z"

    AccessGrantListDto:
      type: object
      required: [items]
      description: Paginated list of access grants for a given user.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AccessGrantDto"
      example:
        items:
          - id: clxvgnt0000000000000000001
            userId: clxvusr0000000000000000001
            target:
              kind: library
              libraryId: clxvp1234567890abcdefghij
            level: READ
            createdAt: "2026-04-25T10:00:00Z"
          - id: clxvgnt0000000000000000002
            userId: clxvusr0000000000000000001
            target:
              kind: course
              courseId: clxvcrs0000000000000000001
            level: READ
            createdAt: "2026-04-25T10:05:00Z"

    CourseDto:
      type: object
      required: [id, libraryId, slug, title, sections, progress, createdAt, updatedAt]
      description: Full representation of a Course aggregate.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this course.
        libraryId:
          type: string
          description: cuid of the library this course belongs to.
        slug:
          $ref: "#/components/schemas/CourseSlug"
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 4000
        sections:
          type: array
          items:
            $ref: "#/components/schemas/SectionDto"
          description: Sections sorted ascending by position.
        progress:
          $ref: "#/components/schemas/CourseProgress"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        id: clxvcrs0000000000000000001
        libraryId: clxvp1234567890abcdefghij
        slug: pragmatic-clean-architecture
        title: Pragmatic Clean Architecture
        description: Milan Jovanović's deep-dive into Clean Architecture with .NET.
        sections:
          - id: clxvsec0000000000000000001
            position: 1
            title: Introduction
          - id: clxvsec0000000000000000002
            position: 2
            title: Domain Layer
        progress:
          percent: 0
          lessonsCompleted: 0
          lessonsTotal: 24
        createdAt: "2026-04-25T09:00:00Z"
        updatedAt: "2026-04-25T09:00:00Z"

    CourseListDto:
      type: object
      required: [items]
      description: List of courses visible to the requester.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CourseDto"
      example:
        items:
          - id: clxvcrs0000000000000000001
            libraryId: clxvp1234567890abcdefghij
            slug: pragmatic-clean-architecture
            title: Pragmatic Clean Architecture
            description: Milan Jovanović's deep-dive into Clean Architecture with .NET.
            sections:
              - id: clxvsec0000000000000000001
                position: 1
                title: Introduction
              - id: clxvsec0000000000000000002
                position: 2
                title: Domain Layer
            progress:
              percent: 0
              lessonsCompleted: 0
              lessonsTotal: 24
            createdAt: "2026-04-25T09:00:00Z"
            updatedAt: "2026-04-25T09:00:00Z"
          - id: clxvcrs0000000000000000002
            libraryId: clxvp1234567890abcdefghij
            slug: ddd-by-eric-evans
            title: Domain-Driven Design by Eric Evans
            sections:
              - id: clxvsec0000000000000000003
                position: 1
                title: Putting the Domain Model to Work
              - id: clxvsec0000000000000000004
                position: 2
                title: Building Blocks of a Model-Driven Design
            progress:
              percent: 0
              lessonsCompleted: 0
              lessonsTotal: 18
            createdAt: "2026-04-25T09:05:00Z"
            updatedAt: "2026-04-25T09:05:00Z"

    CourseProgress:
      type: object
      required: [percent, lessonsCompleted, lessonsTotal]
      description: Progress summary for a course from the requester's perspective.
      properties:
        percent:
          type: number
          minimum: 0
          maximum: 100
          description: >-
            Completion percent. v1 always returns 0 — populated once the
            LessonProgress projector lands (E10-F01-S01).
        lessonsCompleted:
          type: integer
          minimum: 0
        lessonsTotal:
          type: integer
          minimum: 0
      example:
        percent: 0
        lessonsCompleted: 0
        lessonsTotal: 24

    CourseSlug:
      type: string
      pattern: "^[a-z0-9](?:[a-z0-9-]{0,98}[a-z0-9])?$"
      description: >-
        URL-safe slug. 1–100 chars, lowercase ASCII letters, digits, and hyphens;
        cannot start or end with a hyphen. Unique within a library.
      example: pragmatic-clean-architecture

    DependencyStatus:
      type: ["string", "null"]
      enum: [ok, degraded, down]

    GrantLevel:
      type: string
      enum: [READ]
      description: >-
        Access level. v1 only issues READ; the enum is open for future levels
        (e.g. ADMIN, NONE for explicit denials).

    GrantTarget:
      description: The resource to which access is granted. Discriminated by `kind`.
      oneOf:
        - title: LibraryTarget
          type: object
          required: [kind, libraryId]
          properties:
            kind:
              type: string
              enum: [library]
              description: Discriminator value indicating a library-scoped grant.
            libraryId:
              type: string
              description: Server-generated cuid of the target library.
          additionalProperties: false
          example:
            kind: library
            libraryId: clxvp1234567890abcdefghij
        - title: CourseTarget
          type: object
          required: [kind, courseId]
          properties:
            kind:
              type: string
              enum: [course]
              description: Discriminator value indicating a course-scoped grant. Accepted in v1 even though the Course aggregate (E06-F03-S01) has not landed yet — keeps the contract stable for E14-F04-S01.
            courseId:
              type: string
              description: Server-generated cuid of the target course (e.g. "DDD by Eric Evans").
          additionalProperties: false
          example:
            kind: course
            courseId: clxvcrs0000000000000000001
      discriminator:
        propertyName: kind
        mapping:
          library: "#/components/schemas/GrantTarget/oneOf/0"
          course: "#/components/schemas/GrantTarget/oneOf/1"

    HealthStatus:
      type: object
      required: [status, version, uptimeSeconds, dependencies]
      properties:
        status:
          $ref: "#/components/schemas/DependencyStatus"
        version:
          type: ["string", "null"]
          description: Semantic version of the running backend build
        uptimeSeconds:
          type: integer
          minimum: 0
          description: Seconds since the backend process started
        dependencies:
          type: object
          required: [db, redis, centrifugo]
          properties:
            db:
              $ref: "#/components/schemas/DependencyStatus"
            redis:
              $ref: "#/components/schemas/DependencyStatus"
            centrifugo:
              $ref: "#/components/schemas/DependencyStatus"

    LibraryDto:
      type: object
      required: [id, name, rootPath, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: Server-generated identifier.
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable label.
        rootPath:
          type: string
          minLength: 1
          description: >-
            Absolute filesystem path to the library root. Must start with `/`
            (POSIX) or `[A-Za-z]:\` (Windows).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        id: clxvp1234567890abcdefghij
        name: Conference Recordings
        rootPath: /srv/courses/conference
        createdAt: "2026-04-25T09:00:00Z"
        updatedAt: "2026-04-25T09:00:00Z"

    LibraryListDto:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LibraryDto"
      example:
        items:
          - id: clxvp1234567890abcdefghij
            name: Conference Recordings
            rootPath: /srv/courses/conference
            createdAt: "2026-04-25T09:00:00Z"
            updatedAt: "2026-04-25T09:00:00Z"
          - id: clxvp0987654321zyxwvutsrq
            name: Tutorial Screencasts
            rootPath: /srv/courses/tutorials
            createdAt: "2026-04-20T14:30:00Z"
            updatedAt: "2026-04-22T11:00:00Z"

    LessonDto:
      type: object
      required: [id, courseId, sectionId, position, title, materials, subtitles, progress]
      description: Full representation of a Lesson aggregate, including sidecar materials and subtitle tracks.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this lesson.
        courseId:
          type: string
          description: cuid of the course this lesson belongs to.
        sectionId:
          type: string
          description: cuid of the section this lesson belongs to.
        position:
          type: integer
          minimum: 1
          description: 1-based position within the section.
        title:
          type: string
          minLength: 1
          maxLength: 200
        durationSeconds:
          type: integer
          minimum: 0
          description: >-
            Video duration in seconds. Populated by E06-F02-S02 (ffprobe).
            `undefined` until then.
        materials:
          type: array
          items:
            $ref: "#/components/schemas/MaterialDto"
          description: Sidecar materials (PDF / Markdown / text / image). Empty array when none.
        subtitles:
          type: array
          items:
            $ref: "#/components/schemas/SubtitleDto"
          description: Available subtitle tracks. Empty array when none.
        progress:
          $ref: "#/components/schemas/LessonProgress"
      example:
        id: clxvles0000000000000000001
        courseId: clxvcrs0000000000000000001
        sectionId: clxvsec0000000000000000002
        position: 3
        title: Aggregates
        durationSeconds: 2847
        materials:
          - id: clxvmat0000000000000000001
            kind: doc
            label: 03 - Aggregates slides
            sizeBytes: 204800
        subtitles:
          - id: clxvsub0000000000000000001
            language: en
            label: English
        progress:
          percent: 0
          completed: false
          lastSeenAtSeconds: 0

    LessonProgress:
      type: object
      required: [percent, completed, lastSeenAtSeconds]
      description: Per-lesson playback progress for the requesting user.
      properties:
        percent:
          type: number
          minimum: 0
          maximum: 100
          description: >-
            Completion percent. v1 always returns 0 — populated once the
            LessonProgress projector lands (E10-F01-S01).
        completed:
          type: boolean
          description: Whether the lesson is marked as completed.
        lastSeenAtSeconds:
          type: integer
          minimum: 0
          description: >-
            Last reported watched position in seconds. v1 always returns 0 —
            populated by the LessonProgress projector (E10-F01-S01).
      example:
        percent: 0
        completed: false
        lastSeenAtSeconds: 0

    MaterialDto:
      type: object
      required: [id, kind, label, sizeBytes]
      description: A sidecar material attached to a lesson.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this material.
        kind:
          $ref: "#/components/schemas/MaterialKind"
        label:
          type: string
          minLength: 1
          description: >-
            Human-readable name derived from the original filename (extension
            stripped, ordinal prefix preserved if present).
        sizeBytes:
          type: integer
          minimum: 0
          description: File size in bytes.
      example:
        id: clxvmat0000000000000000001
        kind: doc
        label: 03 - Aggregates slides
        sizeBytes: 204800

    MaterialKind:
      type: string
      enum: [doc, note, image, slide]
      description: >-
        Coarse classification of a sidecar material. `doc` is `.pdf`,
        `note` is `.md` / `.txt`, `image` is `.png` / `.jpg`,
        `slide` is reserved for future use.
      example: doc

    Problem:
      type: object
      description: RFC 9457 problem details
      required: [type, title, status]
      properties:
        type:
          type: ["string", "null"]
          format: uri
          default: about:blank
        title:
          type: ["string", "null"]
        status:
          type: integer
          format: int32
        detail:
          type: ["string", "null"]
        instance:
          type: ["string", "null"]
        code:
          type: ["string", "null"]

    RealtimeToken:
      type: object
      required: [token, expiresAt]
      properties:
        token:
          type: ["string", "null"]
          description: Short-lived HMAC-signed JWT for Centrifugo
        expiresAt:
          type: ["string", "null"]
          format: date-time
          description: ISO-8601 instant when the token expires

    RegisterGrantRequest:
      type: object
      required: [userId, target, level]
      description: Payload for issuing a new access grant.
      properties:
        userId:
          type: string
          description: Better Auth user id of the grantee.
        target:
          $ref: "#/components/schemas/GrantTarget"
        level:
          $ref: "#/components/schemas/GrantLevel"
      example:
        userId: clxvusr0000000000000000001
        target:
          kind: library
          libraryId: clxvp1234567890abcdefghij
        level: READ

    RegisterLibraryRequest:
      type: object
      required: [name, rootPath]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable label.
        rootPath:
          type: string
          minLength: 1
          pattern: '^(?:/[^\0]*|[A-Za-z]:\\[^\0]*)$'
          description: >-
            Absolute filesystem path to the library root. Accepts POSIX paths
            starting with `/` or Windows drive paths starting with `[A-Za-z]:\`.
            Trailing slashes are allowed.
      example:
        name: Conference Recordings
        rootPath: /srv/courses/conference

    ScanDto:
      type: object
      required:
        - id
        - libraryId
        - status
        - startedAt
        - filesScanned
        - filesAdded
        - filesUpdated
        - coursesDiscovered
        - errors
      description: A scan record for a library, produced by the Scan aggregate.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this scan.
        libraryId:
          type: string
          description: cuid of the library that was scanned.
        status:
          $ref: "#/components/schemas/ScanStatus"
        startedAt:
          type: string
          format: date-time
          description: ISO-8601 instant when the scan was started.
        finishedAt:
          type: string
          format: date-time
          description: >-
            Set on terminal status (`succeeded` / `failed` / `cancelled`).
            Absent while `status: running`.
        filesScanned:
          type: integer
          minimum: 0
          description: Total number of filesystem entries inspected.
        filesAdded:
          type: integer
          minimum: 0
          description: Files that did not exist in the catalog before this scan.
        filesUpdated:
          type: integer
          minimum: 0
          description: Files whose metadata changed since the last scan.
        coursesDiscovered:
          type: integer
          minimum: 0
          description: Course roots detected during this scan.
        errors:
          type: array
          minItems: 0
          items:
            $ref: "#/components/schemas/ScanError"
          description: Non-fatal per-file errors encountered during the scan.
      example:
        id: clxvscn0000000000000000001
        libraryId: clxvp1234567890abcdefghij
        status: succeeded
        startedAt: "2026-04-25T10:30:00Z"
        finishedAt: "2026-04-25T10:31:42Z"
        filesScanned: 314
        filesAdded: 12
        filesUpdated: 3
        coursesDiscovered: 7
        errors:
          - path: "02 - Patterns/05 - Repositories.mp4"
            message: "File is not readable — permission denied."
            code: unreadable-file
          - path: "04 - Bounded Contexts/course.json"
            message: "JSON schema validation failed: missing required field 'title'."
            code: course-json-invalid

    ScanError:
      type: object
      required: [path, message]
      description: A non-fatal error encountered while processing a single file during a scan.
      properties:
        path:
          type: string
          description: >-
            Filesystem path relative to the library root,
            e.g. `01 - Intro to DDD/03 - Aggregates.mp4`.
        message:
          type: string
          description: Human-readable description of what went wrong.
        code:
          type: string
          description: >-
            Machine-readable error key
            (e.g. `course-json-invalid`, `unreadable-file`,
            `unsupported-extension`).
      example:
        path: "02 - Patterns/05 - Repositories.mp4"
        message: "File is not readable — permission denied."
        code: unreadable-file

    ScanStatus:
      type: string
      enum: [running, succeeded, failed, cancelled]
      description: >-
        Scan lifecycle. `cancelled` is reserved for v2 admin-cancel; v1 scans
        only ever transition `running → {succeeded, failed}`.

    SubtitleDto:
      type: object
      required: [id, language, label]
      description: A subtitle track available for a lesson.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this subtitle track.
        language:
          type: string
          pattern: '^[a-z]{2,3}$|^und$'
          description: >-
            BCP-47-ish language code parsed from the filename suffix
            (`Lesson.en.srt` → `en`). `und` when no suffix is present.
        label:
          type: string
          minLength: 1
          description: Human-readable label for the subtitle track (e.g. "English").
      example:
        id: clxvsub0000000000000000001
        language: en
        label: English

    SectionDto:
      type: object
      required: [id, position, title]
      description: A section within a course.
      properties:
        id:
          type: string
          description: Server-generated cuid identifying this section.
        position:
          type: integer
          minimum: 1
          description: 1-based position within the course. Sections are returned sorted by position.
        title:
          type: string
          minLength: 1
          maxLength: 200
      example:
        id: clxvsec0000000000000000001
        position: 1
        title: Introduction

    UpdateCourseRequest:
      type: object
      description: |
        Payload for updating course metadata. All fields are optional, but at
        least one of `title`, `description`, or `slug` must be present
        (server-side validation rule — OpenAPI does not have a native
        "at-least-one" constraint).
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 4000
        slug:
          $ref: "#/components/schemas/CourseSlug"
      example:
        title: Pragmatic Clean Architecture (2nd ed.)
        slug: pragmatic-clean-architecture-2nd-ed
