# CI overrides for docker/compose.yml.
#
# Why this file exists: the act_runner on Forgejo runs the job inside a
# container that issues `docker compose` against the host docker daemon
# (via socket mount). Relative bind mounts in compose.yml resolve to
# absolute paths inside the runner container — paths that do NOT exist on
# the host docker daemon. The host daemon then creates empty directories
# at those mount targets, and the container sees garbage instead of the
# source files / configs it expected.
#
# This override:
#   1. Switches postgres to a build that bakes init.sql into the image
#      (see docker/postgres/Dockerfile).
#   2. Switches backend to the production Dockerfile (apps/backend/Dockerfile)
#      which COPYs the full source into the image and runs the compiled
#      Nest app with `prisma migrate deploy` at startup. Drops the
#      `..:/workspace` bind mount.
#   3. Switches web to the production Dockerfile (apps/web/Dockerfile)
#      which generates the static SPA at build time and serves it via
#      nginx on :8080. Drops bind mounts; remaps port 3001 host → 8080
#      container; sets the APP_* env vars the production runtime-config
#      entrypoint expects.
#
# centrifugo is already buildable from docker/centrifugo/Dockerfile in
# the base compose.yml, so no override needed here.
#
# Usage in CI:
#   docker compose -f docker/compose.yml -f docker/compose.ci.yml up -d --build
#
# Local dev is unaffected — use only compose.yml.

services:
  postgres:
    # Bake init.sql into the image. The base compose.yml still has the
    # bind-mount entry; `!override` replaces the merged volumes list with
    # just the named pgdata volume so the broken bind mount drops out.
    build:
      context: ./postgres
    image: course-shelf-postgres:ci
    volumes: !override
      - pgdata:/var/lib/postgresql
    # The runner host is shared with other stacks (coriolis-companion
    # publishes :3200, others may claim :5432/:6379). The e2e job only
    # needs web (:3001), backend (:3000) and centrifugo (:8000 — the
    # SPA's websocket URL points at the host gateway) reachable from
    # the job container; postgres/redis/otel-lgtm are internal to the
    # compose network (backend reaches them by service name). Unpublish
    # their host ports so the nightly can't die on
    # "Bind for 0.0.0.0:3200 failed: port is already allocated".
    ports: !override []

  redis:
    ports: !override []

  otel-lgtm:
    ports: !override []

  backend:
    # Production image — COPYs source, builds, runs `prisma migrate
    # deploy && node dist/main.js`. No bind mounts. Image tagged for
    # cache reuse across runs.
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    image: course-shelf-backend:ci
    # !override drops the dev `..:/workspace` mount AND the anonymous
    # node_modules volumes (no host source / no live install in CI).
    volumes: !override []
    # The prod image's CMD uses relative paths (`./node_modules/prisma/
    # build/index.js`) and its Dockerfile sets `WORKDIR /app`. The base
    # compose.yml forces `working_dir: /workspace` because the dev image's
    # WORKDIR is /workspace (where the bind mount lands). Override back
    # to /app or Node fails with
    # `Cannot find module '/workspace/node_modules/prisma/build/index.js'`.
    working_dir: /app
    environment:
      # The prod image uses NODE_ENV=production by default. Keep that so
      # CI exercises the production codepaths.
      NODE_ENV: production
      # Same DinD-host-vs-job-container-localhost rationale as the web
      # service below. `E2E_HOST` is set by the workflow to the docker
      # bridge gateway IP so the browser-driven URLs land on the host
      # where compose published the ports.
      BETTER_AUTH_URL: "http://${E2E_HOST:-localhost}:3000"
      CORS_ORIGINS: "http://${E2E_HOST:-localhost}:3001,http://${E2E_HOST:-localhost}:8080"
    # CMD inherits from the prod Dockerfile:
    #   prisma migrate deploy && node dist/main.js

  web:
    # Production image — Nuxt generate at build, nginx serves the static
    # SPA on :8080 with /_app-config.js generated at boot from APP_*
    # env vars (see apps/web/docker-entrypoint.sh).
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    image: course-shelf-web:ci
    volumes: !override []
    # Base compose.yml forces /workspace for the dev Nuxt server; prod
    # nginx works regardless of cwd (it reads absolute paths from its
    # config) but be explicit so `docker compose config` doesn't ship a
    # /workspace cwd that confuses log readers.
    working_dir: /
    # Production web binds to :8080 (nginx-unprivileged default). Remap
    # so the e2e step's `curl http://${E2E_HOST}:3001/` still works.
    ports: !override
      - "3001:8080"
    # APP_* env vars consumed by docker-entrypoint.sh to materialise
    # /_app-config.js for the SPA's runtime-config plugin.
    #
    # In a DinD CI environment the job container's `localhost` is NOT
    # the same as the host where compose published the port mappings.
    # The e2e workflow sets `E2E_HOST` to the docker bridge default
    # gateway (which IS the host from the job container's perspective);
    # local dev leaves it unset and gets `localhost`.
    environment:
      APP_API_BASE_URL: "http://${E2E_HOST:-localhost}:3000/api/v1"
      APP_AUTH_BASE_URL: "http://${E2E_HOST:-localhost}:3000"
      APP_CENTRIFUGO_URL: "ws://${E2E_HOST:-localhost}:8000/connection/websocket"
      # Inject backend + Centrifugo origins into the SPA's CSP
      # `connect-src` so the SPA on port 3001 can fetch `/api/v1/*`
      # from port 3000 (different ports = different origins under
      # browser CSP enforcement). Empty in production where everything
      # comes through a single same-origin reverse proxy. The web
      # docker-entrypoint sed's this into nginx.conf at boot.
      CSP_CONNECT_SRC: "http://${E2E_HOST:-localhost}:3000 ws://${E2E_HOST:-localhost}:8000"
    # Production web has a healthcheck on /_app-config.js so we can wait
    # for the entrypoint to finish materialising the runtime config.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/_app-config.js"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s
